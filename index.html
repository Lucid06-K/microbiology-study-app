            content: `<p>By the end of this lecture, you should be able to:</p><ol><li>Distinguish between constitutively expressed and regulated genes, and explain the roles of activators, repressors, and inducers</li><li>Describe the structure of a bacterial operon and explain how it coordinates expression of functionally related genes</li><li>Explain the mechanism of the tryptophan (trp) operon as an example of repressor-mediated regulation</li><li>Explain the mechanism of the lactose (lac) operon as an example of a two-part inducible system</li><li>Describe how Vibrio cholerae uses environmental signals to regulate expression of its virulence factors</li><li>Explain how inducible gene expression systems are applied in biotechnology to produce recombinant proteins</li></ol>`
          },
          /* 1 */
          {
            title: "Constitutive vs Regulated Genes",
            content: `<p>Imagine you own a factory. Some machines <strong>run 24/7</strong> because the products they make are always needed \u2014 toilet paper, for instance. Those are like <strong>constitutive genes</strong>: they are always switched on, always producing their protein products. In bacteria, roughly <strong>60\u201380 %</strong> of genes are constitutive because the proteins they encode are essential for basic survival no matter what the environment looks like.</p>

<p>Other machines in the factory only spin up when a special order comes in. These correspond to <strong>regulated genes</strong> \u2014 they can be turned on or off depending on the bacterium\u2019s needs. Bacteria use regulated genes to control both <strong>catabolic pathways</strong> (breaking big molecules down for energy) and <strong>anabolic pathways</strong> (building small molecules into complex ones). For example, if lactose is absent from the environment, E.\u00a0coli will <em>not</em> waste resources making the enzymes to break it down.</p>

<p>Three key molecular players govern regulation:</p>
<ul>
  <li><strong>Activators</strong> \u2014 increase transcription of genes or operons.</li>
  <li><strong>Repressors</strong> \u2014 block transcription of genes or operons.</li>
  <li><strong>Inducers</strong> \u2014 turn on transcription by inactivating a repressor or enabling an activator.</li>
</ul>

<div class="key-point"><strong>Key Takeaway:</strong> Constitutive genes are \u201calways on\u201d; regulated genes are switched on/off so the bacterium can efficiently adapt to changing conditions without wasting energy.</div>`
          },
          /* 2 */
          {
            title: "Operon Structure",
            content: `<p>When a bacterium needs several proteins for one task \u2014 say, breaking down lactose \u2014 it would be inefficient to scatter those genes around the chromosome. Instead, bacteria bundle related genes together in a unit called an <strong>operon</strong>. Think of it like a playlist: one press of \u201cplay\u201d (one promoter) and all the songs (genes) run in order, producing a single long messenger RNA that is then translated into the separate proteins.</p>

<p>A typical operon has four parts arranged in this order:</p>
<ol>
  <li><strong>Regulator gene</strong> \u2014 sits upstream and encodes a repressor protein.</li>
  <li><strong>Promoter</strong> \u2014 the DNA sequence where <strong>RNA polymerase</strong> binds to begin transcription.</li>
  <li><strong>Operator</strong> \u2014 a short DNA stretch where the repressor binds; when occupied, it physically blocks RNA polymerase from reading the structural genes.</li>
  <li><strong>Structural genes</strong> \u2014 the actual genes (e.g., A, B, C, D) whose protein products carry out the metabolic task.</li>
</ol>

<div class="diagram"><img src="https://upload.wikimedia.org/wikipedia/commons/1/18/Operon.svg" alt="Diagram of the lac operon structure showing promoter, operator, and structural genes" style="max-width:100%;height:auto;border-radius:8px;"><p class="diagram-caption">Figure: General operon structure showing regulator, promoter, operator, and structural genes.</p></div>

<div class="key-point"><strong>Key Takeaway:</strong> An operon groups functionally related genes under one promoter so they are transcribed together as a single mRNA and translated into separate proteins.</div>`
          },
          /* 3 */
          {
            title: "The Trp Operon \u2014 A Repressible System",
            content: `<p>Tryptophan (Trp) is an amino acid E.\u00a0coli needs to survive. The bacterium <em>can</em> make its own tryptophan using five genes (<strong>trpA\u2013trpE</strong>) organised in the <strong>trp operon</strong>. But why bother building something yourself when it is already available for free? That is the logic of the trp operon: it is a <strong>repressible</strong> system.</p>

<p>Here is how it works in plain language:</p>
<ul>
  <li>The regulator gene always produces an <strong>inactive repressor</strong>.</li>
  <li>When tryptophan is <strong>plentiful</strong> in the environment, tryptophan molecules bind to the inactive repressor and change its shape, making it <strong>active</strong>. The now-active repressor sits on the operator and blocks RNA polymerase \u2192 genes are <strong>OFF</strong>.</li>
  <li>When tryptophan is <strong>scarce</strong>, nothing converts the repressor to its active form, so the operator is clear. RNA polymerase rolls through and transcribes all five genes \u2192 genes are <strong>ON</strong>, and the bacterium synthesises its own tryptophan.</li>
</ul>

<div class="diagram"><img src="https://upload.wikimedia.org/wikipedia/commons/2/2e/Trp_operon.svg" alt="Trp operon diagram showing repressible operon mechanism with tryptophan as co-repressor" style="max-width:100%;height:auto;border-radius:8px;"><p class="diagram-caption">Figure: Trp operon \u2014 when tryptophan is absent the operon is ON; when tryptophan is present it binds the repressor, turning the operon OFF.</p></div>

<div class="key-point"><strong>Key Takeaway:</strong> The trp operon is repressible \u2014 the end-product (tryptophan) acts as a <strong>co-repressor</strong>. When Trp is abundant, the cell saves energy by shutting down its own synthesis pathway.</div>`
          },
          /* 4 */
          {
            title: "The Lac Operon \u2014 An Inducible Two-Key System",
            content: `<p>The <strong>lac operon</strong> is the opposite of the trp operon. It is an <strong>inducible</strong> system: normally OFF, it turns ON when its substrate (lactose) appears and glucose is low. Think of it like a vending machine that needs <em>two keys turned simultaneously</em> before it dispenses anything.</p>

<p>The lac operon has three structural genes \u2014 <strong>lacZ</strong>, <strong>lacY</strong>, and <strong>lacA</strong> \u2014 that encode proteins for acquiring and breaking down lactose. Two conditions must be met:</p>
<ol>
  <li><strong>Glucose must be low</strong> \u2014 when glucose drops, cyclic AMP (cAMP) accumulates and binds to the <strong>CAP protein</strong> (catabolite activator protein, also called CRP). The CAP-cAMP complex binds upstream of the promoter and <em>helps</em> RNA polymerase attach. Without this, the polymerase struggles to bind.</li>
  <li><strong>Lactose must be present</strong> \u2014 the lac repressor normally sits on the operator, blocking transcription. When lactose (or the lab analogue <strong>IPTG</strong>) is present, it binds the repressor and changes its shape so it falls off the operator.</li>
</ol>

<p>Only when both keys are turned \u2014 CAP helping the polymerase AND the repressor removed \u2014 does transcription proceed.</p>

<div class="diagram"><img src="https://upload.wikimedia.org/wikipedia/commons/2/22/Lac_Operon.svg" alt="Lac operon diagram showing CAP-cAMP activation and lac repressor mechanism" style="max-width:100%;height:auto;border-radius:8px;"><p class="diagram-caption">Figure: Lac operon requires two conditions \u2014 CAP-cAMP at the promoter (low glucose) AND lactose removing the repressor.</p></div>

<div class="key-point"><strong>Key Takeaway:</strong> The lac operon uses a two-key control system: glucose must be low (so CAP-cAMP boosts polymerase binding) AND lactose must be present (to release the repressor). Only when both conditions are met does transcription occur.</div>`
          },
          /* 5 */
          {
            title: "Using Inducible Promoters in Biotechnology",
            content: `<p>The same genetic switches bacteria use naturally can be harnessed in the lab to produce useful proteins. Imagine you want large quantities of a protein for a COVID diagnostic test or a vaccine component. You can insert the gene for that protein into a <strong>plasmid expression vector</strong> and transform it into E.\u00a0coli.</p>

<p>A common system uses a <strong>T7 promoter</strong>, which requires a special T7 RNA polymerase for transcription. The clever trick is that the gene for T7 polymerase is placed under a <strong>lac promoter</strong> in the E.\u00a0coli chromosome. So the polymerase is only made when the lac system is induced. In the lab, researchers add <strong>IPTG</strong> (a lactose-like molecule) to the culture medium. IPTG releases the lac repressor, T7 polymerase is produced, and it then drives massive transcription of the target gene on the plasmid.</p>

<p>The expression vector also carries an <strong>antibiotic resistance marker</strong>, which allows scientists to select only those E.\u00a0coli cells that successfully took up the plasmid. High-copy-number plasmids mean each cell contains many copies, cranking out large amounts of the desired protein.</p>

<p>This is exactly how many recombinant antigens for vaccines and diagnostic kits are manufactured. The ability to <em>control</em> when expression happens means the bacteria can grow to high density first, and only then be instructed to start making the protein of interest.</p>

<div class="key-point"><strong>Key Takeaway:</strong> Inducible promoter systems (like the T7/lac system with IPTG) let researchers precisely control when a gene is expressed in E.\u00a0coli, enabling efficient large-scale protein production for vaccines and diagnostics.</div>`
          },
          /* 6 */
          {
            title: "Vibrio cholerae \u2014 Gene Regulation in Virulence",
            content: `<p><em>Vibrio cholerae</em> is the curved, Gram-negative, highly motile rod (with a single polar flagellum) that causes <strong>cholera</strong> \u2014 a severe watery diarrhoea that can lead to fatal dehydration. It remains a threat wherever sanitation is inadequate, particularly in parts of Africa and Southeast Asia.</p>

<p>The critical point for gene regulation is that <em>V.\u00a0cholerae</em> does <strong>not</strong> produce its virulence factors when it is floating in a biofilm outside the body. The two major virulence factors \u2014 the <strong>cholera toxin</strong> (causes watery diarrhoea) and the <strong>toxin co-regulated pilus / TCP</strong> (allows attachment to intestinal cells) \u2014 are only switched on inside the human gut.</p>

<p>The transcriptional activator <strong>ToxT</strong> is the master switch. It is inactive until the bacterium senses environmental cues such as <strong>bicarbonate</strong>, temperature, and pH characteristic of the gut. Once activated, ToxT binds the promoters of both the TCP operon and the CTX operon, turning on production of the pilus and the toxin. Notably, ToxT also activates its own gene \u2014 a process called <strong>autoregulation</strong>, creating a positive feedback loop.</p>

<p>The cholera toxin genes (<em>ctxAB</em>) are actually encoded on a <strong>lysogenic bacteriophage</strong>. The TCP pilus doubles as a receptor for this CTX phage, meaning a non-toxigenic strain can acquire the toxin genes via phage infection. The TCP genes reside on a <strong>40\u00a0kb pathogenicity island</strong>.</p>

<div class="key-point"><strong>Key Takeaway:</strong> Vibrio cholerae only expresses its virulence factors (cholera toxin and TCP) inside the human gut, regulated by the ToxT activator responding to gut environmental signals like bicarbonate and temperature.</div>`
          },
          /* 7 */
          {
            title: "EHEC \u2014 Shiga Toxin and Prophage Induction",
            content: `<p>Enterohaemorrhagic E.\u00a0coli (EHEC) cause bloody diarrhoea that can progress to <strong>haemolytic uraemic syndrome (HUS)</strong>, which may lead to kidney failure and death. Their key virulence factor is the <strong>Shiga toxin</strong>, very similar to the toxin of <em>Shigella dysenteriae</em>.</p>

<p>The Shiga toxin genes are carried on <strong>prophages</strong> \u2014 bacteriophage genomes that have integrated into the EHEC chromosome. In the lysogenic (dormant) state, a <strong>CI repressor</strong> protein sits on the operator and blocks transcription of both the phage replication genes and the Shiga toxin gene. The toxin is therefore NOT constitutively produced.</p>

<p>When the bacterium experiences a <strong>stress response</strong> \u2014 triggered by oxidative stress (hydrogen peroxide in the gut), UV light, or antibiotics that interfere with DNA replication \u2014 the CI repressor is degraded. This allows the prophage to excise from the chromosome, re-enter the <strong>lytic cycle</strong>, and replicate to high numbers. During this process the Shiga toxin gene is massively transcribed, flooding the gut with toxin.</p>

<p>This is why treating EHEC infections with certain antibiotics can paradoxically make things <em>worse</em> \u2014 the antibiotics stress the bacteria and trigger prophage induction, causing even more Shiga toxin to be released.</p>

<div class="key-point"><strong>Key Takeaway:</strong> Shiga toxin production in EHEC is controlled by prophage regulation. Stress breaks down the CI repressor, triggering the lytic cycle and massive toxin release \u2014 this is why antibiotics can worsen EHEC infections.</div>`
          },
          /* 8 */
          {
            title: "LAMP Assay \u2014 Nucleic Acid Detection in the Field",
            content: `<p>The <strong>LAMP assay</strong> (Loop-Mediated Isothermal Amplification) is a practical application of molecular biology for field diagnostics. Unlike PCR, which needs a thermocycler to cycle through different temperatures, LAMP works at a <strong>single constant temperature</strong> (around 65\u00b0C) \u2014 you just need a simple water bath.</p>

<p>The assay uses specific primers to target DNA unique to the organism of interest. If that target DNA is present, the DNA polymerase amplifies it massively. The polymerase activity produces by-products that lower the pH of the reaction, causing a <strong>pH indicator dye</strong> to change colour from <strong>pink to yellow</strong>.</p>

<p>In the practical class example, the target was <em>Streptococcus agalactiae</em>, a pathogen causing <strong>mastitis in dairy cows</strong>. Students added milk lysate to a master mix (containing polymerase, primers, dNTPs, and pH indicator) and incubated at 65\u00b0C for 30\u201340 minutes. A colour change to yellow indicated a positive result.</p>

<div class="key-point"><strong>Key Takeaway:</strong> LAMP is a field-friendly nucleic acid detection method that works at one temperature and gives a visible colour change result, making it ideal for on-farm pathogen detection like mastitis diagnosis in dairy cattle.</div>`

  <li><strong>Hypostome</strong> \u2014 the <strong>main feeding tube</strong>, shaped like an <strong>upside-down saw</strong>. It has backward-facing ridges/barbs along its surface. Once inserted, these ridges anchor the tick firmly in the host \u2014 "if you\u2019re trying to pull out a saw backwards, obviously all of those little ridges are going to make it quite a bit harder." The hypostome is the central structure through which blood is drawn up from the host.</li>

  <li><strong>Palps</strong> \u2014 sensory appendages that flank the hypostome. During feeding, the palps <strong>move to either side</strong> to let the chelicerae and hypostome do their work. They help locate a suitable feeding site but are not directly involved in cutting or anchoring.</li>
</ol>

<p><strong>Cement secretion:</strong> The tick <strong>secretes cement-like substances between the ridges</strong> of the hypostome to further lodge herself into the host\u2019s skin. This cement hardens and makes removal even more difficult.</p>

<table class="compare-table">
<thead><tr><th>Feature</th><th>Hard Ticks (Ixodidae)</th><th>Soft Ticks (Argasidae)</th></tr></thead>
<tbody>

<tr><td>Mouthparts</td><td>Very pronounced, visible from above</td><td>Tucked underneath, less prominent</td></tr>
<tr><td>Cement</td><td>Many species secrete cement to anchor</td><td>Less reliance on cement due to rapid feeding</td></tr>
<tr><td>Pathogen transmission risk</td><td>Higher \u2014 prolonged attachment allows bidirectional pathogen transfer</td><td>Lower per feeding event but still significant</td></tr>
</tbody>
</table>

<p>The feeding video shown in the lecture demonstrated that during prolonged feeding there is a visible <strong>bidirectional flow</strong> \u2014 blood is drawn in, but substances also flow from the tick <em>into</em> the host, which is how potential pathogens are transmitted. This is why ticks are the <strong>number one arthropod vectors of disease-causing agents</strong>.</p>

<div class="key-point"><strong>Key Takeaway:</strong> Tick mouthparts consist of chelicerae (scissors to cut skin), hypostome (upside-down saw with barbs + cement for anchoring), and palps (move aside during feeding). Hard ticks feed for days/weeks; soft ticks feed rapidly, often at night. The prolonged attachment and bidirectional flow during feeding makes hard ticks highly effective disease vectors.</div>`

          {
            title: "Learning Intentions",
            content: `<p>By the end of this lecture, you should be able to:</p><ol><li>Explain why viruses are described as obligate intracellular organisms</li><li>Compare the methods used to grow and detect viruses and evaluate their advantages and limitations</li><li>Describe how viruses are classified and explain why classification aids disease management</li><li>Relate enveloped versus non-enveloped virus structure to environmental stability and disinfection</li><li>Outline the generalised virus replication cycle and explain why incubation periods vary</li><li>Apply knowledge of specific virus families to predict disease presentation and management in agriculture</li></ol>`

          {
            title: "What Are Viruses? Obligate Intracellular Parasites",
            content: `<p>Think of a virus like a <strong>recipe card with no kitchen</strong>. The recipe (genetic instructions) is useless on its own \u2014 it needs to hijack someone else\u2019s kitchen (a living cell) to actually make anything. Unlike bacteria, which are like self-contained food trucks that can cook anywhere, viruses <strong>absolutely must get inside a cell</strong> to reproduce.</p>

<p>Viruses cannot replicate on a bench, in soil, or in water by themselves. They can <em>remain infectious</em> in the environment (the recipe card survives in the rain), but they do not multiply until they are inside a host cell. This makes them <strong>obligate intracellular organisms</strong>.</p>

<p>Historically, viruses were called \u201cfilterable bacteria\u201d because they passed through filters designed to trap bacteria. Scientists could not see them under regular microscopes, yet filtered material could still cause disease in animals. This led to the recognition of viruses as a distinct group of pathogens.</p>

<p>Importantly, <strong>tobacco mosaic virus</strong> was the first virus ever described \u2014 it was discovered in a plant, making virology relevant to agriculture from the very beginning.</p>

<div class="key-point"><strong>Key Takeaway:</strong> Viruses are obligate intracellular parasites that can persist in the environment but can only replicate inside living cells. This fundamental property dictates how we grow, detect, and control them.</div>`

          {
            title: "Growing Viruses: Eggs, Cell Culture, PCR, and Rapid Tests",
            content: `<p>Because viruses need living cells, growing them in the lab is much harder than growing bacteria. Over the decades, scientists developed progressively better methods:</p>

<p><strong>1. Embryonated Eggs</strong>: A fertilised chicken egg is like a sealed, sterile apartment building full of different cell types. Scientists inject virus into various compartments (allantoic cavity, yolk sac, amnion, chorioallantoic membrane). This is still how most <strong>flu vaccines</strong> are made \u2014 that is why they ask about egg allergies. However, it requires access to fertilised eggs, specialised facilities, and is time-consuming.</p>

<p><strong>2. Cell Culture</strong>: In the 1950s\u201360s, scientists discovered they could harvest cells, spread them as a monolayer in flasks, and infect them with virus. Where virus kills cells, you see <strong>plaques</strong> \u2014 holes in the cell sheet, called <strong>cytopathic effects (CPE)</strong>. This is more convenient than eggs but still requires aseptic technique and infectious virus.</p>

<p><strong>3. PCR</strong>: A revolution in the 1990s. PCR amplifies tiny amounts of viral nucleic acid like a photocopier for DNA. It does <strong>not need infectious virus</strong>, just the genetic fingerprint. Samples do not need to stay cold like they do for culture. A lower <strong>CT (cycle threshold)</strong> = more virus; a higher CT = less virus.</p>

<p><strong>4. Rapid Antigen Tests</strong>: Like a pregnancy test for viruses. Cheap, fast, and usable at home or in the field. Less sensitive than PCR but excellent for screening large populations quickly.</p>

<div class="key-point"><strong>Key Takeaway:</strong> Virus detection evolved from eggs \u2192 cell culture \u2192 PCR \u2192 rapid tests. Each method trades off sensitivity, speed, cost, and need for specialised equipment or infectious material.</div>`

<div class="diagram"><img src="https://upload.wikimedia.org/wikipedia/commons/a/aa/Simple_diagram_of_virus_%28en%29.svg" alt="Simple diagram of a virus showing DNA/RNA, envelope, and protein coat structure" style="max-width:100%;height:auto;border-radius:8px;"><p class="diagram-caption">Figure: Enveloped viruses (e.g., herpes, influenza) are fragile; non-enveloped viruses (e.g., parvovirus) are extremely resilient.</p></div>

<table class="compare-table">

<tr><td>Environmental stability</td><td>Fragile \u2014 destroyed by soap, heat, drying, pH changes</td><td>Very resilient \u2014 survives detergents, heat, pH, disinfectants</td></tr>
<tr><td>Transmission</td><td>Usually requires close contact</td><td>Environmental contamination, fomites</td></tr>
<tr><td>Disinfection</td><td>Standard soap and disinfectants effective</td><td>Requires harsh chemicals (formalin) \u2014 some are carcinogenic</td></tr>
</tbody>
</table>

<div class="key-point"><strong>Key Takeaway:</strong> Knowing whether a virus is enveloped or non-enveloped tells you how fragile or resilient it is, which directly determines transmission routes and disinfection strategies.</div>`

            title: "Virus Replication Cycle",
            content: `<p>Despite the enormous diversity of viruses, the basic replication strategy is remarkably consistent. Think of it as a <strong>hijacking in six steps</strong>:</p>

<div class="diagram"><img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Viral_Replication_Cycle.svg" alt="Simplified viral replication cycle diagram showing all major steps" style="max-width:100%;height:auto;border-radius:8px;"><p class="diagram-caption">Figure: The universal virus replication cycle in six steps. Higher initial dose means fewer rounds and a shorter incubation period.</p></div>

<p>This explains why the <strong>incubation period</strong> for the same virus can vary: if you receive a high infectious dose (e.g., in the middle of an outbreak), fewer replication rounds are needed before enough virus accumulates to cause symptoms \u2014 so you get sick faster. A low dose means more rounds of replication, hence a longer incubation.</p>

<div class="key-point"><strong>Key Takeaway:</strong> All viruses follow the same basic cycle: attach \u2192 penetrate \u2192 uncoat \u2192 replicate \u2192 assemble \u2192 release. The size of the initial dose determines how many replication rounds are needed, which affects incubation period length.</div>`

<ul>
  <li><strong>Infectious</strong>: caused by a pathogenic microorganism. All diseases caused by viruses, bacteria, fungi, or parasites are infectious.</li>
  <li><strong>Contagious</strong>: can spread directly from one animal to the next. Influenza is contagious \u2014 if one cow has it, others nearby will catch it through respiratory droplets.</li>
</ul>

<p>All contagious diseases are infectious, but <strong>not all infectious diseases are contagious</strong>. For example, <strong>Japanese encephalitis</strong> and <strong>West Nile virus</strong> are arboviruses \u2014 they need a mosquito to bite an infected animal and then bite another animal. A sick horse standing next to a healthy horse will NOT transmit the virus directly. The disease is infectious but not contagious.</p>

<p>This distinction matters enormously for management. Contagious diseases require <em>isolation</em> and <em>quarantine</em>. Non-contagious infectious diseases require <em>vector control</em> (e.g., mosquito management) rather than separating sick animals from healthy ones.</p>

<div class="key-point"><strong>Key Takeaway:</strong> Infectious means caused by a pathogen. Contagious means it spreads directly between individuals. Arboviruses (spread by insect vectors) are infectious but not contagious \u2014 requiring vector control rather than quarantine.</div>`

<p>In agriculture, <strong>bovine herpes virus</strong> is a major problem in feedlots. When cattle from different properties are transported long distances and mixed together, the stress of transport and re-establishing social hierarchy triggers reactivation. This causes respiratory disease and predisposes cattle to secondary bacterial infections (<strong>bovine respiratory disease complex</strong>). <strong>Equine herpes virus</strong> follows the same pattern in horses and can cause abortion or neurological disease. Management focuses on reducing stress: smaller groups, avoiding mixing unfamiliar animals, and minimising long-distance transport of pregnant mares.</p>

<p>The <strong>Capripox viruses</strong> \u2014 sheeppox, goatpox, and <strong>lumpy skin disease (LSD)</strong> \u2014 are expanding globally. LSD has reached Indonesia, making it a dire threat to Australia\u2019s ~38 million cattle. If it arrived, all cattle exports would stop, devastating the agricultural economy. LSD spreads through biting insects mechanically carrying virus from animal to animal, or through contaminated needles.</p>

<p>The key variables are:</p>

<table class="compare-table">
<thead><tr><th>Genome Type</th><th>What It Means</th><th>Examples</th></tr></thead>
<tbody>
<tr><td><strong>dsDNA</strong></td><td>Double-stranded DNA; replicates using host or viral DNA polymerase; most stable genomes</td><td>Herpes viruses, Pox viruses</td></tr>

<tr><td><strong>dsRNA</strong></td><td>Double-stranded RNA; carries its own RNA-dependent RNA polymerase</td><td>Rotaviruses</td></tr>

<p><strong>Why this matters:</strong></p>

<ul>
  <li><strong>Symbiotic fungi</strong> \u2014 both the plant and fungus benefit. Examples include <strong>endophytes</strong> (live inside the plant, improving nutrient acquisition and stress tolerance) and <strong>mycorrhizae</strong> (root-associated fungi that extend the root\u2019s reach in soil).</li>

<p>Think of it like tenants in a building: some pay rent and help maintain the property (symbiotic), while others trash the place and refuse to leave (pathogenic).</p>

<div class="key-point"><strong>Key Takeaway:</strong> Agricultural fungi are either symbiotic (beneficial \u2014 mycorrhizae, endophytes) or pathogenic (harmful \u2014 causing yield loss, quality reduction, and mycotoxin contamination). Understanding which you are dealing with is critical for management.</div>`

<p>Traditional classification uses morphology: colony appearance, spore shape/size/colour, and microscopic structures. However, morphology can change with environmental conditions, and many genetically distinct species look identical under the microscope. This is why molecular methods are now essential.</p>

<div class="key-point"><strong>Key Takeaway:</strong> Filamentous fungi grow as hyphae (septate or aseptate). Morphological identification gets you to genus level but often fails at species level \u2014 molecular tools (ITS sequencing) are needed for accurate identification.</div>`

          {
            title: "What Are Plant-Parasitic Nematodes?",
            content: `<p>Plant-parasitic nematodes are microscopic roundworms in the soil that attack plant roots. Unlike the animal nematodes from Lecture 8, these are much smaller and specialise in feeding on plants using a distinctive <strong>stylet</strong> \u2014 a hollow, needle-like mouthpart.</p>

<p>The plant-parasitic stylet is <strong>large, prominent, and has knobs at its base</strong>, making it distinguishable from the much smaller stylets of fungal-feeding nematodes. The tip is barbed like a spear so once it penetrates, it stays anchored. Being hollow, the stylet allows the nematode to both <strong>inject enzymes</strong> (cellulases, cutinases) into plant cells and <strong>suck out nutrients</strong>.</p>

<p>There are five trophic groups of nematodes: bacterial feeders, fungal feeders, <strong>plant parasites</strong>, predators, and omnivores. Only plant parasites have the large, knobbed stylet. A \u201chealthy soil\u201d has a diverse mix of all five groups in balance.</p>

<div class="key-point"><strong>Key Takeaway:</strong> Plant-parasitic nematodes are identified by their large, knobbed stylet. This hollow needle injects enzymes and sucks nutrients from plant cells, causing significant crop damage.</div>`

          {
            title: "Nematode Life Cycle",
            content: `<p>All plant-parasitic nematodes share essentially the <strong>same life cycle</strong> with 6 stages: egg \u2192 J1 \u2192 J2 \u2192 J3 \u2192 J4 \u2192 adult. The J1 (first juvenile) always remains <strong>inside the egg</strong>. The J2 is the stage that hatches and, in many species, is the <strong>infective stage</strong>.</p>

<p>Between each juvenile stage, the nematode <strong>moults</strong> (sheds its outer cuticle, which contains collagen and cannot stretch beyond a certain point). The cuticle stretches somewhat but eventually must be shed to allow further growth. After the final moult, nematodes differentiate into males and females.</p>

<p>The entire cycle can take as little as <strong>2\u20134 weeks</strong> depending on temperature and moisture, meaning populations can explode during a growing season with multiple generations of reinfection.</p>

<div class="key-point"><strong>Key Takeaway:</strong> All plant nematodes have 6 life stages (egg + 4 juveniles + adult). J1 is always in the egg; J2 hatches out and is often the infective stage. The short 2\u20134 week cycle allows rapid population buildup.</div>`

<table class="compare-table">
<thead><tr><th>Feature</th><th>Root-Knot Nematodes</th><th>Cyst Nematodes</th></tr></thead>

<tr><td>Visible symptom</td><td>Galls/knots on roots</td><td>Brush-like, stubby roots</td></tr>

<p>Root-knot nematodes are among the most damaging globally, capable of causing <strong>complete yield loss</strong>. Above-ground symptoms (wilting, yellowing) can be confused with water stress, nutrient deficiency, or bacterial wilt \u2014 you must dig up the roots and look for galls to confirm diagnosis.</p>

            content: `<p>These two terms are critically different and commonly confused:</p>

<div class="diagram">
<svg overflow="visible" viewBox="-50 -50 810 300" xmlns="http://www.w3.org/2000/svg">
  <text x="350" y="20" text-anchor="middle" fill="#264653" font-size="13" font-weight="bold">Resistance vs Tolerance</text>
  <!-- Resistant -->
  <rect x="40" y="45" width="280" height="130" rx="10" fill="#2a9d8f" opacity="0.1" stroke="#2a9d8f" stroke-width="2"/>
  <text x="180" y="70" text-anchor="middle" fill="#2a9d8f" font-size="12" font-weight="bold">RESISTANT Crop</text>
  <text x="180" y="92" text-anchor="middle" fill="#264653" font-size="10">\u2714 Nematodes CANNOT infect</text>
  <text x="180" y="110" text-anchor="middle" fill="#264653" font-size="10">\u2714 No yield loss</text>
  <text x="180" y="128" text-anchor="middle" fill="#2a9d8f" font-size="10" font-weight="bold">\u2714 Nematode population DECREASES</text>
  <text x="180" y="155" text-anchor="middle" fill="#264653" font-size="9">Safe for next season\u2019s crop</text>

  <!-- Tolerant -->
  <rect x="380" y="45" width="280" height="130" rx="10" fill="#e76f51" opacity="0.1" stroke="#e76f51" stroke-width="2"/>
  <text x="520" y="70" text-anchor="middle" fill="#e76f51" font-size="12" font-weight="bold">TOLERANT Crop</text>
  <text x="520" y="92" text-anchor="middle" fill="#264653" font-size="10">\u2714 Good yield despite infection</text>
  <text x="520" y="110" text-anchor="middle" fill="#264653" font-size="10">\u2714 Minimal symptoms shown</text>
  <text x="520" y="128" text-anchor="middle" fill="#e76f51" font-size="10" font-weight="bold">\u2716 Nematode population INCREASES</text>
  <text x="520" y="155" text-anchor="middle" fill="#e76f51" font-size="9">\u26a0 Next crop at HIGH RISK!</text>

<p>A <strong>resistant</strong> crop prevents the nematode from infecting, so populations decline. A <strong>tolerant</strong> crop still allows infection and nematode reproduction, but the plant shows minimal symptoms and maintains acceptable yield. The danger: after a tolerant crop, nematode numbers are <em>higher</em>, putting the next crop at serious risk. You must choose your follow-up crop carefully.</p>

            content: `<p>In the soil, pathogens rarely work alone. Nematodes <strong>pierce through roots</strong>, creating entry points for bacteria and fungi that would otherwise struggle to penetrate. This creates <strong>disease complexes</strong> where nematodes and other pathogens together cause far worse symptoms than either alone.</p>

<p>Key examples:</p>
<ul>
  <li><strong>Potato early dying syndrome</strong> \u2014 the combined effect of root-lesion nematodes (<em>Pratylenchus</em>) and <em>Verticillium</em> fungus. Neither alone replicates the full disease; both are needed.</li>
  <li><strong>Fusarium wilt of cotton</strong> \u2014 exacerbated by <em>Meloidogyne</em> (root-knot nematodes). Each is pathogenic alone, but together they are synergistic.</li>
  <li><strong>Annual ryegrass toxicity</strong> \u2014 toxic bacteria (<em>Rathayibacter</em>) are carried into ryegrass by nematodes attached to their cuticle, poisoning livestock.</li>
</ul>

<p>Ectoparasitic nematodes (dagger nematodes, needle nematodes) can <strong>vector plant viruses</strong>. They acquire the virus from an infected plant and can transmit it within an hour. The virus can remain in the nematode for up to a month (until it dies).</p>

<div class="key-point"><strong>Key Takeaway:</strong> Nematodes rarely cause damage alone. They create entry points for fungi and bacteria, form disease complexes, and can vector viruses. Understanding these interactions is essential for accurate field diagnosis and effective control.</div>`

  <li><strong>Crop rotation</strong> \u2014 using non-host crops to starve nematodes (e.g., legumes for cereal cyst nematode).</li>
  <li><strong>Soil testing</strong> \u2014 Australian growers test soil before planting to assess nematode levels against economic risk thresholds.</li>
  <li><strong>Fallowing</strong> \u2014 leaving the field unplanted to reduce populations (but time-consuming).</li>
  <li><strong>Time of sowing</strong> \u2014 planting earlier or later to avoid peak J2 hatching or exploit temperature effects on nematode activity.</li>
  <li><strong>Chemical nematicides</strong> \u2014 effective but expensive, many are banned due to environmental damage. Practical mainly for high-value horticultural crops.</li>
  <li><strong>Biological control</strong> \u2014 fungi that trap nematodes exist but lack consistency at field scale. Maintaining a diverse, healthy soil microbiome is the best biological approach.</li>
</ul>

<div class="key-point"><strong>Key Takeaway:</strong> Nematode management requires an integrated approach: resistant/tolerant cultivars, crop rotation, soil testing, strategic timing, and sometimes nematicides. No single method is sufficient alone.</div>`

          {term: "Ectoparasite (nematode)", def: "A nematode that feeds from outside the root using a very long stylet. Can act as a virus vector."},
          {term: "Endoparasite (nematode)", def: "A nematode that enters and feeds inside the root tissue."},
          {term: "Migratory endoparasite", def: "A nematode that moves through root tissue while feeding, causing necrotic lesions (e.g., root lesion nematodes)."},
          {term: "Sedentary endoparasite", def: "A nematode that enters a root, establishes a permanent feeding site, and does not move (e.g., root-knot, cyst nematodes)."},
          {term: "Semi-endoparasite", def: "A nematode that partially penetrates the root (head inside, body outside), forming a permanent feeding cell."},

          {q: "How do you distinguish a plant-parasitic nematode from a fungal-feeding nematode under the microscope?", opts: ["Plant parasites are much larger overall", "Plant parasites have a large, prominent stylet with knobs at the base; fungal feeders have a much smaller stylet", "Fungal feeders have a stylet; plant parasites do not", "Plant parasites have teeth instead of a stylet"], ans: 1, exp: "Plant-parasitic nematodes have a large, prominent stylet with knobs at the base. Fungal feeders have a much smaller, thinner stylet without knobs."},
          {q: "Which nematode feeding style is most likely to act as a plant virus vector?", opts: ["Sedentary endoparasite", "Migratory endoparasite", "Ectoparasite", "Semi-endoparasite"], ans: 2, exp: "Ectoparasites feed from outside the root and can move freely between plants, making them the feeding style most likely to transmit viruses from one plant to another."},

{q:"A student examining soil nematodes under a microscope identifies a nematode with a very prominent, large stylet with knobs at its base. What type of nematode is this most likely?",opts:["A bacterial feeder", "A fungal feeder", "A plant parasitic nematode", "A predatory nematode"],ans:2,exp:"Plant parasitic nematodes are characterised by a prominent, large piercing stylet with knobs at its base. This distinguishes them from fungal feeders (which have a smaller stylet without knobs), bacterial feeders (which lack a stylet), and predators (which have teeth or spears)."},
{q:"All plant parasitic nematodes share a common life cycle structure. How many juvenile stages do they have, and which stage is always found inside the egg?",opts:["3 juvenile stages; J1 is inside the egg", "4 juvenile stages; J1 is always inside the egg", "4 juvenile stages; J4 is always inside the egg", "2 juvenile stages; J2 is inside the egg"],ans:1,exp:"All nematodes have 4 juvenile stages (J1-J4) plus an adult stage (6 total life stages). J1 is always inside the egg, and J2 is always the stage that hatches from the egg. After hatching, juveniles grow by moulting (shedding their cuticle) between each stage."},
{q:"A farmer growing wheat notices patchy, stunted growth in certain areas of the field. Upon digging up plants, the roots appear stubby and brush-like. Soil testing reveals high populations of Heterodera. What type of nematode is this?",opts:["Root knot nematode (migratory endoparasite)", "Root lesion nematode (migratory endoparasite)", "Cereal cyst nematode (sedentary endoparasite)", "Dagger nematode (ectoparasite)"],ans:2,exp:"Heterodera is a cereal cyst nematode - a sedentary endoparasite. The stubby, brush-like roots and patchy crop growth are characteristic symptoms. Female cyst nematodes enlarge and their bodies become cysts containing eggs, which can survive in soil for very long periods, making control difficult."},
{q:"What is the key difference between a 'tolerant' crop and a 'resistant' crop when it comes to nematode management?",opts:["Tolerant crops kill the nematodes; resistant crops just reduce symptoms", "Resistant crops prevent nematode infection entirely; tolerant crops get infected but still produce acceptable yields, while nematode populations increase", "There is no difference between tolerance and resistance", "Tolerant crops are always more expensive than resistant crops"],ans:1,exp:"A resistant crop prevents nematode infection - the nematodes cannot establish. A tolerant crop gets infected but can still produce adequate yield despite infection. The critical management concern is that tolerant crops allow nematode populations to increase during the season, potentially creating problems for the next crop. Growers must plan the subsequent crop carefully after planting a tolerant variety."},
{q:"Root lesion nematodes (Pratylenchus spp.) are described as migratory endoparasites. Why do they cause necrotic lesions on roots?",opts:["They inject toxic saliva from outside the root", "They move continuously through root tissue, destroying cells and producing cell-wall degrading enzymes as they go", "They form cysts on the root surface", "They attract secondary fungal pathogens that cause the lesions"],ans:1,exp:"As migratory endoparasites, root lesion nematodes continuously move through root tissue, feeding on and destroying cells as they go. They secrete cell-wall degrading enzymes (cellulases, cutinases) to facilitate movement and feeding. This constant movement and cell destruction produces the characteristic necrotic lesions on roots."},
{q:"Why are ectoparasitic nematodes (like dagger nematodes) particularly important as vectors of plant viruses?",opts:["They inject viruses directly into the vascular system", "They remain outside the root and can move freely between plants in the soil, acquiring viruses from one plant and transmitting them to another", "They carry viruses in their eggs", "They only transmit viruses to dead plant tissue"],ans:1,exp:"Ectoparasitic nematodes feed from outside the root using their very long stylet and can move freely through the soil from plant to plant. This mobility allows them to acquire viruses from an infected plant and transmit them to healthy plants. Sedentary endoparasites cannot do this because they are immobile once established. A virus acquired by an ectoparasitic nematode can persist in it for up to a month."},
{q:"A potato farmer discovers that despite no visible nematode symptoms during the growing season, yield at harvest is 30% lower than expected. How is this possible?",opts:["The nematodes only attack after harvest", "The crop may be tolerant, showing no visible symptoms while still being infected and suffering yield loss", "Nematodes only reduce quality, not quantity", "The yield reduction must be caused by something other than nematodes"],ans:1,exp:"Some crops are tolerant to nematode infection, meaning they don't show obvious symptoms (stunting, yellowing) even while infected. The nematodes still feed on the roots and reduce nutrient/water uptake, causing yield loss. When nematode distribution is even across the field, there are no obvious patches of poor growth, making visual detection nearly impossible."},
{q:"Potato early dying syndrome is a well-known example of a disease complex. What two organisms are involved, and why is understanding the complex important for research?",opts:["Two different nematode species working together", "Pratylenchus (nematode) and Verticillium (fungus) - neither alone reproduces the full disease symptoms; both are needed together", "A virus and a bacterium that must co-infect", "Two fungal species that compete for the same root tissue"],ans:1,exp:"Potato early dying syndrome is caused by the interaction between Pratylenchus (root lesion nematode) and Verticillium (a fungus), causing about 30% yield loss. Critically, researchers could not replicate the disease in glasshouse studies by using either pathogen alone - only when both were inoculated together did the full symptoms appear. This illustrates why understanding disease complexes is essential for accurate research."},
{q:"The annual ryegrass toxicity complex involves nematodes, bacteria, and livestock. What is the role of the nematode in this disease?",opts:["The nematode directly produces toxins that harm livestock", "The nematode infects ryegrass and carries toxin-producing Rathayibacter bacteria attached to its cuticle, introducing them into the plant", "The nematode feeds on the bacteria, concentrating the toxin", "The nematode infects the livestock directly"],ans:1,exp:"In annual ryegrass toxicity, Rathayibacter bacteria (which produce toxins harmful to livestock) attach to the cuticle of nematodes. The nematodes infect the ryegrass, creating entry points and carrying the bacteria into the plant. Livestock then eat the contaminated ryegrass and are poisoned. The nematode serves as the vector for the bacterium."},
{q:"A tomato grower notices plants wilting and, upon pulling them up, sees large galls/knots on the roots full of eggs. Which nematode is the most likely culprit?",opts:["Cereal cyst nematode (Heterodera)", "Root knot nematode (Meloidogyne)", "Root lesion nematode (Pratylenchus)", "Dagger nematode"],ans:1,exp:"Root knot nematodes (Meloidogyne, or RKN) are sedentary endoparasites that cause characteristic galls/knots on roots where females lay their eggs. They infect a wide range of crops including tomato and can cause complete yield loss. The wilting occurs because galled roots cannot efficiently uptake water and nutrients."},
{q:"Why is fallowing (leaving a field unplanted for a season) a useful strategy for managing some nematode species but less effective for cyst nematodes?",opts:["Cyst nematodes only feed on weeds, which grow during fallow", "Cyst nematode eggs are protected within resistant cysts that can survive dormant in soil for very long periods, even without a host", "Fallowing increases soil temperature which favours cyst nematode hatching", "Cyst nematodes are ectoparasites that feed on soil organic matter"],ans:1,exp:"Cyst nematodes are particularly difficult to control because the female's body transforms into a tough, protective cyst containing hundreds of eggs. These cysts can remain dormant in soil for years, only hatching when they sense root exudates from a suitable host. Fallowing alone may not reduce populations sufficiently because the eggs simply wait."},
{q:"What is the function of moulting in the nematode life cycle?",opts:["It is the process of egg laying", "It is the shedding of the cuticle to allow growth to the next juvenile stage", "It is the process of entering the root", "It is the formation of a cyst"],ans:1,exp:"Moulting is the shedding of the nematode's external cuticle (which contains collagen and can stretch somewhat but has limits). Between each juvenile stage (J1 to J2, J2 to J3, etc.), the nematode moults to accommodate growth. After the final moult, nematodes differentiate into males and females."},
{q:"A soil test before planting shows nematode levels below the economic damage threshold. The farmer decides to plant a susceptible crop. What risk does this decision carry?",opts:["No risk - below threshold means no nematodes are present", "Even below-threshold populations can multiply during the season on a susceptible host, potentially exceeding the threshold by harvest and creating problems for the next crop", "Susceptible crops always die regardless of nematode levels", "Below-threshold nematode populations cannot infect crops"],ans:1,exp:"Nematodes can complete their life cycle in 2-4 weeks, so populations multiply rapidly during the growing season. Even if starting below the damage threshold, a susceptible crop provides food and habitat for exponential nematode reproduction. By season's end, populations may be very high, posing serious risk to subsequent crops."},
{q:"Semi-endoparasitic nematodes have a unique feeding strategy. How does their behaviour differ from true endoparasites?",opts:["They feed entirely from outside the root like ectoparasites", "Only the head penetrates the root to form a permanent feeding cell, while the posterior remains outside; they become sedentary after establishment", "They move freely through the root like migratory endoparasites", "They alternate between being inside and outside the root throughout their life"],ans:1,exp:"Semi-endoparasitic nematodes partially penetrate the root - typically only the head region enters to establish a permanent feeding cell. The rest of the body remains outside. After establishing the feeding site, they become sedentary. If the host plant dies, the nematode dies too since it cannot relocate."},
{q:"Why are chemical nematicides increasingly impractical for broad-acre cropping in Australia?",opts:["Nematicides have never been effective against any nematode species", "Many effective nematicides have been banned due to harm to beneficial soil organisms, and remaining options are expensive and impractical at broad-acre scale", "Australian nematodes are genetically immune to all chemicals", "Nematicides are only available in Europe"],ans:1,exp:"Many previously effective and cheap nematicides (including fumigants) have been banned because they are non-selective and kill beneficial soil organisms along with the nematodes. Remaining nematicides are more specific but expensive, making them impractical for large-scale broadacre cropping. They may be cost-effective only for high-value horticultural crops where the yield benefit exceeds the cost."}]

          {
            title: "Learning Intentions",
            content: `<p>By the end of this lecture, you should be able to:</p><ol><li>Explain how PGPRs protect plants directly and indirectly through Induced Systemic Resistance</li><li>Explain why bacteria can only infect plants passively and how this influences symptoms</li><li>Identify major symptom types caused by bacterial plant pathogens and explain their mechanisms</li><li>Describe the significance of key biosecurity threats to Australia (fire blight, Xylella)</li><li>Compare vertical and horizontal virus transmission and distinguish between non-persistent, semi-persistent, and persistent transmission</li><li>Evaluate whether applying insecticides will reduce or worsen the spread of a given virus</li></ol>`
          },
          {
            title: "Beneficial Bacteria and Induced Systemic Resistance",
            content: `<p>Not all bacteria harm plants. Some are beneficial <strong>Plant Growth Promoting Rhizobacteria (PGPRs)</strong> that live around roots and improve plant health. They can directly inhibit fungal pathogens by producing <strong>chitinases</strong> (which break down chitin in fungal cell walls) and <strong>glucanases</strong> (which break down glucan).</p>

<p>Even more remarkably, some rhizobacteria can trigger <strong>Induced Systemic Resistance (ISR)</strong> \u2014 a state of heightened defence throughout the entire plant. Think of it like a vaccine for plants: the bacteria in the soil \u201cprime\u201d the plant\u2019s immune system, so even the leaves above ground are better prepared to fight off attackers. ISR has been documented with <em>Bacillus</em> and <em>Pseudomonas</em> species against soil-borne pathogens like nematodes and <em>Fusarium</em>.</p>

<p>ISR mechanisms include: volatile organic compounds that change gene expression in the plant, signalling cascades that prepare defence pathways, and enhanced production of antimicrobial compounds. The resistance is truly systemic \u2014 root bacteria can protect against foliar (leaf) pathogens.</p>

<div class="key-point"><strong>Key Takeaway:</strong> PGPRs are beneficial root bacteria that can directly kill pathogens (chitinases, glucanases) or prime the entire plant\u2019s defences through Induced Systemic Resistance (ISR) \u2014 analogous to vaccinating a plant.</div>`
          },
          {
            title: "How Bacteria Infect Plants \u2014 Passive Entry Only",
            content: `<p>A crucial difference between fungal and bacterial plant pathogens: <strong>bacteria cannot actively penetrate plants</strong>. Unlike aggressive fungi that produce appressoria to force through the cuticle, bacteria are passive opportunists. They need an <strong>open door</strong> \u2014 a wound (from hail, insects, machinery, pruning) or a natural opening (stomate, lenticel, hydathode).</p>

<p>Bacteria spread via wind-blown rain splash, contaminated irrigation water, insects, and human activity (machinery, shoes, tools). Once inside, many produce <strong>toxins and virulence factors</strong> that cause hormonal imbalances, leading to symptoms like soft rot, leaf spots, wilting, or galls.</p>

<p>Important bacterial symptoms include:</p>
<ul>
  <li><strong>Soft rot</strong> \u2014 bacteria survive in crop debris and reach vegetables through water splash; form biofilms (sticky protective communities) that are extremely difficult to wash off.</li>
  <li><strong>Leaf spots with chlorotic halos</strong> \u2014 e.g., halo blight of mung beans (very important in Queensland/NSW).</li>
  <li><strong>Wilting</strong> \u2014 e.g., <em>Ralstonia</em> in tomatoes; identical symptoms to nematode damage, water stress, or <em>Verticillium</em> wilt.</li>
  <li><strong>Galls</strong> \u2014 e.g., <em>Agrobacterium</em> with its tumour-inducing plasmid.</li>
</ul>

<div class="key-point"><strong>Key Takeaway:</strong> Bacteria enter plants passively through wounds or natural openings. They cannot force through intact cuticle. This means preventing wounds and maintaining sanitation are critical control strategies.</div>`
          },
          {
            title: "Agrobacterium and the Ti Plasmid",
            content: `<p><em>Agrobacterium</em> is a natural \u201cgenetic hacker.\u201d It carries a <strong>Ti plasmid</strong> (Tumour-inducing plasmid) \u2014 a large circular DNA molecule. During infection, the bacterium transfers a portion of this plasmid\u2019s DNA (<strong>T-DNA</strong>) into the plant\u2019s own genome. The T-DNA encodes genes that cause hormonal imbalances, resulting in uncontrolled cell growth \u2014 <strong>galls</strong> (tumour-like growths).</p>

<div class="diagram"><img src="https://upload.wikimedia.org/wikipedia/commons/a/ae/Transfection_by_Agrobacterium.svg" alt="Agrobacterium transfection diagram showing Ti plasmid T-DNA transfer into plant genome" style="max-width:100%;height:auto;border-radius:8px;"><p class="diagram-caption">Figure: Agrobacterium transfers T-DNA from its Ti plasmid into the plant genome, causing galls. Scientists exploit this for genetic engineering.</p></div>

<p>Scientists turned this natural \u201chacking\u201d into a <strong>biotechnology tool</strong>: they replace the harmful T-DNA with useful genes and let Agrobacterium deliver them into crop genomes. This is the basis of genetic engineering in many plants.</p>

<div class="key-point"><strong>Key Takeaway:</strong> Agrobacterium naturally transfers T-DNA from its Ti plasmid into plant genomes, causing galls. This mechanism has been co-opted as one of the most important tools in plant genetic engineering.</div>`
          },
          {
            title: "Biosecurity Threats: Fire Blight and Xylella",
            content: `<p>Two bacterial diseases represent critical <strong>biosecurity threats</strong> to Australia:</p>

<p><strong>Fire blight</strong> (<em>Erwinia amylovora</em>) \u2014 devastates apples and pears. Branches look as if they were set on fire (black dieback). Australia is officially free of fire blight. In 1997, a less aggressive strain was found on a <em>Cotoneaster</em> in a Melbourne botanic garden, causing a diplomatic crisis with Japan (which stopped importing Australian apples). The plant was destroyed and Australia maintained its fire blight-free status, though apple imports from New Zealand are now permitted with strict phytosanitary measures.</p>

<p><strong>Xylella / Pierce\u2019s disease</strong> \u2014 <strong>Australia\u2019s number one biosecurity threat</strong>. It can infect grapes, almonds, avocados, and many other crops. Entire vineyards in Spain have been destroyed within years. Symptoms are insidious (resemble salinity or water stress), making early detection extremely difficult. If Xylella arrived with its insect vector, losses could reach <strong>billions of dollars</strong>.</p>

<div class="key-point"><strong>Key Takeaway:</strong> Fire blight and Xylella are devastating bacterial diseases not yet established in Australia. Xylella is the number one biosecurity priority \u2014 it can destroy entire vineyards and orchards, and its symptoms mimic abiotic stress.</div>`
          },
          {
            title: "Plant Viruses \u2014 Symptoms and Diagnosis",
            content: `<p>Plant viruses hijack cell resources to replicate, causing the plant to divert energy from growth and photosynthesis. Cell-to-cell movement through <strong>plasmodesmata</strong> is slow (days), but once a virus reaches the <strong>vascular system</strong>, it spreads systemically and rapidly.</p>

<p>Virus symptoms are often distinctive:</p>
<ul>
  <li><strong>Mosaic</strong> \u2014 intermingled yellow and green patches on leaves (very characteristic of viruses)</li>
  <li><strong>Ring spots</strong> \u2014 circular discolourations (highly diagnostic for viruses)</li>
  <li><strong>Mottling</strong> \u2014 patchy, fuzzy discolouration</li>
  <li><strong>Vein clearing/banding</strong> \u2014 yellowing along veins; leaf roll virus in grapes turns leaves red with green veins</li>
  <li><strong>Necrosis</strong> \u2014 can be the plant\u2019s own hypersensitive response killing cells to stop virus spread</li>
  <li><strong>Stunting and deformation</strong> \u2014 leaf curling, distortion</li>
</ul>

<p>Important caveat: virus symptoms can be <strong>transient</strong> \u2014 visible at one growth stage but not another \u2014 and can be confused with nutritional deficiencies or abiotic stress. Lab confirmation is essential.</p>

<div class="key-point"><strong>Key Takeaway:</strong> Mosaic patterns and ring spots are strongly indicative of viral infection. However, symptoms can be transient and mimic nutrient deficiencies, so laboratory confirmation (PCR, ELISA) is always recommended.</div>`

          {
            title: "Virus Transmission: Vertical, Horizontal, and Vector Types",
            content: `<p>Plant viruses cannot infect on their own \u2014 they need <strong>assisted entry</strong>. Understanding transmission type is crucial because it determines control strategy.</p>

<p><strong>Vertical transmission</strong> (parent to offspring): virus passes through pollen or egg into the seed. This is why <strong>virus-free seed</strong> is so important for biosecurity.</p>

<p><strong>Horizontal transmission</strong> (between plants of the same generation): always assisted \u2014 by insect vectors, nematodes, fungi (chytrid zoospores), mechanical damage, or vegetative propagation. This is what causes <strong>epidemics</strong>.</p>

<div class="diagram">

<p class="diagram-caption">Figure: Three types of vector transmission \u2014 non-persistent (hours, mouthparts), semi-persistent (days, foregut), persistent (lifetime, multiplies in vector).</p>
</div>

<p>For <strong>non-persistent</strong> viruses, insecticide spraying is counterproductive \u2014 it agitates aphids, making them hop between more plants and spread the virus faster. For <strong>persistent</strong> viruses, insecticides are most effective because there is an incubation period (time to act) and the vector remains infectious for life.</p>

<div class="key-point"><strong>Key Takeaway:</strong> Knowing the transmission type determines control strategy. Insecticides are useful for persistent viruses but can worsen non-persistent virus spread by agitating vectors. Virus-free seed is critical for preventing vertical transmission.</div>`

<p><strong>The critical insight about insecticides:</strong></p>

<div class="diagram"><img src="https://upload.wikimedia.org/wikipedia/commons/c/cc/Mycorrhiza.svg" alt="Mycorrhiza diagram showing fungal hyphae in plant root, arbuscules, vesicles, and nutrient exchange" style="max-width:100%;height:auto;border-radius:8px;"><p class="diagram-caption">Figure: AMF colonisation proceeds through signalling, hyphopodium formation, PPA-guided penetration, and arbuscule development for nutrient exchange.</p></div>

<p>The key insight is that the plant is an <strong>active participant</strong> \u2014 it forms the PPA roadmap and produces nutrient transporters and transcription factors to enable the exchange. The <strong>SYM pathway</strong> (common symbiosis pathway) is a conserved signal transduction pathway that prepares the plant for successful AMF association.</p>

<p>This matters for management: the plant\u2019s <strong>hypersensitive response</strong> (killing its own cells) works well against biotrophs (starving them of living tissue) but <em>helps</em> necrotrophs (giving them the dead tissue they want). Hemibiotrophs are especially tricky because they are undetectable during their biotrophic phase and only show symptoms after switching to necrotrophy.</p>

<p>The plasma membrane <strong>invaginates</strong> (folds inward) around the haustorium, creating a nutrient exchange interface without the cell dying. This is how powdery mildews, rusts, and similar obligate biotrophs maintain their host. They produce limited enzymes and toxins to avoid triggering cell death.</p>

    // ==========================================
    // STATE MANAGEMENT
    // ==========================================
    const STORAGE_KEY = 'microStudyState';

    function getDefaultState() {
      return {
        currentView: 'dashboard',
        currentWeek: null,
        currentLecture: null,
        currentTab: 'learn',
        quizState: {},    // { "w1l1": { answers: {0: 2, 1: 1}, score: 1 } }
        progress: {},     // { "w1l1": "viewed" | "partial" | "complete" }
        theme: 'light',
        expandedWeeks: {},
        expandedCards: {},
        saRatings: {},
        liChecked: {},
        examState: { active:false, config:{}, questions:[], answers:{}, currentQ:0, startTime:null, finished:false },
        examHistory: [],
        flashcardState: { mastery:{}, currentDeck:[], currentIndex:0, filter:'all', flipped:false, sessionStats:{known:0,learning:0} }
      };
    }

    let state = getDefaultState();

    function resetState() {
      var defaults = getDefaultState();
      for (var key in defaults) {
        if (defaults.hasOwnProperty(key)) state[key] = defaults[key];
      }
    }

    function loadState() {
      try {
        var saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
          var parsed = JSON.parse(saved);
          for (var key in parsed) {
            if (parsed.hasOwnProperty(key)) state[key] = parsed[key];
          }
        }
      } catch (e) { /* ignore */ }
    }

    var saveTimeout = null;
    function saveState() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      } catch (e) { /* ignore */ }
      // Debounced Firestore save
      if (currentUser) {
        if (saveTimeout) clearTimeout(saveTimeout);
        saveTimeout = setTimeout(function() {
          db.collection('users').doc(currentUser.uid).set({
            state: JSON.stringify(state),
            email: currentUser.email,
            displayName: currentUser.displayName,
            lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
          }, {merge: true}).catch(function(err) {
            console.error('Firestore save error:', err);
          });
        }, 2000);
      }
    }

    function loadUserProgress() {
      if (!currentUser) return;
      db.collection('users').doc(currentUser.uid).get().then(function(doc) {
        if (doc.exists && doc.data().state) {
          var saved = JSON.parse(doc.data().state);
          for (var key in saved) {
            if (saved.hasOwnProperty(key)) state[key] = saved[key];
          }
        }
        // Re-render after loading
        if (state.currentView === 'dashboard') renderDashboard();
        else renderLecture();
        buildSidebar();
      }).catch(function(err) {
        console.error('Firestore load error:', err);
      });
    }

    function lectureKey(wId, lId) { return `w${wId}l${lId}`; }

    // ==========================================
    // THEME
    // ==========================================
    function applyTheme() {
      document.documentElement.setAttribute('data-theme', state.theme);
      document.getElementById('themeIcon').textContent = state.theme === 'dark' ? '\u2600\uFE0F' : '\uD83C\uDF19';
    }

    function toggleTheme() {
      state.theme = state.theme === 'dark' ? 'light' : 'dark';
      applyTheme();
      saveState();
    }

    // ==========================================
    // SIDEBAR
    // ==========================================
    function buildSidebar() {
      const nav = document.getElementById('sidebarNav');
      let html = '';
      COURSE.weeks.forEach(week => {
        const isExpanded = state.expandedWeeks[week.id];
        html += `<div class="week-group">
          <div class="week-header ${isExpanded ? 'expanded' : ''}" onclick="toggleWeek(${week.id})">
            <span class="arrow">\u25B6</span>
            ${week.title}
          </div>
          <div class="week-lectures ${isExpanded ? 'open' : ''}">`;
        week.lectures.forEach(lec => {
          const key = lectureKey(week.id, lec.id);
          const prog = state.progress[key] || 'none';
          const isActive = state.currentView === 'lecture' && state.currentWeek === week.id && state.currentLecture === lec.id;
          html += `<button class="lecture-btn ${isActive ? 'active' : ''}" onclick="showLecture(${week.id}, ${lec.id})">
            <span class="progress-dot ${prog}"></span>
            <span class="lecture-btn-text">${lec.title}</span>
          </button>`;
        });
        html += `</div></div>`;
      });
      nav.innerHTML = html;
    }

    function toggleWeek(weekId) {
      state.expandedWeeks[weekId] = !state.expandedWeeks[weekId];
      saveState();
      buildSidebar();
    }

    function updateSidebarActive() {
      const dashBtn = document.getElementById('dashboardBtn');
      dashBtn.classList.toggle('active', state.currentView === 'dashboard');
      buildSidebar();
    }

    // Mobile sidebar
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('sidebarOverlay').classList.toggle('open');
      setTimeout(() => {
        document.getElementById('sidebarOverlay').classList.toggle('visible');
      }, 10);
    }
    function closeSidebar() {
      document.getElementById('sidebar').classList.remove('open');
      const overlay = document.getElementById('sidebarOverlay');
      overlay.classList.remove('visible');
      setTimeout(() => overlay.classList.remove('open'), 300);
    }

    // ==========================================
    // NAVIGATION
    // ==========================================
    function showDashboard() {
      stopTTS();
      cleanupExam();
      state.currentView = 'dashboard';
      state.currentWeek = null;
      state.currentLecture = null;
      saveState();
      updateHash();
      updateSidebarActive();
      renderDashboard();
      closeSidebar();
    }

    function showLecture(weekId, lectureId) {
      stopTTS();
      cleanupExam();
      state.currentView = 'lecture';
      state.currentWeek = weekId;
      state.currentLecture = lectureId;
      state.expandedWeeks[weekId] = true;
      // Mark as viewed
      const key = lectureKey(weekId, lectureId);
      if (!state.progress[key]) {
        state.progress[key] = 'viewed';
      }
      saveState();
      updateHash();
      updateSidebarActive();
      renderLecture();
      closeSidebar();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function setTab(tab) {
      state.currentTab = tab;
      saveState();
      updateHash();
      renderLecture();
    }

    function updateHash() {
      if (state.currentView === 'dashboard') {
        history.replaceState(null, '', '#dashboard');
      } else {
        history.replaceState(null, '', `#week-${state.currentWeek}/lecture-${state.currentLecture}/${state.currentTab}`);
      }
    }

    function parseHash() {
      const hash = location.hash.slice(1);
      if (!hash || hash === 'dashboard') {
        showDashboard();
        return;
      }
      if (hash === 'exam') {
        state.currentView = 'exam';
        renderExam();
        return;
      }
      if (hash === 'exam-results') {
        state.currentView = 'exam-results';
        renderExamResults();
        return;
      }
      const match = hash.match(/^week-(\d+)\/lecture-(\d+)\/?(.*)$/);
      if (match) {
        const wId = parseInt(match[1]);
        const lId = parseInt(match[2]);
        const tab = match[3] || 'learn';
        if (['learn','terms','facts','quiz','flash'].includes(tab)) {
          state.currentTab = tab;
        }
        showLecture(wId, lId);
      } else {
        showDashboard();
      }
    }

    // ==========================================
    // HELPERS
    // ==========================================
    function getLecture(weekId, lectureId) {
      const week = COURSE.weeks.find(w => w.id === weekId);
      if (!week) return null;
      return week.lectures.find(l => l.id === lectureId);
    }

    function getWeek(weekId) {
      return COURSE.weeks.find(w => w.id === weekId);
    }

    function stripHTML(html) {
      // Remove SVGs, diagrams, tables, figures, and key-point boxes before stripping tags
      html = html.replace(/<svg[\s\S]*?<\/svg>/gi, '');
      html = html.replace(/<div class="diagram"[\s\S]*?<\/div>\s*<\/div>/gi, '');
      html = html.replace(/<table[\s\S]*?<\/table>/gi, '');
      html = html.replace(/<div class="key-point"[\s\S]*?<\/div>/gi, '');
      html = html.replace(/Figure:.*?(?=<|$)/gi, '');
      return html.replace(/<[^>]*>/g, ' ').replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&quot;/g, '"').replace(/&#39;/g, "'").replace(/&#\d+;/g, '').replace(/\s+/g, ' ').trim();
    }

    function truncate(text, len) {
      if (text.length <= len) return text;
      return text.substring(0, len).trim() + '...';
    }

    function escapeHTML(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ==========================================
    // PROGRESS CALCULATIONS
    // ==========================================
    function getOverallProgress() {
      let totalLectures = 0;
      let completedLectures = 0;
      let totalQuizzes = 0;
      let perfectQuizzes = 0;
      COURSE.weeks.forEach(w => {
        w.lectures.forEach(l => {
          totalLectures++;
          const key = lectureKey(w.id, l.id);
          if (state.progress[key] === 'complete') completedLectures++;
          if (l.quiz && l.quiz.length > 0) {
            totalQuizzes++;
            const qs = state.quizState[key];
            if (qs && qs.score === l.quiz.length) perfectQuizzes++;
          }
        });
      });
      return { totalLectures, completedLectures, totalQuizzes, perfectQuizzes };
    }

    function getWeekProgress(week) {
      let total = week.lectures.length;
      let completed = 0;
      let quizTotal = 0;
      let quizCorrect = 0;
      week.lectures.forEach(l => {
        const key = lectureKey(week.id, l.id);
        if (state.progress[key] === 'complete') completed++;
        if (l.quiz) {
          quizTotal += l.quiz.length;
          const qs = state.quizState[key];
          if (qs) quizCorrect += (qs.score || 0);
        }
      });
      return { total, completed, quizTotal, quizCorrect };
    }

    // ==========================================
    // RENDER: DASHBOARD
    // ==========================================
    function renderDashboard() {
      const area = document.getElementById('contentArea');
      area.classList.add('dashboard-active');
      const p = getOverallProgress();
      const pct = p.totalQuizzes > 0 ? Math.round((p.perfectQuizzes / p.totalQuizzes) * 100) : 0;
      const ringR = 32;
      const circumference = 2 * Math.PI * ringR;
      const offset = circumference - (pct / 100) * circumference;

      // Week cards (compact)
      let weeksHTML = '';
      COURSE.weeks.forEach(w => {
        const wp = getWeekProgress(w);
        const wpct = wp.total > 0 ? Math.round((wp.completed / wp.total) * 100) : 0;
        const quizDisplay = wp.quizTotal > 0 ? '<strong>' + wp.quizCorrect + '</strong>/' + wp.quizTotal : '--';
        weeksHTML +=
          '<div class="week-card" onclick="showLecture(' + w.id + ',' + w.lectures[0].id + ')">' +
            '<h4>' + escapeHTML(w.title) + '</h4>' +
            '<div class="week-card-progress"><div class="week-card-progress-fill" style="width:' + wpct + '%"></div></div>' +
            '<div class="week-card-score">Quiz: ' + quizDisplay + '</div>' +
          '</div>';
      });

      const viewedCount = Object.values(state.progress).filter(v => v).length;

      // Weak areas (compact)
      var weakAreas = analyzeWeakAreas();
      var weakInnerHTML = '';
      var weakLectures = weakAreas.filter(function(a) { return a.accuracy < 80 && a.totalCount > 0; });
      var notAttempted = weakAreas.filter(function(a) { return a.totalCount === 0; });

      if (weakLectures.length > 0 || notAttempted.length > 0) {
        if (weakLectures.length > 0) {
          weakLectures.forEach(function(w) {
            var barColor = w.accuracy < 50 ? 'var(--error)' : 'var(--warning)';
            weakInnerHTML += '<div class="weak-area-item">' +
              '<div class="weak-area-info"><div class="weak-area-title">' + escapeHTML(w.title) + '</div>' +
              '<div class="weak-area-meta">' + w.missedCount + ' missed / ' + w.totalCount + '</div></div>' +
              '<div class="weak-area-bar"><div class="weak-area-bar-fill" style="width:' + Math.round(w.accuracy) + '%;background:' + barColor + '"></div></div>' +
              '<button class="weak-area-btn" onclick="showLecture(' + w.weekId + ',' + w.lecId + ');setTab(\'quiz\')">Review</button>' +
              '</div>';
          });
        }
        if (notAttempted.length > 0) {
          weakInnerHTML += '<div class="not-attempted-label">Not Yet Attempted</div>';
          notAttempted.forEach(function(w) {
            weakInnerHTML += '<div class="weak-area-item">' +
              '<div class="weak-area-info"><div class="weak-area-title">' + escapeHTML(w.title) + '</div>' +
              '<div class="weak-area-meta">No attempts</div></div>' +
              '<button class="weak-area-btn" onclick="showLecture(' + w.weekId + ',' + w.lecId + ');setTab(\'quiz\')">Start</button>' +
              '</div>';
          });
        }
      } else {
        weakInnerHTML = '<div class="dash-empty-state">' +
          '<div class="empty-icon">&#9989;</div>' +
          '<p>Complete some quizzes to see your weak areas here.</p>' +
          '<div class="tip">Tip: Start with Week 1 and work through each lecture quiz.</div>' +
          '</div>';
      }

      // Exam lecture checkboxes (hidden by default)
      var examChecks = '';
      COURSE.weeks.forEach(function(w) {
        w.lectures.forEach(function(l) {
          if (l.quiz && l.quiz.length > 0) {
            examChecks += '<label class="exam-lecture-check"><input type="checkbox" class="exam-lec-cb" value="' + w.id + '-' + l.id + '" checked> ' + escapeHTML(l.title) + '</label>';
          }
        });
      });

      // Flashcard source options
      var fcWeekOpts = '<option value="all">All Lectures</option>';
      COURSE.weeks.forEach(function(w) {
        fcWeekOpts += '<option value="' + w.id + '">' + escapeHTML(w.title) + '</option>';
      });

      area.innerHTML =
        '<div class="dashboard-layout">' +

        // === TOP ROW ===
        '<div class="dashboard-top-row">' +
        '<div class="dash-card dash-progress">' +
          '<div class="progress-ring-container">' +
            '<svg width="80" height="80" viewBox="0 0 80 80">' +
              '<circle class="progress-ring-bg" cx="40" cy="40" r="' + ringR + '"/>' +
              '<circle class="progress-ring-fill" cx="40" cy="40" r="' + ringR + '" stroke-dasharray="' + circumference + '" stroke-dashoffset="' + offset + '"/>' +
            '</svg>' +
            '<div class="progress-ring-text">' +
              '<span class="pct">' + pct + '%</span>' +
              '<span class="label">Mastery</span>' +
            '</div>' +
          '</div>' +
          '<div>' +
            '<div class="dash-title">Microbiology in Agriculture</div>' +
            '<div class="dash-stats-grid">' +
              '<div class="stat-item"><span class="num">' + p.totalLectures + '</span><span class="desc">Lectures</span></div>' +
              '<div class="stat-item"><span class="num">' + viewedCount + '</span><span class="desc">Viewed</span></div>' +
              '<div class="stat-item"><span class="num">' + p.completedLectures + '</span><span class="desc">Mastered</span></div>' +
              '<div class="stat-item"><span class="num">' + p.totalQuizzes + '</span><span class="desc">Quizzes</span></div>' +
            '</div>' +
          '</div>' +
        '</div>' +

        // === TOP CENTER: Mock Exam ===
        '<div class="dash-card dash-exam">' +
          '<h3>Mock Exam</h3>' +

            '<div class="exam-quick-field">' +

            examChecks +

        // === TOP RIGHT: Flashcards ===
        '<div class="dash-card dash-flashcards">' +
          '<h3>Flashcards</h3>' +
