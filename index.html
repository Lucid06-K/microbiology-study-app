</svg><p class="diagram-caption">Figure: Comparison of microbial detection methods. Each has trade-offs between speed, sensitivity, and limitations.</p></div>
<div class="key-point"><strong>Key Takeaway:</strong> PCR is the gold standard for sensitive, specific detection of microorganisms by their nucleic acids. However, it detects dead organisms too. Culture remains essential for confirming viability and susceptibility testing.</div>`
          },
          {
            title: "Microbiological Safety: Protecting Yourself and Others",
            content: `<p>Working with microorganisms -- whether in a laboratory, on a farm, or in a veterinary clinic -- carries real risks. The lecturer emphasised this with a powerful example: <strong>anthrax spores</strong> can survive in soil for over 100 years. An outbreak in Shepparton in the late 1990s was caused by spores that had been sitting in the soil since the 1800s, when infected hides were imported from India.</p>
<p>Microbiological safety is not just about protecting yourself. It is about protecting:</p>
<ul>
<li><strong>Yourself</strong> -- from infection by pathogens you are handling</li>
<li><strong>Other people</strong> -- staff, farm workers, the general community</li>
<li><strong>Other animals</strong> -- preventing spread between farms</li>
<li><strong>The environment</strong> -- some pathogens can persist for decades in contaminated soil or water</li>
</ul>
<p>The golden rule: <strong>treat every sample from an ill animal as potentially hazardous to people and other animals until proven otherwise</strong>. And every sample from a diseased plant as hazardous to other plants.</p>
<p>Practical safety rules include: no eating, drinking, or inserting contact lenses while handling organisms; long hair must be secured tightly (loose hair can touch agar plates and later end up in your mouth -- "would you like to lick that agar plate?"); wear protective clothing; wash hands frequently and always before leaving.</p>
<div class="key-point"><strong>Key Takeaway:</strong> Microbiological safety protects you, others, other farms, and the environment. Treat all samples from ill animals as hazardous. Follow strict hygiene protocols in the lab and field.</div>`
          },
          {
            title: "Sterilisation vs Disinfection vs Antisepsis",
            content: `<p>These three terms sound similar but mean very different things, and understanding the differences is critical for choosing the right approach in any situation.</p>
<div class="diagram"><svg overflow="visible" viewBox="-50 -50 710 280" xmlns="http://www.w3.org/2000/svg">
<rect x="5" y="5" width="590" height="170" rx="10" fill="#f8f9fa" stroke="#264653" stroke-width="2"/>
<text x="300" y="28" text-anchor="middle" font-size="13" font-weight="bold" fill="#264653">Spectrum of Microbial Control</text>
<line x1="50" y1="80" x2="550" y2="80" stroke="#264653" stroke-width="3"/>
<circle cx="100" cy="80" r="6" fill="#e9c46a"/>
<text x="100" y="105" text-anchor="middle" font-size="10" font-weight="bold" fill="#264653">Antisepsis</text>
<text x="100" y="120" text-anchor="middle" font-size="8" fill="#264653">Reduces microbes</text>
<text x="100" y="133" text-anchor="middle" font-size="8" fill="#264653">on LIVING tissue</text>
<text x="100" y="148" text-anchor="middle" font-size="8" fill="#e9c46a">e.g. hand wash</text>
<circle cx="300" cy="80" r="6" fill="#f4a261"/>
<text x="300" y="105" text-anchor="middle" font-size="10" font-weight="bold" fill="#264653">Disinfection</text>
<text x="300" y="120" text-anchor="middle" font-size="8" fill="#264653">Kills most microbes on</text>
<text x="300" y="133" text-anchor="middle" font-size="8" fill="#264653">SURFACES/objects</text>
<text x="300" y="148" text-anchor="middle" font-size="8" fill="#f4a261">e.g. 70% alcohol wipe</text>
<circle cx="500" cy="80" r="6" fill="#e76f51"/>
<text x="500" y="105" text-anchor="middle" font-size="10" font-weight="bold" fill="#264653">Sterilisation</text>
<text x="500" y="120" text-anchor="middle" font-size="8" fill="#264653">KILLS ALL microbes</text>
<text x="500" y="133" text-anchor="middle" font-size="8" fill="#264653">including spores</text>
<text x="500" y="148" text-anchor="middle" font-size="8" fill="#e76f51">e.g. autoclave</text>
<text x="100" y="60" text-anchor="middle" font-size="8" fill="#264653">Less aggressive</text>
<text x="500" y="60" text-anchor="middle" font-size="8" fill="#264653">Most aggressive</text>
<line x1="150" y1="70" x2="450" y2="70" stroke="#264653" stroke-width="1" marker-end="url(#arrowSt)"/>
<defs><marker id="arrowSt" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#264653"/></marker></defs>
</svg><p class="diagram-caption">Figure: The spectrum from antisepsis (gentle, for skin) through disinfection (moderate, for surfaces) to sterilisation (complete destruction of all life, for instruments).</p></div>
<p><strong>Antisepsis</strong> reduces microorganisms on living tissue (like washing your hands with antiseptic soap). It does not kill everything, but reduces the microbial load to safe levels. <strong>Disinfection</strong> kills most microorganisms on inanimate surfaces or objects using chemical agents -- for example, wiping a bench with 70% alcohol. However, disinfection may not destroy bacterial spores. <strong>Sterilisation</strong> is the nuclear option: it destroys ALL microorganisms, including the most resistant spores. Autoclaving (steam under pressure at 121\u00b0C for 15 minutes) is the most common method.</p>
<p>Choosing a disinfectant depends on multiple factors: what organisms are you targeting? Is there organic matter present (blood, faeces) that might inactivate the disinfectant? What surfaces are you treating? How much contact time is possible? The presence of organic material is a particular problem because many disinfectants are inactivated by proteins and fats.</p>
<div class="key-point"><strong>Key Takeaway:</strong> Antisepsis is for living tissue, disinfection is for surfaces, and sterilisation kills everything including spores. Always match your approach to the situation and consider factors like organic material that may reduce disinfectant effectiveness.</div>`
          },
          {
            title: "Detecting Microbial Products and Antibody Responses",
            content: `<p>Beyond seeing or growing the organism itself, we can detect its <strong>products</strong> (proteins, carbohydrates, toxins) or the <strong>immune response</strong> it triggers in the host.</p>
<p><strong>Immunofluorescence</strong> uses antibodies labelled with fluorescent dyes. If the target organism is present, the antibody binds to it, and under UV light, the organisms glow brightly. This technique can identify <strong>Clostridium chauvoei</strong> (which causes blackleg in cattle) directly in infected muscle tissue.</p>
<p><strong>Latex agglutination</strong> uses tiny latex beads coated with antibodies. If the target antigen (say, the capsular carbohydrate of <strong>Cryptococcus neoformans</strong>) is present in blood or urine, the beads clump together visibly. The test goes from a smooth milky suspension to a granular appearance -- readable in minutes at the bedside.</p>
<p><strong>Serology</strong> detects the host's antibodies rather than the pathogen itself. If a chicken has been infected with Salmonella, its blood contains anti-Salmonella antibodies. Mixing blood with stained Salmonella cells causes clumping if antibodies are present. This tells you the animal has been <em>exposed</em> to the pathogen, though not necessarily that it is currently infected.</p>
<p>Each detection method has trade-offs. Microscopy is fast but insensitive. Culture is sensitive but slow. PCR is fast and sensitive but detects dead organisms. Antibody tests are quick but may miss early infections (before the immune response develops). Choosing the right test depends on the clinical situation.</p>
<div class="key-point"><strong>Key Takeaway:</strong> Microbial products can be detected using antibody-based tests (immunofluorescence, latex agglutination). Host immune responses can be detected by serology. Each method has specific strengths and limitations.</div>`
          },
          {
            title: "Biosafety Risk Groups and Containment Levels",
            content: `<p>Not all microorganisms are equally dangerous. To standardise safety precautions, organisms are classified into <strong>risk groups</strong> based on the threat they pose to individuals and the community, and laboratories are classified into matching <strong>physical containment (PC) levels</strong>.</p>
<p>The four <strong>biosafety risk groups</strong>:</p>
<ul>
<li><strong>Risk Group 1</strong> -- Low risk to individuals and the community. These organisms are unlikely to cause disease. Example: non-pathogenic strains of <em>E. coli</em> used in teaching laboratories</li>
<li><strong>Risk Group 2</strong> -- Moderate individual risk, low community risk. These organisms can cause disease, but effective treatment and preventive measures are available and the risk of spread is limited. Examples: <em>Salmonella</em>, <em>Staphylococcus aureus</em></li>
<li><strong>Risk Group 3</strong> -- High individual risk, low to moderate community risk. These organisms can cause serious disease and may spread to others, but effective treatment or preventive measures are usually available. Example: <em>Mycobacterium tuberculosis</em></li>
<li><strong>Risk Group 4</strong> -- High individual risk and high community risk. These organisms cause very serious disease, may spread readily, and there is usually no effective treatment or prevention. Example: Ebola virus</li>
</ul>
<p>Each risk group is matched to a <strong>physical containment (PC) level</strong> in the laboratory:</p>
<ul>
<li><strong>PC1 (Class 1 containment)</strong> -- Work is done on an open bench, relying on good laboratory practices to prevent contamination. This is appropriate for Risk Group 1 organisms that do not generate infection by aerosol. As the lecturer explained, "we generally work in our prac classes using class one containment, where you work on the bench and you rely on good practices to stop the risk of contamination"</li>
<li><strong>PC2 (Class 2 containment)</strong> -- Work is performed in biological safety cabinets with additional protective measures. Appropriate for Risk Group 2 organisms</li>
<li><strong>PC3 (Class 3 containment)</strong> -- Strict containment with sealed cabinets under negative pressure and HEPA-filtered air exhaust. Access is restricted. Appropriate for Risk Group 3 organisms</li>
<li><strong>PC4 (Class 4 containment)</strong> -- Maximum containment. Workers use either glove-port cabinets under negative pressure (so any puncture draws air inward, preventing escape of organisms) or positive-pressure "spacesuits" (so any puncture forces air outward, preventing organisms from reaching the worker). All air is filtered through high-efficiency particulate air (HEPA) filters</li>
</ul>
<div class="key-point"><strong>Key Takeaway:</strong> Organisms are classified into Risk Groups 1-4 based on how dangerous they are and whether treatment exists. Laboratories match these with Physical Containment levels PC1-PC4. Higher risk requires more stringent containment -- from open bench work (PC1) to full spacesuits and negative-pressure cabinets (PC4).</div>`

            content: `<p>When choosing a chemical disinfectant, it is important to know the major classes available, their strengths, and their limitations. As the lecturer noted, "please don't feel like you need to go through and learn all of these -- these are here so that you've got a bit of a feel for the groups that are there."</p>
<table class="compare-table"><thead><tr><th>Disinfectant Group</th><th>Examples</th><th>Key Features</th></tr></thead><tbody>
<tr><td><strong>Alcohols</strong></td><td>Ethanol, isopropyl alcohol (isopropanol)</td><td>Widely used for surface disinfection (e.g. 70% alcohol for bench wipes in the lab). Fast-acting but evaporates quickly, limiting contact time. Not effective against spores</td></tr>
<tr><td><strong>Halogens</strong></td><td>Chlorine (bleach), iodine</td><td>Commonly used. Chlorine-based bleach is broad-spectrum and cheap. Iodine is a very common dairy disinfectant. Both can be inactivated by organic matter</td></tr>
<tr><td><strong>Quaternary Ammonium Compounds (QACs)</strong></td><td>Benzalkonium chloride</td><td>Good detergents as well as disinfectants -- "quite good at cleaning as well as disinfecting." Useful when you need both cleaning and disinfection in one step</td></tr>
<tr><td><strong>Biguanides</strong></td><td>Chlorhexidine</td><td>Commonly used as a hand wash disinfectant in practical laboratories and clinical settings. Good for skin antisepsis</td></tr>
<tr><td><strong>Aldehydes</strong></td><td>Formaldehyde, glutaraldehyde</td><td>Very effective but formaldehyde is now regarded as carcinogenic and much less commonly used. Glutaraldehyde is sometimes used in kennel and stable settings</td></tr>
<tr><td><strong>Phenolics</strong></td><td>Dettol</td><td>Less commonly used than they once were. "Dettol's not a particularly great disinfectant -- sometimes used in the household, but very rarely used in industrial settings anymore"</td></tr>
<tr><td><strong>Anionic Detergents (Soaps)</strong></td><td>Standard soaps</td><td>Have some disinfectant activity, but "most of their efficacy is in removing the contamination, because they're particularly good at removing organic matter from surfaces"</td></tr>
</tbody></table>
<p>Key factors to consider when choosing a disinfectant:</p>
<ul>
<li><strong>Activity spectrum</strong> -- Which groups of microorganisms does it kill? Is your target organism in that spectrum?</li>

<li><strong>Side effects</strong> -- Some disinfectants corrode metals, destroy cloth, or stain surfaces. Consider the effect on animals, plants, and people in the area</li>
<li><strong>Stability</strong> -- "You can't just make up a disinfectant and then use it for weeks and months. They all have quite a limited stability timeline"</li>
<li><strong>Contact time</strong> -- Adequate contact time is essential for the disinfectant to work</li>
</ul>
<div class="key-point"><strong>Key Takeaway:</strong> Major disinfectant classes include alcohols, halogens, QACs, biguanides, aldehydes, and phenolics. Choice depends on the target organism, presence of organic matter, surface compatibility, stability, and contact time. Always clean surfaces before disinfecting to maximise effectiveness.</div>`

          {
            title: "Learning Intentions",
            content: `<p>By the end of this lecture, you should be able to:</p><ol><li>Apply binomial nomenclature to correctly name and interpret bacterial species names</li><li>Describe the key structural features of a bacterial cell (cell wall, capsule, flagella, pili, plasmids) and their functions</li><li>Use major bacterial features (cell morphology, Gram stain, spore formation, motility) to classify bacteria</li><li>Explain why 16S ribosomal RNA sequencing is used as the basis for modern bacterial phylogenetics</li><li>Differentiate between the terms 'species' and 'strain' in the context of bacteria</li><li>Explain the significance of cell wall structure (peptidoglycan thickness) for Gram staining results and antibiotic targeting</li></ol>`

          {
            title: "Bacterial Nomenclature: How Bacteria Get Their Names",
            content: `<p>Just like every animal species has a scientific name (like <em>Homo sapiens</em>), every bacterial species has a two-part Latin name using <strong>binomial nomenclature</strong>. Understanding how bacteria are named and why helps you decode what you are dealing with.</p>
<p>The first name is the <strong>genus</strong> (always capitalised), and the second is the <strong>specific epithet</strong> (never capitalised). Both are always <em>italicised</em> when printed, or underlined when handwritten. After the first mention, the genus can be abbreviated: <em>Escherichia coli</em> becomes <em>E. coli</em>.</p>
<p>The names often tell you something about the organism:</p>
<ul>
<li><strong>Staphylococcus aureus</strong> -- "Staphyl" (Greek for grape cluster) describes how the cells clump together; "aureus" (Latin for golden) describes the colony colour</li>
<li><strong>Streptococcus agalactiae</strong> -- "Strepto" (chain) describes the chain arrangement; "agalactiae" means "without milk" (a- = without, galactiae = milk) because it causes mastitis and reduced milk production in dairy cows</li>
<li><strong>Escherichia coli</strong> -- Named after Theodor Escherich who discovered it; "coli" means it is found in the colon</li>
<li><strong>Helicobacter pylori</strong> -- "Helico" (helical shape) + "pylori" (found in the pylorus of the stomach)</li>
<li><strong>Lactobacillus</strong> -- Rod-shaped ("bacillus") bacteria that convert sugars to lactic acid ("lacto") -- the organisms that turn milk into yoghurt</li>
</ul>
<div class="key-point"><strong>Key Takeaway:</strong> Bacteria are named using binomial nomenclature (Genus species), always italicised, genus capitalised. Names often describe the organism's shape, colour, habitat, discoverer, or the disease it causes.</div>`
          },
          {
            title: "Bacterial Cell Structure: The Complete Picture",
            content: `<p>Understanding bacterial cell structure is essential because each component affects how bacteria cause disease, how we identify them, and how we target them with drugs. Let us build a complete mental picture of a bacterial cell.</p>
<div class="diagram"><img src="https://upload.wikimedia.org/wikipedia/commons/5/5a/Average_prokaryote_cell-_en.svg" alt="Labeled diagram of an average prokaryote cell showing capsule, cell wall, plasma membrane, flagellum, pili, plasmids, and nucleoid" style="max-width:100%;height:auto;border-radius:8px;"><p class="diagram-caption">Figure: Key structures of a bacterial cell. Not all bacteria have all structures -- flagella, pili, capsule, plasmids, and endospores are found in only some species.</p></div>
<p>The key structures:</p>
<ul>
<li><strong>Cell membrane</strong> -- The inner barrier controlling what enters and exits the cell</li>
<li><strong>Cell wall</strong> -- The rigid outer layer that determines cell shape. Made of <strong>peptidoglycan</strong>. Thickness differs between Gram-positive (thick) and Gram-negative (thin)</li>
<li><strong>Capsule</strong> -- A sugar coat protecting against immune cells and drying; helps bacteria form biofilms</li>
<li><strong>Flagella</strong> -- Whip-like structures for motility (movement). Not all bacteria have them</li>
<li><strong>Pili/Fimbriae</strong> -- Hair-like projections for adhering to host cells or transferring DNA</li>
<li><strong>Circular DNA</strong> -- The single chromosome carrying essential genetic information</li>
<li><strong>Plasmids</strong> -- Small circular extra DNA carrying bonus genes (like antibiotic resistance)</li>
<li><strong>Ribosomes (70S)</strong> -- Protein-making machinery, structurally different from eukaryotic 80S ribosomes</li>
<li><strong>Endospores</strong> -- The most resistant life form known; produced only by <em>Bacillus</em> and <em>Clostridium</em> genera</li>
</ul>
<div class="key-point"><strong>Key Takeaway:</strong> A bacterial cell is composed of membrane, cell wall, DNA, ribosomes, and optionally flagella, pili, capsule, plasmids, and endospores. Each structure plays a specific role in survival, virulence, and identification.</div>`
          },
          {
            title: "Gram-Positive vs Gram-Negative Cell Walls",
            content: `<p>The cell wall is the defining feature that separates bacteria into the two great kingdoms of bacteriology: <strong>Gram-positive</strong> and <strong>Gram-negative</strong>. The structural difference is straightforward but has profound consequences.</p>
<div class="diagram"><img src="https://upload.wikimedia.org/wikipedia/commons/5/52/Gram-Cell-wall.svg" alt="Cross-section comparison of gram-positive and gram-negative bacterial cell wall structure showing peptidoglycan and LPS layers" style="max-width:100%;height:auto;border-radius:8px;"><p class="diagram-caption">Figure: Cross-section comparison. Gram-positive (left) has a thick peptidoglycan layer but no outer membrane. Gram-negative (right) has a thin peptidoglycan layer sandwiched between an inner membrane and an outer membrane containing LPS.</p></div>
<p><strong>Gram-positive</strong> bacteria have a thick peptidoglycan layer (many layers thick) directly exposed on the outside, with teichoic acids embedded in it. There is no outer membrane. The thick peptidoglycan traps the crystal violet-iodine complex during Gram staining, making them appear purple.</p>
<p><strong>Gram-negative</strong> bacteria have a thin peptidoglycan layer (just one or two layers) sandwiched between two membranes: the inner (cytoplasmic) membrane and an <strong>outer membrane</strong>. The space between is called the <strong>periplasmic space</strong>. The outer membrane contains <strong>lipopolysaccharide (LPS)</strong>, which can trigger severe inflammatory responses (toxic shock) in infected animals. The thin peptidoglycan allows the crystal violet to wash out during decolourisation, so they pick up the pink counterstain.</p>
<p>LPS determines whether a Gram-negative bacterium has a <strong>smooth</strong> (full-length LPS, shiny colonies) or <strong>rough</strong> (truncated LPS, rough-looking colonies) appearance.</p>
<div class="key-point"><strong>Key Takeaway:</strong> Gram-positive bacteria have thick peptidoglycan and no outer membrane. Gram-negative bacteria have thin peptidoglycan plus an outer membrane containing LPS. This structural difference determines Gram stain results and has major implications for treatment and pathogenesis.</div>`
          },
          {
            title: "Bacterial Shapes and Arrangements",
            content: `<p>When you look at bacteria under a microscope, two of the first things you note are their <strong>shape</strong> and how they are <strong>arranged</strong> relative to each other. These features are immediately useful for narrowing down what you might be dealing with.</p>
<div class="diagram"><img src="https://upload.wikimedia.org/wikipedia/commons/6/69/Bacterial_morphology_diagram.svg" alt="Bacterial morphology diagram showing different shapes and arrangements: cocci, bacilli, spirilla" style="max-width:100%;height:auto;border-radius:8px;"><p class="diagram-caption">Figure: The four main bacterial shapes and their common arrangement patterns. Shape + arrangement + Gram stain result are the first clues to identification.</p></div>
<p>The four main shapes: <strong>Coccus</strong> (sphere), <strong>Bacillus</strong> (rod), <strong>Coccobacillus</strong> (oval, between coccus and short rod), and <strong>Spiral</strong> (corkscrew). The arrangements include <strong>diplo-</strong> (pairs), <strong>staphylo-</strong> (grape-like clusters), and <strong>strepto-</strong> (chains).</p>
<p>A word of caution about the word "bacillus" -- it has four different meanings depending on context: (1) <em>Bacillus</em> (capitalised, italicised) = a specific genus (e.g. <em>Bacillus anthracis</em>); (2) Bacilli (not italicised) = a taxonomic class; (3) bacillus (lowercase) = any rod-shaped bacterium; (4) bacilli (lowercase, plural) = multiple rod-shaped bacteria.</p>
<div class="key-point"><strong>Key Takeaway:</strong> Bacterial shape (coccus, bacillus, coccobacillus, spiral) and arrangement (pairs, clusters, chains) are the first visible clues to identification. Combined with Gram stain result, they significantly narrow down the possibilities.</div>`
          },
          {
            title: "Selective and Differential Culture Media",
            content: `<p>In the laboratory, special types of agar media help us identify bacteria by testing their biochemical abilities. These media are either <strong>selective</strong> (only certain bacteria can grow), <strong>differential</strong> (bacteria produce different colours or patterns), or both.</p>
<table class="compare-table"><thead><tr><th>Medium</th><th>Selects For</th><th>Differentiates By</th><th>Key Results</th></tr></thead><tbody>
<tr><td><strong>Mannitol Salt Agar</strong></td><td>Gram-positive (high salt)</td><td>Mannitol fermentation</td><td>S. aureus = yellow; S. epidermidis = pink</td></tr>
<tr><td><strong>MacConkey Agar</strong></td><td>Gram-negative (bile salts)</td><td>Lactose fermentation</td><td>E. coli = pink; Salmonella = pale/cream</td></tr>
<tr><td><strong>XLD Agar</strong></td><td>Gram-negative</td><td>Xylose, lysine, H\u2082S production</td><td>Salmonella = black; E. coli = yellow</td></tr>
</tbody></table>
<p>An important warning from the lecturer: mannitol salt agar and MacConkey agar both produce pink and yellow results, but for <strong>completely different reasons</strong>. On mannitol salt agar, yellow means mannitol fermentation (positive). On MacConkey, pink means lactose fermentation (positive). If you mix up which plate you are reading, you will get the wrong answer! Always check the label on your plate.</p>
<p>Beyond these media, bacteria can be further tested with <strong>biochemical tests</strong> like catalase (does it break down hydrogen peroxide into oxygen bubbles?), oxidase, coagulase, and urease. The catalase test is beautifully simple: dab some bacteria onto a slide with hydrogen peroxide. If bubbles appear, the bacteria produce catalase (catalase-positive). No bubbles = catalase-negative.</p>
<p>Together, these tests create a <strong>taxonomic key</strong> -- a step-by-step decision tree that narrows down the identity of an unknown organism: first Gram stain, then colony morphology, then selective media, then biochemical tests.</p>
<div class="key-point"><strong>Key Takeaway:</strong> Selective media allow only certain bacteria to grow; differential media produce visible differences between species. Combined with biochemical tests, these tools form a systematic identification pathway from unknown to named species.</div>`
          },
          {
            title: "Flagella, Pili, Capsules and Endospores",
            content: `<p>Beyond the basic cell wall and membrane, bacteria can have several additional structures that profoundly affect their ability to cause disease, survive in harsh environments, and be identified in the laboratory.</p>
<p><strong>Flagella</strong> are whip-like structures that spin like propellers to move the bacterium through liquid. The number and arrangement of flagella vary between species. In the lab, motility can be tested using semi-solid agar: motile bacteria spread throughout the entire medium, while non-motile bacteria stay put exactly where they were inoculated.</p>
<p><strong>Pili (fimbriae)</strong> are hair-like projections much shorter than flagella. They serve different functions: some help bacteria <strong>adhere to host cells</strong> (critical for colonisation and infection), others are involved in <strong>DNA transfer between bacteria</strong> (conjugation pili), and some cause a creeping motion called <strong>twitching motility</strong>. <em>Dichelobacter nodosus</em>, which causes footrot in sheep, has polar fimbriae at both ends that are essential for attaching to hoof tissue.</p>
<p><strong>Capsules</strong> are a sugar (polysaccharide) coat tightly attached to the cell surface. They protect bacteria from being engulfed by immune cells, help them adhere to surfaces, and contribute to biofilm formation. A <strong>slime layer</strong> is similar but loosely attached and easily washed off.</p>
<p><strong>Endospores</strong> are the most resistant form of life known -- they survive heat, chemicals, drying, and radiation. Only two genera are important for spores: <em>Bacillus</em> and <em>Clostridium</em>. Anthrax spores (<em>Bacillus anthracis</em>) caused cattle outbreaks near Shepparton as recently as 2024 from spores that had been dormant in soil for decades. During WWII, biological weapons testing on Scotland's Gruinard Island left anthrax spores that required soil decontamination with formaldehyde injected every 20 cm in 1986.</p>
<p><strong>Important:</strong> Do not confuse bacterial <strong>endospores</strong> (one bacterium makes one survival spore) with fungal <strong>spores</strong> (reproductive structures; one fungus makes many spores).</p>
<div class="key-point"><strong>Key Takeaway:</strong> Flagella provide motility, pili enable adhesion and DNA transfer, capsules protect against immune attack, and endospores (Bacillus/Clostridium only) are the most resistant life form known. Each structure affects virulence and identification.</div>`
          },
          {
            title: "LPS, Colony Morphology, and Phenotypic Identification",
            content: `<p><strong>Lipopolysaccharide (LPS)</strong> is found exclusively in the outer membrane of <strong>Gram-negative</strong> bacteria. It plays a dual role: it protects the bacterium, but it can also trigger severe inflammatory responses in infected hosts (endotoxic shock). The length of the LPS molecule determines whether colonies appear <strong>smooth</strong> (full-length LPS, shiny colonies) or <strong>rough</strong> (truncated LPS, rough-edged colonies).</p>
<p><strong>Colony morphology</strong> on agar plates provides valuable identification clues. When examining colonies, microbiologists assess four features:</p>
<ol>
<li><strong>Size</strong> -- How large are the colonies? (Compare only well-isolated colonies, not crowded ones)</li>
<li><strong>Colour</strong> -- <em>Staphylococcus aureus</em> = golden yellow; <em>S. epidermidis</em> = white; <em>Pseudomonas aeruginosa</em> = blue-green</li>
<li><strong>Elevation</strong> -- How high does the colony sit off the plate surface?</li>
<li><strong>Edge</strong> -- Smooth/entire edge vs wavy/undulating edge</li>
</ol>
<p>On <strong>blood agar</strong>, an additional feature is <strong>haemolysis</strong> -- does the bacterium break down red blood cells? <em>Staphylococcus aureus</em> causes a zone of clearing (haemolysis) around its golden colonies, visible when the plate is held up to the light.</p>
<p><em>Pseudomonas aeruginosa</em> deserves special mention. Its name means "copper rust" in Latin, referring to the distinctive blue-green pigment it produces. This opportunistic pathogen is found everywhere in the environment and can cause wound infections in sheep, turning the fleece a blue-green tinge.</p>
<div class="key-point"><strong>Key Takeaway:</strong> Colony morphology (size, colour, elevation, edge, haemolysis) and LPS type (smooth vs rough) are important phenotypic tools for bacterial identification. Combined with Gram stain, shape, and biochemical tests, they form a complete identification workflow.</div>`

          {
            title: "Genotypic Classification: 16S rRNA and Whole Genome Sequencing",
            content: `<p>While phenotypic methods (what the organism looks like and does) have been used for over a century, modern microbiology increasingly uses <strong>genotypic methods</strong> (what is in the organism's DNA) for classification. The gold standard is <strong>16S ribosomal RNA gene sequencing</strong>.</p>
<p>Why 16S rRNA? Because it is found in <strong>ALL</strong> bacteria (so every species can be compared), and it changes <strong>very slowly</strong> over evolutionary time (so it acts like a molecular clock). By comparing 16S rRNA sequences, scientists build phylogenetic trees showing how bacteria are related to each other -- like a family tree for all bacterial life.</p>
<p>The limitation of phenotypic classification is that appearance can be deceiving. The analogy from the lecture: a pig and a hippopotamus look similar on the outside, but genomic analysis reveals that a hippo is more closely related to a whale. Similarly, two bacteria that look identical under the microscope might be genetically very different.</p>
<p><strong>Whole genome sequencing</strong> provides the highest resolution, comparing all genes across two organisms. <strong>Multi-locus sequence typing (MLST)</strong> compares several specific genes and is a good middle ground between cost and resolution.</p>
<p>An important distinction: a <strong>species</strong> is a group of organisms very similar both phenotypically and genetically. A <strong>strain</strong> is a specific isolate within a species -- two strains of <em>E. coli</em> are the same species but may differ in important ways (like one carrying virulence genes the other lacks).</p>
<div class="key-point"><strong>Key Takeaway:</strong> 16S rRNA sequencing is the gold standard for bacterial classification because all bacteria have it and it changes slowly. Whole genome sequencing provides the highest resolution. Genotyping reveals relationships that phenotype alone cannot.</div>`
          },
          {
            title: "Candidatus: Naming the Unculturable Majority",
            content: `<p>One of the most surprising facts in modern microbiology is that the vast majority of bacteria on Earth have <strong>never been grown in a laboratory</strong>. When scientists began performing broad-range 16S ribosomal RNA sequencing on environmental samples -- from oceans, soil, and faecal samples -- they discovered an enormous amount of microbial diversity that we simply cannot cultivate using current laboratory techniques.</p>
<p>These uncultured organisms are estimated to account for approximately <strong>85% of all microbes</strong> that exist. We only know about and can culture roughly 15% of them. As the lecturer explained, the scientists "were just doing broad range 16S ribosomal RNA sequencing, so they were sequencing up all the 16S genes that were present there, so that would be all the microbes that were there, and they noticed that there was an enormous amount of microbial diversity that we couldn't actually cultivate and grow in the lab using the technologies or the techniques that we have."</p>
<p>The problem is that these organisms are <strong>not characterised</strong> -- we do not know their phenotype, what they look like, or what conditions they need to grow. We only know they exist because their DNA is present in environmental samples.</p>
<p>So how do we name them? The official prokaryotic naming code requires <strong>living pure bacterial strains</strong> deposited in dedicated culture collections as a "type strain" -- an unambiguous reference point. Since uncultured bacteria cannot meet this requirement, they are given the provisional name prefix <strong>"Candidatus"</strong> followed by an identifier. For example, <em>Candidatus</em> Pelagibacter ubique.</p>
<p>There is ongoing debate in microbiology about whether <strong>sequence data alone</strong> should be allowed to serve as type material instead of an actual bacterial culture. Some microbiologists have pushed for a parallel naming code specifically for uncultured organisms, to prevent nomenclature chaos between the cultured and uncultured worlds.</p>
<p>The technique that makes this discovery possible is <strong>metagenomics</strong> -- sequencing all the genetic material recovered directly from environmental samples, rather than culturing organisms first and then sequencing them individually.</p>
<div class="key-point"><strong>Key Takeaway:</strong> Approximately 85% of all microbes cannot be cultured in the laboratory. These uncultured organisms are identified by environmental DNA sequencing (metagenomics) and given the provisional name prefix "Candidatus." The official naming code requires living cultures, so there is ongoing debate about how to formally classify the unculturable majority.</div>`

          {
            title: "Learning Intentions",
            content: `<p>By the end of this lecture, you should be able to:</p><ol><li>Describe the components of the bacterial genome, including the chromosome, plasmids, transposons, and prophages</li><li>Explain the process of bacterial DNA replication, including the roles of DNA polymerase, leading/lagging strands, Okazaki fragments, and ligase</li><li>Describe the process of binary fission and explain how proofreading mechanisms reduce but do not eliminate mutation rates</li><li>Classify and distinguish between different types of mutations and their effects on protein function</li><li>Explain the three mechanisms of horizontal gene transfer (conjugation, transduction, transformation)</li><li>Discuss the significance of horizontal gene transfer in the evolution of antibiotic resistance and bacterial virulence</li></ol>`
          },
          {
            title: "The Bacterial Genome: Chromosomes, Plasmids, and More",
            content: `<p>Think of a bacterium's hereditary information as its <strong>instruction manual</strong> for life. This instruction manual -- the <strong>genome</strong> -- is not just one simple document. It has several components:</p>
<p>The main manual is the <strong>chromosome</strong> -- a single, circular piece of double-stranded DNA carrying all the essential genes the bacterium needs to survive. Unlike eukaryotic chromosomes (which are linear and multiple), bacteria typically have just one circular chromosome.</p>
<p>But bacteria can also carry extra booklets called <strong>plasmids</strong> -- small, circular, independently-replicating pieces of DNA with "bonus" instructions. These bonus instructions might include genes for <strong>antibiotic resistance</strong> (allowing the bacterium to survive drug treatment) or <strong>virulence factors</strong> (enabling it to cause disease). Plasmids range from a few hundred to hundreds of thousands of base pairs.</p>
<p>There are also <strong>transposons</strong> -- "jumping paragraphs" that can hop from one location to another within the genome, sometimes carrying antibiotic resistance genes with them. And <strong>bacteriophages</strong> (viruses that infect bacteria) can paste their own DNA into the chromosome, becoming <strong>prophages</strong>.</p>
<p>A striking example: when researchers sequenced a Salmonella genome, they found <strong>7 different prophages</strong> and numerous transposons and insertion sequences scattered throughout the chromosome. A huge proportion of that bacterium's genome had arrived from elsewhere over evolutionary time.</p>
<div class="key-point"><strong>Key Takeaway:</strong> The bacterial genome consists of a circular chromosome plus optional plasmids, transposons, and prophages. Much of what makes a bacterium dangerous (virulence, antibiotic resistance) is often carried on these extra genetic elements.</div>`
          },
          {
            title: "DNA Structure, Base Pairing, and Replication",
            content: `<p>DNA is the molecule that carries all genetic information. Its structure is a <strong>double helix</strong> -- imagine a twisted ladder where the sides are sugar-phosphate backbones and the rungs are pairs of chemical "letters" called bases.</p>
<p>The four bases follow strict pairing rules: <strong>A always pairs with T</strong>, and <strong>G always pairs with C</strong>. This means if you know one strand, you can always work out the other. In RNA, <strong>uracil (U)</strong> replaces thymine (T).</p>
<div class="diagram"><img src="https://upload.wikimedia.org/wikipedia/commons/8/8f/DNA_replication_en.svg" alt="DNA replication fork showing leading and lagging strand synthesis, Okazaki fragments, and RNA primers" style="max-width:100%;height:auto;border-radius:8px;"><p class="diagram-caption">Figure: The DNA replication fork. The leading strand is synthesised continuously. The lagging strand is built in short Okazaki fragments that are later joined by ligase. Replication starts at oriC and proceeds bidirectionally.</p></div>
<p>DNA replication starts at a specific site called <strong>oriC</strong> (origin of replication) and proceeds in both directions until reaching the <strong>terminus (TER)</strong>. The enzyme <strong>DNA polymerase</strong> builds new DNA only in the 5\u2032 to 3\u2032 direction. This creates an asymmetry: the <strong>leading strand</strong> is built as one continuous piece, while the <strong>lagging strand</strong> must be built in short chunks called <strong>Okazaki fragments</strong>, later glued together by the enzyme <strong>ligase</strong>.</p>
<p>The entire copying machine is called a <strong>replisome</strong> -- in <em>E. coli</em>, it consists of 14 different protein subunits working together.</p>
<div class="key-point"><strong>Key Takeaway:</strong> DNA replication is bidirectional from oriC. The leading strand is made continuously; the lagging strand is made in Okazaki fragments joined by ligase. DNA polymerase only works 5\u2032 to 3\u2032.</div>`
          },
          {
            title: "Binary Fission and Proofreading",
            content: `<p><strong>Binary fission</strong> is how bacteria reproduce -- it is elegantly simple compared to the complex mitosis of eukaryotic cells. Think of it as a cell photocopying its entire instruction manual, then stretching out and splitting in half so each new cell gets a complete copy.</p>
<div class="diagram"><img src="https://upload.wikimedia.org/wikipedia/commons/0/02/Binary_Fission_2.svg" alt="Binary fission diagram showing bacterial cell division into two daughter cells" style="max-width:100%;height:auto;border-radius:8px;"><p class="diagram-caption">Figure: Binary fission in four steps. One parent cell copies its chromosome and divides into two identical daughter cells. With ~20-minute generation time, one cell can become over a million in about 7 hours.</p></div>
<p>With a generation time of about <strong>20 minutes</strong>, bacteria reproduce at extraordinary speed. A single colony on an agar plate contains over <strong>one million cells</strong> -- all descended from one original cell.</p>
<p>But what about mistakes? DNA polymerase is remarkably accurate but not perfect. The cell has a built-in spell-checker called <strong>proofreading</strong>, using an <strong>exonuclease</strong> enzyme that detects and removes incorrectly paired bases. After proofreading, the error rate is about <strong>1 mistake per 10 billion nucleotides</strong>. For <em>E. coli</em>, that means roughly one mutation is incorporated every 3rd round of replication -- about once per hour.</p>
<p>Additional repair mechanisms include <strong>mismatch repair</strong>, <strong>excision repair</strong>, and <strong>double-strand break repair</strong>. But none are 100% reliable, so some errors persist as permanent mutations.</p>
<div class="key-point"><strong>Key Takeaway:</strong> Bacteria reproduce by binary fission approximately every 20 minutes. Proofreading reduces errors to ~1 per 10 billion bases, but some mutations still slip through, driving bacterial evolution.</div>`
          },
          {
            title: "Transcription, Translation, and the Genetic Code",
            content: `<p>Once DNA is replicated, how does the bacterium actually <em>use</em> the information stored in it? Through two processes: <strong>transcription</strong> (DNA \u2192 RNA) and <strong>translation</strong> (RNA \u2192 protein).</p>
<p><strong>Transcription</strong> is like making a photocopy of one page from the instruction manual. The enzyme <strong>RNA polymerase</strong> reads a gene in the DNA and produces a single-stranded copy called <strong>messenger RNA (mRNA)</strong>. This mRNA is a temporary working copy that carries the instructions out to the protein-building machinery.</p>
<p><strong>Translation</strong> is like reading that photocopy to build the actual product. The <strong>ribosome</strong> reads the mRNA three letters at a time. Each three-letter word is called a <strong>codon</strong>, and each codon specifies one amino acid. The amino acids are chained together to form a protein.</p>
<p>Key features of the genetic code:</p>
<ul>
<li>The most common <strong>start codon</strong> is <strong>ATG</strong> (AUG in RNA), which codes for methionine</li>
<li>Three <strong>stop codons</strong> signal the end: <strong>TAA, TAG, TGA</strong></li>
<li>The code is <strong>redundant</strong> -- multiple codons can specify the same amino acid (up to 6 codons for some amino acids)</li>
<li>Most bacteria use the standard genetic code, but some (like <strong>Mycoplasma</strong>) use a non-standard code where a tryptophan codon in Mycoplasma is a stop codon in <em>E. coli</em></li>
</ul>
<p>A crucial point: in bacteria, transcription and translation happen <strong>in the same compartment simultaneously</strong>. The ribosome can start translating the mRNA even before transcription is complete. This is very different from eukaryotic cells where transcription occurs in the nucleus and translation in the cytoplasm.</p>
<div class="key-point"><strong>Key Takeaway:</strong> Transcription copies DNA into mRNA using RNA polymerase. Translation reads mRNA in 3-letter codons to build proteins using ribosomes. The genetic code uses ATG to start and TAA/TAG/TGA to stop.</div>`
          },
          {
            title: "Mutations: Point Mutations and Macrolesions",
            content: `<p>Mutations are changes in the DNA sequence that can alter the proteins a bacterium produces, potentially changing its behaviour, virulence, or antibiotic resistance. They can arise from replication errors, UV light, ionising radiation, or DNA-damaging chemicals.</p>
<div class="diagram"><img src="https://upload.wikimedia.org/wikipedia/commons/8/8a/All_transitions_and_transversions.svg" alt="Diagram showing all transitions and transversions in DNA point mutations" style="max-width:100%;height:auto;border-radius:8px;"><p class="diagram-caption">Figure: Point mutations affect single bases (microlesions) while macrolesions affect larger stretches. Both can be silent, cause loss/gain of function, or be lethal.</p></div>
<p><strong>Point mutations</strong> (microlesions) affect a single base: a <strong>substitution</strong> (wrong base), <strong>deletion</strong> (missing base), or <strong>insertion</strong> (extra base). Deletions and insertions cause <strong>frameshift mutations</strong> -- imagine removing one letter from a sentence: "THE CAT SAT" becomes "TH ECA TSA T." The entire reading frame downstream is scrambled.</p>
<p><strong>Macrolesions</strong> involve larger chunks of DNA: deletion, duplication, insertion, inversion (flipped backwards), or translocation (moved to a different location).</p>
<p>The phenotypic effects depend on where the mutation lands: <strong>silent</strong> (no change to protein due to code redundancy), <strong>loss of function</strong> (gene broken, e.g. losing flagella), <strong>gain of function</strong> (enhanced or new ability), or <strong>lethal</strong> (essential gene destroyed, bacterium dies).</p>
<div class="key-point"><strong>Key Takeaway:</strong> Point mutations change single bases; macrolesions affect larger regions. Frameshift mutations (from insertions/deletions) are particularly damaging because they scramble all downstream codons. Effects range from silent to lethal.</div>`
          },
          {
            title: "Horizontal Gene Transfer: Conjugation, Transduction, Transformation",
            content: `<p>Bacteria do not just inherit genes from their parent cell (<strong>vertical transfer</strong>). They can also acquire genes from completely unrelated organisms -- like borrowing a chapter from someone else's book. This is called <strong>horizontal gene transfer (HGT)</strong>, and it is one of the most important forces driving bacterial evolution.</p>
<p>HGT explains why closely related <em>E. coli</em> strains can be completely different -- one harmless, one deadly -- depending on which genes they have picked up from elsewhere. Since about 1960, <em>Shigella dysenteriae</em> rapidly accumulated antibiotic resistance genes via HGT, creating multi-drug resistant strains.</p>
<p>There are three mechanisms of HGT:</p>
<ol>
<li><strong>Conjugation</strong> -- Direct cell-to-cell contact. A donor bacterium extends a <strong>conjugative pilus</strong> (sex pilus) to a recipient and transfers a copy of its plasmid through the bridge via <strong>rolling circle replication</strong>. Both cells end up with a copy. Only <strong>conjugative plasmids</strong> have the genes for this machinery; non-conjugative plasmids can sometimes "hitch a ride."</li>
<li><strong>Transduction</strong> -- Via bacteriophages. A phage accidentally packages some bacterial DNA and delivers it to a new cell. In the <strong>lytic cycle</strong>, phages burst the cell; in the <strong>lysogenic cycle</strong>, phage DNA integrates into the chromosome as a <strong>prophage</strong> and gets copied with every cell division. Stress can trigger it to switch back to lytic.</li>
<li><strong>Transformation</strong> -- Absorbing free DNA from the environment. The cell must be <strong>competent</strong> (having surface proteins to grab and import DNA). Competence can be natural or induced in the lab using chemicals or electrical pulses.</li>
</ol>
<p>Once foreign DNA enters a cell, <strong>homologous recombination</strong> can swap it into the chromosome if matching flanking sequences exist. <strong>Transposons</strong> can jump between locations, sometimes carrying antibiotic resistance genes.</p>
<div class="key-point"><strong>Key Takeaway:</strong> HGT transfers genes between unrelated bacteria via conjugation (plasmid transfer through direct contact), transduction (phage delivery), or transformation (uptake of free DNA). HGT is the major driver of antibiotic resistance spread.</div>`
          },
          {
            title: "Plasmids, Transposons, and Insertion Sequences",
            content: `<p>Let us look more closely at the mobile genetic elements that make horizontal gene transfer possible.</p>
<p><strong>Plasmids</strong> are circular DNA molecules that replicate independently of the chromosome. Key features:</p>
<ul>
<li>Size ranges from a few hundred to hundreds of thousands of base pairs</li>
<li>Larger plasmids tend to be <strong>low copy number</strong> (fewer copies per cell) because they cost more energy to maintain</li>
<li>All plasmids carry genes for their own <strong>replication</strong> and <strong>segregation</strong> into daughter cells</li>
<li><strong>Conjugative</strong> plasmids can transfer themselves; <strong>non-conjugative</strong> ones cannot (but may hitch a ride)</li>
<li>They often carry "bonus" genes: antibiotic resistance, virulence factors, or metabolic capabilities</li>
</ul>
<p>The lecturer's PhD work provides a perfect example: a 151,000 base-pair <strong>virulence plasmid</strong> from avian pathogenic <em>E. coli</em>. When removed, the bacterium could no longer cause respiratory disease in birds. When restored, virulence returned.</p>
<p><strong>Transposons</strong> (transposable elements) are DNA segments that can jump from one location to another within or between genomes. They carry all genes needed for their own movement, plus sometimes extra cargo like antibiotic resistance genes. When a transposon lands in the middle of a gene, it can disrupt that gene's function.</p>
<p><strong>Insertion sequences (IS)</strong> are simpler transposable elements, often with palindromic ends (read the same forwards and backwards). They can hop around the genome and sometimes disrupt genes.</p>
<div class="key-point"><strong>Key Takeaway:</strong> Plasmids are independently replicating circular DNA carrying bonus genes. Transposons jump between locations carrying resistance or virulence genes. Together, these mobile elements drive rapid bacterial evolution.</div>`
          }

          {
            title: "Learning Intentions",
            content: `<p>By the end of this lecture, you should be able to:</p><ol><li>Distinguish between the major E. coli pathotypes (EPEC, EHEC, ETEC, UPEC, APEC) and the diseases they cause</li><li>Explain how virulence plasmids and mobile genetic elements acquired through horizontal gene transfer determine bacterial pathogenicity</li><li>Describe how conjugation can transfer virulence and antibiotic resistance genes between different bacterial species</li><li>Analyse real-world examples of horizontal gene transfer, including the 2011 EHEC outbreak</li><li>Explain the role of pathogenicity islands as large chromosomal regions that confer disease-causing ability</li><li>Discuss the public health implications of horizontal gene transfer for antimicrobial resistance management</li></ol>`

          {
            title: "E. coli Pathotypes: One Species, Many Diseases",
            content: `<p><em>E. coli</em> is one of the most studied bacteria on Earth, yet it is far from a single entity. There are many "varieties" or <strong>pathotypes</strong>, each causing different diseases through different mechanisms. Think of them like different models of the same car brand -- same basic platform, completely different features.</p>

<p>The critical insight: the difference between a harmless gut commensal <em>E. coli</em> and a deadly pathogen is not in the core chromosome -- it is in the <strong>horizontally acquired genes</strong> from plasmids, phages, and pathogenicity islands. This is HGT in action.</p>
<div class="key-point"><strong>Key Takeaway:</strong> E. coli has many pathotypes, each causing different diseases. The basic chromosome is similar across strains; pathogenicity depends on horizontally acquired genetic elements (plasmids, phages, pathogenicity islands).</div>`

          {
            title: "The 2011 German E. coli Outbreak: HGT in Action",
            content: `<p>The 2011 German outbreak is a real-world horror story that demonstrates the devastating consequences of horizontal gene transfer. It began in May 2011 in northern Germany with an alarming spike in cases of <strong>haemolytic uremic syndrome (HUS)</strong> -- a life-threatening condition where toxins destroy blood vessels in the kidneys.</p>
<div class="diagram"><svg overflow="visible" viewBox="-50 -50 710 360" xmlns="http://www.w3.org/2000/svg">

<text x="300" y="28" text-anchor="middle" font-size="13" font-weight="bold" fill="#264653">The Hybrid Pathogen: O104:H4</text>
<ellipse cx="150" cy="110" rx="110" ry="55" fill="#2a9d8f" opacity="0.15" stroke="#2a9d8f" stroke-width="2"/>

<text x="150" y="105" text-anchor="middle" font-size="8" fill="#264653">Shiga toxin (STX2a)</text>
<text x="150" y="120" text-anchor="middle" font-size="8" fill="#264653">from a prophage</text>
<text x="150" y="135" text-anchor="middle" font-size="8" fill="#264653">(causes HUS/kidney failure)</text>
<ellipse cx="450" cy="110" rx="110" ry="55" fill="#e76f51" opacity="0.15" stroke="#e76f51" stroke-width="2"/>
<text x="450" y="85" text-anchor="middle" font-size="10" font-weight="bold" fill="#e76f51">EAEC Features</text>
<text x="450" y="105" text-anchor="middle" font-size="8" fill="#264653">Aggregative adherence</text>
<text x="450" y="120" text-anchor="middle" font-size="8" fill="#264653">fimbriae (pAA plasmid)</text>
<text x="450" y="135" text-anchor="middle" font-size="8" fill="#264653">(tight gut adhesion)</text>
<line x1="265" y1="110" x2="335" y2="110" stroke="#264653" stroke-width="2"/>
<text x="300" y="105" text-anchor="middle" font-size="14" fill="#264653">+</text>
<rect x="150" y="180" width="300" height="60" rx="10" fill="#264653" opacity="0.1" stroke="#264653" stroke-width="2"/>
<text x="300" y="200" text-anchor="middle" font-size="12" font-weight="bold" fill="#e76f51">O104:H4 HYBRID</text>
<text x="300" y="218" text-anchor="middle" font-size="9" fill="#264653">4,000+ cases | ~1,000 HUS | 50+ deaths</text>
<text x="300" y="232" text-anchor="middle" font-size="8" fill="#264653">+ pESBL plasmid (antibiotic resistance)</text>
</svg><p class="diagram-caption">Figure: The O104:H4 outbreak strain was a "Frankenstein" hybrid combining EHEC's Shiga toxin (from a prophage) with EAEC's adhesion ability (from a plasmid). This combination had never been seen before.</p></div>
<p>The outbreak strain (O104:H4) turned out to be a Frankenstein hybrid. Its chromosome was that of an <strong>enteroaggregative E. coli (EAEC)</strong>, but it had acquired a <strong>Shiga toxin gene (STX2a)</strong> via a bacteriophage that integrated as a prophage, plus the <strong>pAA plasmid</strong> encoding aggregative adhesion fimbriae, plus a <strong>pESBL plasmid</strong> conferring antibiotic resistance. This combination of EHEC toxicity + EAEC adhesion had <em>never been seen before</em>.</p>
<p>The outbreak was initially blamed on Spanish cucumbers, costing Spanish exporters 120 million pounds per week and triggering import bans across Europe and Russia. It was actually traced to <strong>fenugreek sprouts</strong> from a specific lot of seeds imported from Egypt. Self-sprouters (people growing their own sprouts from the same seed lot) and a matching outbreak in France confirmed the source.</p>
<p>Final toll: over 4,000 EHEC cases, nearly 1,000 HUS cases, and over 50 deaths -- the highest HUS incidence rate ever recorded worldwide.</p>
<div class="key-point"><strong>Key Takeaway:</strong> The 2011 German outbreak demonstrated how HGT can create devastating hybrid pathogens. The O104:H4 strain combined virulence traits from two different pathotypes through phage integration and plasmid acquisition, causing unprecedented disease.</div>`

<text x="105" y="108" text-anchor="middle" font-size="8" fill="#264653">plasmid copies to</text>

<text x="105" y="140" text-anchor="middle" font-size="8" fill="#264653">before division</text>

<text x="300" y="155" text-anchor="middle" font-size="8" fill="#e76f51">If plasmid lost:</text>

<text x="495" y="85" text-anchor="middle" font-size="10" font-weight="bold" fill="#e9c46a">Killing</text>
<text x="495" y="108" text-anchor="middle" font-size="8" fill="#264653">Daughter cell without</text>
<text x="495" y="121" text-anchor="middle" font-size="8" fill="#264653">plasmid = DEAD</text>
<text x="495" y="145" text-anchor="middle" font-size="8" fill="#264653">Only plasmid-carrying</text>

<text x="495" y="193" text-anchor="middle" font-size="8" fill="#264653">switch)</text>
</svg><p class="diagram-caption">Figure: Three mechanisms ensure plasmid inheritance. Active partitioning physically distributes copies. The toxin-antitoxin system kills plasmid-free cells through post-segregational killing.</p></div>
<p><strong>Active partitioning</strong> uses proteins to physically push plasmid copies to opposite ends of the elongating cell before division, ensuring each daughter cell gets at least one copy.</p>
<p>The <strong>toxin-antitoxin (TA) system</strong> is like a dead man's switch. The plasmid encodes both a stable <strong>toxin</strong> and an unstable <strong>antitoxin</strong>. As long as the plasmid is present, both are continuously produced and the antitoxin neutralises the toxin. But if a daughter cell loses the plasmid, no more antitoxin is made. The existing antitoxin degrades quickly (it is unstable), while the toxin persists (it is stable) -- and kills the plasmid-free cell. This is called <strong>post-segregational killing</strong>.</p>
<p>The result: <strong>only plasmid-carrying cells survive</strong>. It is ruthlessly effective at ensuring plasmid maintenance in the population.</p>
<div class="key-point"><strong>Key Takeaway:</strong> Plasmids use active partitioning to ensure physical distribution and toxin-antitoxin systems to kill any daughter cell that loses the plasmid (post-segregational killing). These mechanisms ensure plasmids are stably inherited.</div>`

            content: `<p>The <strong>Shiga toxin</strong> is the weapon that makes EHEC so dangerous. Named after Kiyoshi Shiga who first identified it in <em>Shigella dysenteriae</em> in 1897, this toxin damages the lining of blood vessels, particularly in the kidneys.</p>
<p>There are two main types: <strong>STX1</strong> (nearly identical to the original Shigella toxin, 3 subtypes) and <strong>STX2</strong> (about 60% protein similarity, 11 subtypes). <strong>STX2a</strong> is the subtype most commonly implicated in <strong>haemolytic uremic syndrome (HUS)</strong> -- a devastating condition where toxin-damaged kidney blood vessels lead to kidney failure.</p>
<p>Crucially, the genes encoding Shiga toxins are <strong>carried by bacteriophages</strong>. They are literally virus-delivered weapons. When a phage carrying the STX gene integrates into the chromosome as a prophage, the bacterium gains the ability to produce this deadly toxin. The O104:H4 outbreak strain's STX2a phage was most closely related to phages from O157:H7 strains, suggesting it jumped between different <em>E. coli</em> serotypes.</p>
<p>O157:H7 lives as a harmless commensal in healthy cattle intestines. Humans get infected through contaminated minced beef (where mincing pushes surface bacteria throughout the meat) or leafy greens fertilised with cattle manure.</p>
<div class="key-point"><strong>Key Takeaway:</strong> Shiga toxin genes are phage-delivered. STX2a is the subtype most associated with HUS and kidney failure. EHEC (especially O157:H7) lives harmlessly in cattle but causes severe disease in humans through contaminated food.</div>`

          {
            title: "Mating Experiments and Incompatibility Groups",
            content: `<p>How do scientists prove a plasmid is conjugative in the laboratory? Through elegant <strong>mating experiments</strong>.</p>
<p>The setup: a <strong>donor strain</strong> carries the plasmid with antibiotic resistance gene A (e.g. ampicillin resistance). The <strong>recipient strain</strong> has a different resistance gene B (e.g. chloramphenicol resistance) on its chromosome but no plasmid. The two strains are mixed and allowed to "mate" (undergo conjugation).</p>
<p>After mating, the mixture is plated on agar containing <strong>BOTH antibiotics A and B</strong>. Only <strong>transconjugants</strong> -- recipients that successfully received the plasmid -- can grow, because only they have both resistance genes. Donor-only cells die (no resistance to B). Recipient-only cells die (no resistance to A). It is a clever double-selection system.</p>
<p>Plasmids are also classified into <strong>incompatibility (Inc) groups</strong>. If a cell already carries an IncI plasmid, another IncI plasmid cannot stably coexist in the same cell -- they are "incompatible" and use the same replication and partitioning machinery. But an IncF plasmid could move in because it uses a different system. This classification helps epidemiologists track plasmid spread.</p>
<p>The pESBL plasmid from the German outbreak strain was shown to be conjugative and highly stable. When researchers deleted its partitioning locus, the plasmid started missegregating, triggering post-segregational killing of plasmid-free daughter cells. But the plasmid could still re-transfer to new cells via conjugation.</p>
<div class="key-point"><strong>Key Takeaway:</strong> Mating experiments use dual antibiotic selection to identify transconjugants. Incompatibility groups classify plasmids -- two plasmids of the same Inc group cannot coexist in one cell.</div>`

<p>The real detective work relied on several lines of evidence:</p>
<ol>
<li><strong>Trade network analysis</strong> -- All 41 outbreak clusters traced back to a single sprout producer in Germany</li>

<li><strong>The French connection</strong> -- A small French outbreak with an identical strain was traced to sprouts from the same lot of fenugreek seeds from Egypt</li>

<p>By the time investigators traced back to the Egyptian fenugreek seeds, the contaminated lot had already been completely used up. The next shipment of seeds was clean, confirming the contamination was limited to that specific lot.</p>
<p>This case illustrates why understanding bacterial genetics and classification matters practically: Gram staining alone cannot distinguish between pathogenic and non-pathogenic <em>E. coli</em> -- you need genetic characterisation to identify the specific virulence factors.</p>

          {
            title: "Pathogenicity Islands: Virulence Gene Clusters on the Chromosome",
            content: `<p>While plasmids and phages are mobile elements that can carry virulence genes, some of the most important virulence determinants are found in large regions of the bacterial chromosome called <strong>pathogenicity islands (PAIs)</strong>. As the lecturer described, these are "big chunks of your DNA on the chromosome, and that's why they're called a pathogenicity island -- because in this region on the chromosome, all these virulence genes can be found."</p>
<p>Key characteristics of pathogenicity islands:</p>
<ul>
<li><strong>Large size</strong> -- Pathogenicity islands typically range from 10 to 200 kilobases (kb) in length, much larger than individual genes</li>
<li><strong>Clustered virulence genes</strong> -- They contain multiple virulence-related genes grouped together in one chromosomal region, often encoding entire functional systems (e.g. secretion systems, adhesins, toxins)</li>
<li><strong>Acquired by horizontal gene transfer</strong> -- PAIs were originally acquired from other organisms through HGT, not by mutation of existing genes. The evidence for this includes their different GC content compared to the rest of the chromosome -- like a paragraph written in a different font inserted into a book</li>
<li><strong>Absent from non-pathogenic strains</strong> -- If you compare a pathogenic strain to a closely related non-pathogenic strain of the same species, the pathogenicity island is missing from the non-pathogenic strain. This is strong evidence that it was acquired rather than ancestral</li>
<li><strong>Often flanked by mobile genetic elements</strong> -- PAIs frequently have insertion sequences or tRNA genes at their boundaries, remnants of the recombination events that inserted them</li>
</ul>
<p>A classic example is <em>Vibrio cholerae</em>, the bacterium that causes cholera. The <strong>TCP (toxin co-regulated pilus)</strong> genes, which are essential for intestinal colonisation, are located on a roughly <strong>40 kb pathogenicity island</strong> called the <em>Vibrio</em> Pathogenicity Island (VPI). This island has a different GC content from the rest of the <em>V. cholerae</em> chromosome, confirming its foreign origin. Non-toxigenic strains of <em>V. cholerae</em> lack this island entirely.</p>
<p>In <em>E. coli</em>, the transition from a harmless gut commensal to a dangerous pathogen often involves the acquisition of pathogenicity islands. Together with virulence plasmids and prophages, pathogenicity islands explain how "we're creating completely different combinations of our genetic material, and so we have different strains of <em>E. coli</em> that are able to do different things."</p>
<div class="key-point"><strong>Key Takeaway:</strong> Pathogenicity islands are large (10-200 kb) chromosomal regions containing clustered virulence genes acquired by HGT. They have different GC content from the rest of the chromosome (evidence of foreign origin) and are absent from non-pathogenic strains. The TCP genes on V. cholerae's ~40 kb VPI is a classic example.</div>`

          {
            title: "Symbiosis Types: Mutualism, Commensalism, and Parasitism",
            content: `<p>All organisms interact with other organisms, but the nature of these interactions varies enormously. The umbrella term for organisms living together is <strong>symbiosis</strong> ("living together"). Within symbiosis, there are three main relationship types.</p>
<div class="diagram"><img src="https://upload.wikimedia.org/wikipedia/commons/6/64/Symbiotic_relationships_diagram.svg" alt="Diagram of the six types of symbiotic relationships including mutualism, commensalism, and parasitism" style="max-width:100%;height:auto;border-radius:8px;"><p class="diagram-caption">Figure: The three types of symbiosis. Mutualism is win-win, commensalism is win-neutral, and parasitism is win-lose. A good parasite keeps its host alive as long as possible.</p></div>
<p>The key insight about parasitism: <strong>a good parasite does not kill its host</strong>. A dead host is useless -- the parasite wants to exploit the host for as long as possible. Problems arise when parasite burden becomes too high, or when the parasite acts as a <strong>vector</strong> carrying even more dangerous pathogens (bacteria, viruses) into the host.</p>
<p>Parasites are <strong>eukaryotic organisms</strong> (not bacteria or viruses) that live in or on a host. This is a fundamental distinction from the microorganisms covered in earlier lectures.</p>
<div class="key-point"><strong>Key Takeaway:</strong> Mutualism = both benefit. Commensalism = one benefits, other unaffected. Parasitism = parasite benefits at host's expense. A "successful" parasite keeps its host alive.</div>`
          },
          {
            title: "Types of Parasites: Ecto vs Endo, Obligate vs Facultative",
            content: `<p>Parasites come in many forms, and classifying them helps us understand how to detect and control them.</p>
<table class="compare-table"><thead><tr><th>Classification</th><th>Type A</th><th>Type B</th></tr></thead><tbody>
<tr><td><strong>Location</strong></td><td><strong>Ectoparasite</strong> -- lives ON the host surface (ticks, fleas, lice). Has tough exoskeleton, often can fly/jump/crawl.</td><td><strong>Endoparasite</strong> -- lives INSIDE the host (worms, protozoa). Soft-bodied, protected by host's body.</td></tr>
<tr><td><strong>Host dependence</strong></td><td><strong>Obligate</strong> -- MUST have a host to complete life cycle (fleas need blood meals; lice die without host warmth).</td><td><strong>Facultative</strong> -- can survive without a host (sheep blowfly <em>Lucilia cuprina</em> can lay eggs on carrion instead of sheep).</td></tr>
<tr><td><strong>Duration</strong></td><td><strong>Permanent</strong> -- on host all the time (lice = "Goldilocks parasites" needing constant host temperature).</td><td><strong>Intermittent</strong> -- visits periodically (mosquitoes bite and leave).</td></tr>
</tbody></table>
<p>An important point: these categories <strong>can change across life stages</strong> of the same parasite. A tick larva might be an intermittent ectoparasite, while the adult female is semi-permanent. The type of parasitism is not fixed -- it can vary within a single parasite's life cycle.</p>
<p>Lice are the perfect example of a <strong>permanent obligate ectoparasite</strong>. They are "Goldilocks parasites" -- they cannot survive temperatures that are too hot or too cold, so they must stay on their host at all times. If they fall off, they die quickly in the environment.</p>
<div class="key-point"><strong>Key Takeaway:</strong> Parasites are classified by location (ecto/endo), host dependence (obligate/facultative), and duration (permanent/intermittent). These categories can change across life stages of the same parasite.</div>`

<text x="300" y="268" text-anchor="middle" font-size="9" fill="#264653">Memory tricks: Direct = Definitive (DD) | Indirect = Intermediate (II) | Paratenic = Passenger (PP)</text>

<p>Key players in the life cycle:</p>

<li><strong>Intermediate host</strong> -- an "in-between" host. No sexual reproduction, but the parasite may undergo development or use it as a bridge to the definitive host.</li>
<li><strong>Paratenic (passenger) host</strong> -- nothing much happens; often accidental but can protect the parasite en route to the definitive host.</li>
</ul>
<p>The <strong>pre-patent period</strong> is the time from when the infective stage enters the host to when the parasite completes its life cycle and begins producing the next infective stage. Knowing this is critical for treatment timing -- for example, pinworms are treated twice, 2 weeks apart, because the second dose catches stages that survived the first.</p>
<p>Having <strong>multiple intermediate hosts</strong> is advantageous for parasites -- if one host species disappears, alternatives exist. It is like having backup plans.</p>
<div class="key-point"><strong>Key Takeaway:</strong> Direct life cycles need only a definitive host (DD). Indirect cycles also need intermediate hosts (II). Pre-patent period determines treatment timing. Knowing the life cycle is the key to breaking transmission.</div>`

          {
            title: "The Three-Pronged Approach to Parasite Control",
            content: `<p>Many people think parasite control simply means "give drugs." This is <strong>wrong</strong> and is precisely why we have widespread drug resistance. Effective parasite control requires a <strong>three-pronged approach</strong>, listed in order of importance:</p>
<ol>
<li><strong>Management (M) -- MOST IMPORTANT</strong><br>
Prevent the parasite from reaching the host in the first place. Examples:
<ul>
<li>Shearing sheep (removes ectoparasite habitat)</li>
<li>Rotating pastures (animals avoid fecal buildup)</li>
<li>Fencing off contaminated water sources</li>
<li>Good nutrition (strong immune system fights parasites naturally)</li>
<li>Biosecurity when introducing new animals</li>
<li>All-in/all-out management in kennels and daycares</li>
</ul></li>
<li><strong>Epidemiology (E)</strong><br>
Know WHEN and WHERE the parasite is active. What time of year? What time of day? What climate? Combine this with management. Example: if parasitic flies bite horses at night, stable the horses at night.</li>
<li><strong>Treatment (T) -- LAST RESORT</strong><br>
Use drugs only when necessary. Over-reliance leads to resistance. Small parasite burdens are normal -- animals and parasites have co-evolved. Problems arise only when burden becomes too large.</li>
</ol>
<p>The lecturer emphasised that <strong>you should never jump to treatment first</strong>. Widespread anthelmintic (anti-worm drug) resistance globally is the direct result of over-reliance on drugs without adequate management and epidemiological knowledge.</p>
<p>For fleas, this is particularly relevant: <strong>90% of the flea life cycle occurs in the environment</strong>, not on the animal. Treating only the animal is futile if you do not also treat the environment (vacuuming, cleaning, environmental insecticides).</p>
<div class="key-point"><strong>Key Takeaway:</strong> Parasite control = Management (prevent contact) + Epidemiology (know when/where) + Treatment (drugs as last resort). Management is the most important step. Over-reliance on drugs causes resistance.</div>`

<p>Key features of Giardia:</p>

          {
            title: "Major Parasite Groups and Host Manipulation",
            content: `<p>Parasites are incredibly diverse. The five major groups relevant to agriculture are:</p>
<ol>
<li><strong>Protists (protozoa)</strong> -- Single-celled, microscopic. Includes flagellates (Giardia), amoeba, ciliates, and sporozoa</li>
<li><strong>Nematodes (roundworms)</strong> -- Cylindrical, unsegmented worms. <em>Haemonchus contortus</em> is arguably the most important parasite of cattle and sheep in Australia</li>
<li><strong>Trematodes (flukes)</strong> -- Flat, unsegmented worms. <em>Fasciola hepatica</em> (liver fluke) is very important in Australian livestock</li>
<li><strong>Cestodes (tapeworms)</strong> -- Flat, segmented worms</li>
<li><strong>Arthropods</strong> -- Segmented ectoparasites with jointed appendages: insects, arachnids (ticks, mites), crustaceans</li>
</ol>
<p>Some of the most fascinating aspects of parasitology involve <strong>host manipulation</strong>:</p>
<ul>
<li><strong>Leucochloridium</strong> (a worm) parasitises snails and makes their antennae pulse like caterpillars to attract birds (the definitive host)</li>
<li><strong>Nematomorphs</strong> (hairworms) make their arthropod host commit suicide by jumping into water so the parasite can be released</li>
<li><strong>Trypanosomes</strong> evade the immune system by shedding and changing their outer surface proteins (<strong>antigenic variation</strong>), tricking the host into thinking the infection is gone</li>
</ul>
<p>In Australian agriculture, key parasites include: <em>Haemonchus contortus</em> (roundworm of cattle/sheep), <em>Fasciola hepatica</em> (liver fluke), <em>Ixodes holocyclus</em> (paralysis tick -- can actually kill its host, which is unusual), <em>Bovicola ovis</em> (sheep body louse causing production loss through itching, rubbing, pulled wool), and <em>Lucilia cuprina</em> (sheep blowfly -- a facultative parasite whose larvae eat sheep flesh).</p>
<p>Remember: parasites exploit <strong>every possible niche worldwide</strong>. There is no host on Earth that lacks associated parasites. You probably have tiny <strong>Demodex</strong> mites on your face right now -- and that is completely normal.</p>
<div class="key-point"><strong>Key Takeaway:</strong> The five major parasite groups are protists, nematodes, trematodes, cestodes, and arthropods. Some parasites manipulate host behaviour to complete their life cycles. In Australia, key agricultural parasites include Haemonchus, Fasciola, paralysis ticks, sheep lice, and blowflies.</div>`

          {
