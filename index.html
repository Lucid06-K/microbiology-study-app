    // ==========================================
    // RENDER: LECTURE
    // ==========================================
    function renderLecture() {
      const area = document.getElementById('contentArea');
      area.classList.remove('dashboard-active');
      const lec = getLecture(state.currentWeek, state.currentLecture);
      const week = getWeek(state.currentWeek);

      if (!lec || !week) {
        area.innerHTML = '<p>Lecture not found.</p>';
        return;
      }

      const tabs = ['learn', 'terms', 'facts', 'quiz', 'flash'];
      const tabLabels = { learn: 'Learn', terms: 'Terms', facts: 'Facts', quiz: 'Quiz', flash: 'Flashcards' };
      const tabCounts = {
        learn: lec.explanations ? lec.explanations.length : 0,
        terms: lec.terms ? lec.terms.length : 0,
        facts: lec.facts ? lec.facts.length : 0,
        quiz: lec.quiz ? lec.quiz.length : 0,
        flash: lec.terms ? lec.terms.length : 0
      };

      let tabBarHTML = '<div class="tab-bar">';
      tabs.forEach(t => {
        tabBarHTML += `<button class="tab-btn ${state.currentTab === t ? 'active' : ''}" onclick="setTab('${t}')">${tabLabels[t]} (${tabCounts[t]})</button>`;
      });
      tabBarHTML += '</div>';

      let contentHTML = '';
      switch (state.currentTab) {
        case 'learn': contentHTML = renderLearnTab(lec); break;
        case 'terms': contentHTML = renderTermsTab(lec); break;
        case 'facts': contentHTML = renderFactsTab(lec); break;
        case 'quiz': contentHTML = renderQuizTab(lec); break;
        case 'flash': contentHTML = renderFlashcardTab(lec); break;
      }

      area.innerHTML = `
        <div class="lecture-header">
          <div class="lecture-breadcrumb">
            <span onclick="showDashboard()">Dashboard</span> / <span>${escapeHTML(week.title)}</span> / <span>${escapeHTML(lec.title)}</span>
          </div>
          <h2>${escapeHTML(lec.title)}</h2>
        </div>
        ${tabBarHTML}
        <div class="tab-content">${contentHTML}</div>`;
    }

    // ==========================================
    // RENDER: LEARN TAB
    // ==========================================
    function renderLearnTab(lec) {
      if (!lec.explanations || lec.explanations.length === 0) {
        return '<p style="color:var(--text-light);">No content available yet.</p>';
      }

      const key = lectureKey(state.currentWeek, state.currentLecture);
      // Initialize expanded cards: first one open by default
      if (!state.expandedCards[key]) {
        state.expandedCards[key] = { 0: true };
      }

      let html = '';
      lec.explanations.forEach((exp, idx) => {
        // Render Learning Intentions as interactive checklist
        if (exp.title === 'Learning Intentions') {
          html += renderLearningIntentions(exp.content, key);
          return;
        }

        const isExpanded = state.expandedCards[key] && state.expandedCards[key][idx];
        const preview = truncate(stripHTML(exp.content), 150);

        var topicImages = getImagesForTopic(state.currentLecture, exp.title);
        var extraImgHTML = '';
        if (topicImages.length > 0) {
          topicImages.forEach(function(img) {
            extraImgHTML += '<div class="diagram"><img src="' + escapeHTML(img.url) + '" alt="' + escapeHTML(img.alt) + '" style="max-width:100%;height:auto;border-radius:8px;"><p class="diagram-caption">' + escapeHTML(img.caption) + '</p></div>';
          });
        }

        html += `
          <div class="explanation-card ${isExpanded ? 'expanded' : ''}" id="expCard-${idx}">
            <div class="explanation-card-header">
              <h3 onclick="toggleCard(${idx})" style="cursor:pointer">${escapeHTML(exp.title)}</h3>
              <button class="tts-btn" id="ttsBtn-${idx}" onclick="event.stopPropagation();toggleTTS(${idx})" title="Read aloud">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
              </button>
              <span class="expand-icon" onclick="toggleCard(${idx})" style="cursor:pointer">\u25BC</span>
            </div>
            <div class="explanation-card-preview">${escapeHTML(preview)}</div>
            <div class="explanation-card-body">${exp.content}${extraImgHTML}</div>
          </div>`;
      });

      // Add video section
      var videos = getVideosForLecture(state.currentWeek, state.currentLecture);
      if (videos.length > 0) {
        html += '<div class="videos-section"><h3 class="videos-heading">Recommended Videos</h3>';
        videos.forEach(function(v) {
          html += '<a href="' + v.url + '" target="_blank" rel="noopener noreferrer" class="video-card">' +
            '<div class="video-thumb"><svg viewBox="0 0 24 24" fill="var(--accent)" width="32" height="32"><path d="M8 5v14l11-7z"/></svg></div>' +
            '<div class="video-info"><div class="video-title">' + escapeHTML(v.title) + '</div>' +
            '<div class="video-channel">' + escapeHTML(v.channel) + '</div></div></a>';
        });
        html += '</div>';
      }

      return html;
    }

    function renderLearningIntentions(content, lectureKey) {
      // Extract list items from the HTML content
      var items = [];
      var matches = content.match(/<li>(.*?)<\/li>/gi);
      if (matches) {
        matches.forEach(function(m) {
          items.push(m.replace(/<\/?li>/gi, '').trim());
        });
      }
      if (items.length === 0) return '';

      // Get checked state from localStorage
      if (!state.liChecked) state.liChecked = {};
      if (!state.liChecked[lectureKey]) state.liChecked[lectureKey] = {};
      var checked = state.liChecked[lectureKey];
      var checkedCount = 0;
      items.forEach(function(item, i) { if (checked[i]) checkedCount++; });
      var allDone = checkedCount === items.length;

      var itemsHTML = '';
      items.forEach(function(item, i) {
        var isChecked = checked[i] ? ' checked' : '';
        itemsHTML +=
          '<div class="li-item' + isChecked + '" onclick="toggleLI(\'' + lectureKey + '\',' + i + ')">' +
            '<div class="li-checkbox"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>' +
            '<div class="li-text">' + item + '</div>' +
          '</div>';
      });

      return '<div class="li-card">' +
        '<div class="li-card-header">' +
          '<h3>Learning Intentions</h3>' +
          '<div style="display:flex;align-items:center;gap:8px;">' +
            '<span class="li-progress-badge' + (allDone ? ' complete' : '') + '">' + checkedCount + '/' + items.length + '</span>' +
            '<button class="li-reset" onclick="event.stopPropagation();resetLI(\'' + lectureKey + '\')">Reset</button>' +
          '</div>' +
        '</div>' +
        '<p style="font-size:0.85rem;color:var(--text-light);margin-bottom:12px;">Tick off each intention as you feel confident about it:</p>' +
        itemsHTML +
      '</div>';
    }

    function toggleLI(lectureKey, idx) {
      if (!state.liChecked) state.liChecked = {};
      if (!state.liChecked[lectureKey]) state.liChecked[lectureKey] = {};
      state.liChecked[lectureKey][idx] = !state.liChecked[lectureKey][idx];
      saveState();
      renderLecture();
    }

    function resetLI(lectureKey) {
      if (state.liChecked) state.liChecked[lectureKey] = {};
      saveState();
      renderLecture();
    }

    function toggleCard(idx) {
      const key = lectureKey(state.currentWeek, state.currentLecture);
      if (!state.expandedCards[key]) state.expandedCards[key] = {};
      state.expandedCards[key][idx] = !state.expandedCards[key][idx];
      saveState();

      const card = document.getElementById(`expCard-${idx}`);
      if (card) {
        card.classList.toggle('expanded');
      }
    }

    // ==========================================
    // RENDER: TERMS TAB
    // ==========================================
    function renderTermsTab(lec) {
      if (!lec.terms || lec.terms.length === 0) {
        return '<p style="color:var(--text-light);">No terms available yet.</p>';
      }

      let termsListHTML = '';
      lec.terms.forEach((t, i) => {
        termsListHTML += `
          <div class="term-card term-item" data-index="${i}">
            <span class="term-badge">${escapeHTML(t.term)}</span>
            <div class="term-def">${escapeHTML(t.def)}</div>
          </div>`;
      });

      return `
        <div class="terms-search">
          <span class="search-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
          <input type="text" id="termsFilter" placeholder="Filter terms..." oninput="filterTerms(this.value)">
        </div>
        <div id="termsList">${termsListHTML}</div>`;
    }

    function filterTerms(query) {
      const q = query.toLowerCase().trim();
      const items = document.querySelectorAll('.term-item');
      const lec = getLecture(state.currentWeek, state.currentLecture);
      if (!lec) return;

      items.forEach((el, i) => {
        const t = lec.terms[i];
        if (!t) return;
        const match = !q || t.term.toLowerCase().includes(q) || t.def.toLowerCase().includes(q);
        el.style.display = match ? '' : 'none';
      });
    }

    // ==========================================
    // RENDER: FACTS TAB
    // ==========================================
    function renderFactsTab(lec) {
      if (!lec.facts || lec.facts.length === 0) {
        return '<p style="color:var(--text-light);">No facts available yet.</p>';
      }

      let html = '';
      lec.facts.forEach(f => {
        html += `<div class="fact-item"><span class="fact-bullet"></span><span>${escapeHTML(f)}</span></div>`;
      });
      return html;
    }

    // ==========================================
    // RENDER: QUIZ TAB
    // ==========================================
    function renderQuizTab(lec) {
      if (!lec.quiz || lec.quiz.length === 0) {
        return '<p style="color:var(--text-light);">No quiz available yet.</p>';
      }

      const key = lectureKey(state.currentWeek, state.currentLecture);
      const qs = state.quizState[key] || { answers: {}, score: 0 };
      const answered = Object.keys(qs.answers).length;
      const total = lec.quiz.length;
      const progress = total > 0 ? Math.round((answered / total) * 100) : 0;

      let questionsHTML = '';
      lec.quiz.forEach((q, idx) => {
        const userAns = qs.answers[idx];
        const isAnswered = userAns !== undefined;
        const isCorrect = isAnswered && userAns === q.ans;
        const cardClass = isAnswered ? (isCorrect ? 'answered-correct' : 'answered-wrong') : '';

        let optsHTML = '';
        q.opts.forEach((opt, oi) => {
          let btnClass = '';
          let disabled = '';
          if (isAnswered) {
            disabled = 'disabled';
            if (oi === q.ans) btnClass = 'correct';
            else if (oi === userAns && userAns !== q.ans) btnClass = 'wrong';
            if (oi === q.ans && userAns !== q.ans) btnClass = 'reveal-correct';
          }
          optsHTML += `<button class="quiz-option-btn ${btnClass}" ${disabled} onclick="answerQuiz(${idx}, ${oi})">${escapeHTML(opt)}</button>`;
        });

        let expHTML = '';
        if (isAnswered) {
          expHTML = `<div class="quiz-explanation"><strong>${isCorrect ? 'Correct!' : 'Incorrect.'}</strong> ${escapeHTML(q.exp)}</div>`;
        }

        questionsHTML += `
          <div class="quiz-question-card ${cardClass}">
            <div class="quiz-q-num">Question ${idx + 1} of ${total}</div>
            <div class="quiz-q-text">${escapeHTML(q.q)}</div>
            <div class="quiz-options">${optsHTML}</div>
            ${expHTML}
          </div>`;
      });

      var html = '<div class="quiz-header">' +
        '<div class="quiz-score">Score: <span class="correct">' + qs.score + '</span> / <span class="total">' + total + '</span></div>' +
        '<div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:' + progress + '%"></div></div>' +
        '<button class="quiz-retry-btn" onclick="retryQuiz()">Retry</button>' +
        '</div>' + questionsHTML;

      // Short Answer Questions section
      var saData = SHORT_ANSWERS[lec.id] || [];
      if (saData.length > 0) {
        html += '<div class="sa-section"><h3 class="sa-heading">Short Answer Questions</h3>';
        saData.forEach(function(sa, idx) {
          var saKey = lectureKey(state.currentWeek, state.currentLecture) + '_sa' + idx;
          var rating = (state.saRatings && state.saRatings[saKey]) || '';
          html += '<div class="sa-card">' +
            '<div class="sa-marks">' + sa.marks + ' marks</div>' +
            '<p class="sa-question">' + escapeHTML(sa.q) + '</p>' +
            '<textarea class="sa-textarea" placeholder="Write your answer here..." rows="4"></textarea>' +
            '<button class="sa-reveal-btn" onclick="toggleModelAnswer(' + idx + ')">Show Model Answer</button>' +
            '<div class="sa-model" id="saModel-' + idx + '" style="display:none;">' +
              '<strong>Model Answer:</strong><p>' + escapeHTML(sa.model) + '</p>' +
              '<div class="sa-rating">' +
                '<span>How did you do?</span>' +
                '<button class="sa-rate-btn ' + (rating==='nailed' ? 'active green' : '') + '" onclick="rateSA(' + idx + ',\'nailed\')">Nailed it</button>' +
                '<button class="sa-rate-btn ' + (rating==='partial' ? 'active yellow' : '') + '" onclick="rateSA(' + idx + ',\'partial\')">Partially correct</button>' +
                '<button class="sa-rate-btn ' + (rating==='missed' ? 'active red' : '') + '" onclick="rateSA(' + idx + ',\'missed\')">Missed it</button>' +
              '</div>' +
            '</div>' +
          '</div>';
        });
        html += '</div>';
      }

      return html;
    }

    function answerQuiz(qIdx, optIdx) {
      const key = lectureKey(state.currentWeek, state.currentLecture);
      if (!state.quizState[key]) state.quizState[key] = { answers: {}, score: 0 };
      const qs = state.quizState[key];

      // Don't re-answer
      if (qs.answers[qIdx] !== undefined) return;

      qs.answers[qIdx] = optIdx;

      // Recalculate score
      const lec = getLecture(state.currentWeek, state.currentLecture);
      if (!lec) return;
      let score = 0;
      Object.keys(qs.answers).forEach(k => {
        if (lec.quiz[k] && qs.answers[k] === lec.quiz[k].ans) score++;
      });
      qs.score = score;

      // Update progress
      const answeredAll = Object.keys(qs.answers).length === lec.quiz.length;
      if (answeredAll) {
        state.progress[key] = (score === lec.quiz.length) ? 'complete' : 'partial';
      }

      saveState();
      updateSidebarActive();
      renderLecture();
    }

    function retryQuiz() {
      const key = lectureKey(state.currentWeek, state.currentLecture);
      state.quizState[key] = { answers: {}, score: 0 };
      // Reset progress to viewed (not partial/complete)
      if (state.progress[key] === 'complete' || state.progress[key] === 'partial') {
        state.progress[key] = 'viewed';
      }
      saveState();
      updateSidebarActive();
      renderLecture();
    }

    // ==========================================
    // SEARCH
    // ==========================================
    let searchTimeout = null;

    function initSearch() {
      const input = document.getElementById('searchInput');
      const dropdown = document.getElementById('searchDropdown');

      input.addEventListener('input', () => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
          performSearch(input.value.trim());
        }, 250);
      });

      input.addEventListener('focus', () => {
        if (input.value.trim()) performSearch(input.value.trim());
      });

      document.addEventListener('click', (e) => {
        if (!e.target.closest('.search-box')) {
          dropdown.classList.remove('visible');
        }
      });
    }

    function performSearch(query) {
      const dropdown = document.getElementById('searchDropdown');
      if (!query || query.length < 2) {
        dropdown.classList.remove('visible');
        return;
      }

      const q = query.toLowerCase();
      const results = [];

      COURSE.weeks.forEach(w => {
        w.lectures.forEach(l => {
          // Search explanations
          if (l.explanations) {
            l.explanations.forEach(exp => {
              const titleMatch = exp.title.toLowerCase().includes(q);
              const contentText = stripHTML(exp.content).toLowerCase();
              const contentMatch = contentText.includes(q);
              if (titleMatch || contentMatch) {
                const previewText = stripHTML(exp.content);
                const matchIdx = previewText.toLowerCase().indexOf(q);
                let preview = '';
                if (matchIdx >= 0) {
                  const start = Math.max(0, matchIdx - 40);
                  const end = Math.min(previewText.length, matchIdx + query.length + 60);
                  preview = (start > 0 ? '...' : '') + previewText.substring(start, end) + (end < previewText.length ? '...' : '');
                } else {
                  preview = truncate(previewText, 100);
                }
                results.push({
                  type: 'Learn',
                  title: exp.title,
                  preview: preview,
                  weekId: w.id,
                  lectureId: l.id,
                  tab: 'learn',
                  lecTitle: l.title
                });
              }
            });
          }
          // Search terms
          if (l.terms) {
            l.terms.forEach(t => {
              if (t.term.toLowerCase().includes(q) || t.def.toLowerCase().includes(q)) {
                results.push({
                  type: 'Term',
                  title: t.term,
                  preview: truncate(t.def, 100),
                  weekId: w.id,
                  lectureId: l.id,
                  tab: 'terms',
                  lecTitle: l.title
                });
              }
            });
          }
          // Search facts
          if (l.facts) {
            l.facts.forEach(f => {
              if (f.toLowerCase().includes(q)) {
                results.push({
                  type: 'Fact',
                  title: truncate(f, 60),
                  preview: f,
                  weekId: w.id,
                  lectureId: l.id,
                  tab: 'facts',
                  lecTitle: l.title
                });
              }
            });
          }
        });
      });

      if (results.length === 0) {
        dropdown.innerHTML = '<div class="search-no-results">No results found</div>';
        dropdown.classList.add('visible');
        return;
      }

      let html = '';
      results.slice(0, 15).forEach(r => {
        const highlighted = highlightMatch(r.preview, query);
        html += `
          <div class="search-result-item" onclick="navigateToResult(${r.weekId}, ${r.lectureId}, '${r.tab}')">
            <span class="search-result-type">${r.type}</span>
            <div class="search-result-title">${escapeHTML(r.title)}</div>
            <div class="search-result-preview">${highlighted}</div>
            <div style="font-size:0.72rem;color:var(--text-light);margin-top:4px;">${escapeHTML(r.lecTitle)}</div>
          </div>`;
      });

      dropdown.innerHTML = html;
      dropdown.classList.add('visible');
    }

    function highlightMatch(text, query) {
      const escaped = escapeHTML(text);
      const q = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      const regex = new RegExp(`(${q})`, 'gi');
      return escaped.replace(regex, '<mark>$1</mark>');
    }

    function navigateToResult(weekId, lectureId, tab) {
      state.currentTab = tab;
      document.getElementById('searchDropdown').classList.remove('visible');
      document.getElementById('searchInput').value = '';
      showLecture(weekId, lectureId);
    }

    // ==========================================
    // TEXT-TO-SPEECH (Mac Native Voices via Local Server)
    // ==========================================
    var tts = {
      speakingIdx: -1,
      voice: localStorage.getItem('tts-mac-voice') || 'Google UK English Male',
      rate: parseInt(localStorage.getItem('tts-mac-rate') || '175'),
      voices: [],
      currentAudio: null,
      serverAvailable: false,
      paused: false,
      currentCardIdx: -1,
      sentences: [],
      sentenceElements: [],
      currentSentenceIdx: 0,
      totalSentences: 0,
    };

    // Novelty voices to hide from the list
    var NOVELTY_VOICES = ['Albert','Bad News','Bahh','Bells','Boing','Bubbles','Cellos',
      'Good News','Jester','Junior','Organ','Superstar','Trinoids','Whisper','Zarvox','Wobble','Fred','Ralph','Kathy'];

    function loadMacVoices() {
      fetch('/api/voices').then(function(r) {
        if (!r.ok) throw new Error('no server');
        return r.json();
      }).then(function(voices) {
        // Filter out novelty voices and deduplicate
        var seen = {};
        tts.voices = voices.filter(function(v) {
          if (NOVELTY_VOICES.indexOf(v.name) >= 0) return false;
          if (seen[v.name]) return false;
          seen[v.name] = true;
          return true;
        });
        // Sort: premium > enhanced > standard
        var order = {premium: 0, enhanced: 1, standard: 2};
        tts.voices.sort(function(a, b) {
          var aO = order[a.quality] !== undefined ? order[a.quality] : 2;
          var bO = order[b.quality] !== undefined ? order[b.quality] : 2;
          if (aO !== bO) return aO - bO;
          return a.name.localeCompare(b.name);
        });
        tts.serverAvailable = true;
        // Auto-select best voice if current not found
        var found = tts.voices.find(function(v) { return v.name === tts.voice; });
        if (!found && tts.voices.length > 0) tts.voice = tts.voices[0].name;
        var sel = document.getElementById('voiceSelect');
        if (sel) populateVoiceSelect(sel);
      }).catch(function() {
        tts.serverAvailable = false;
        loadBrowserVoices();
      });
    }

    // Best-sounding voices ranked by quality (checked across OS/browser combos)
    var PREFERRED_VOICES = [
      // Google online voices (Chrome) - very natural
      'Google UK English Female', 'Google UK English Male', 'Google US English',
      // macOS premium/enhanced
      'Zoe (Premium)', 'Samantha (Enhanced)', 'Karen (Enhanced)', 'Daniel (Enhanced)',
      'Jamie (Premium)', 'Lee (Premium)', 'Tom (Enhanced)', 'Stephanie (Premium)',
      // macOS standard but decent
      'Samantha', 'Karen', 'Daniel', 'Moira',
      // Windows natural voices
      'Microsoft Aria Online (Natural)', 'Microsoft Jenny Online (Natural)',
      'Microsoft Guy Online (Natural)', 'Microsoft Sonia Online (Natural)',
      // Windows standard
      'Microsoft Zira', 'Microsoft David', 'Microsoft Mark',
      // Fallback
      'Alex', 'Victoria', 'Fiona'
    ];

    function loadBrowserVoices() {
      if (!window.speechSynthesis) return;
      function doLoad() {
        var allVoices = window.speechSynthesis.getVoices().filter(function(v) { return v.lang.startsWith('en'); });
        if (allVoices.length === 0) {
          setTimeout(doLoad, 500);
          return;
        }

        // Filter out novelty voices and deduplicate
        var seen = {};
        allVoices = allVoices.filter(function(v) {
          if (NOVELTY_VOICES.indexOf(v.name) >= 0) return false;
          // Also filter by partial match for names like "Bad News", etc.
          var simpleName = v.name.replace(/\s*\(.*?\)\s*/g, '').trim();
          if (NOVELTY_VOICES.indexOf(simpleName) >= 0) return false;
          if (seen[v.name]) return false;
          seen[v.name] = true;
          return true;
        });

        // Score and sort voices by quality
        tts.voices = allVoices.map(function(v) {
          var rank = PREFERRED_VOICES.indexOf(v.name);
          var quality = 'standard';
          if (v.name.indexOf('Google') >= 0) quality = 'google';
          else if (v.name.indexOf('Premium') >= 0 || v.name.indexOf('Natural') >= 0) quality = 'premium';
          else if (v.name.indexOf('Enhanced') >= 0) quality = 'enhanced';
          else if (v.name.indexOf('Online') >= 0) quality = 'online';
          var score = rank >= 0 ? rank : 100;
          if (quality === 'google') score = Math.min(score, 5);
          else if (quality === 'premium') score = Math.min(score, 10);
          else if (quality === 'enhanced') score = Math.min(score, 20);
          else if (quality === 'online') score = Math.min(score, 15);
          return {name: v.name, lang: v.lang, quality: quality, browserVoice: v, score: score};
        });

        tts.voices.sort(function(a, b) { return a.score - b.score; });

        // Auto-select best voice if current selection not found
        var found = tts.voices.find(function(v) { return v.name === tts.voice; });
        if (!found && tts.voices.length > 0) {
          tts.voice = tts.voices[0].name;
        }
        var sel = document.getElementById('voiceSelect');
        if (sel) populateVoiceSelect(sel);
      }
      doLoad();
      if (window.speechSynthesis.onvoiceschanged !== undefined) {
        window.speechSynthesis.onvoiceschanged = doLoad;
      }
    }

    function populateVoiceSelect(sel) {
      sel.innerHTML = '';
      if (tts.voices.length === 0) { sel.innerHTML = '<option>Loading voices...</option>'; return; }

      // Group voices by quality category
      var groups = {
        'google': {label: 'Google (Best Quality)', voices: []},
        'premium': {label: 'Premium', voices: []},
        'enhanced': {label: 'Enhanced', voices: []},
        'online': {label: 'Online', voices: []},
        'standard': {label: 'Standard', voices: []}
      };
      tts.voices.forEach(function(v) {
        var cat = v.quality || 'standard';
        if (groups[cat]) groups[cat].voices.push(v);
        else groups['standard'].voices.push(v);
      });

      var order = ['google', 'premium', 'enhanced', 'online', 'standard'];
      var hasMultipleGroups = order.filter(function(k) { return groups[k].voices.length > 0; }).length > 1;

      order.forEach(function(key) {
        var g = groups[key];
        if (g.voices.length === 0) return;
        if (hasMultipleGroups) {
          var optgroup = document.createElement('optgroup');
          optgroup.label = g.label;
          g.voices.forEach(function(v) {
            var opt = document.createElement('option');
            opt.value = v.name;
            opt.textContent = v.name;
            if (v.name === tts.voice) opt.selected = true;
            optgroup.appendChild(opt);
          });
          sel.appendChild(optgroup);
        } else {
          g.voices.forEach(function(v) {
            var opt = document.createElement('option');
            opt.value = v.name;
            opt.textContent = v.name;
            if (v.name === tts.voice) opt.selected = true;
            sel.appendChild(opt);
          });
        }
      });
    }

    // renderVoiceTester is kept as a stub; the TTS panel now lives in the topbar dropdown.
    function renderVoiceTester() { return ''; }

    function toggleTTSPanel() {

    function initVoiceTester() {
      // Sync the speed slider and value display to the current tts.rate
      var rateInput = document.getElementById('ttsRate');
      var rateVal = document.getElementById('rateVal');
      if (rateInput) { rateInput.value = tts.rate; }
      if (rateVal) { rateVal.textContent = tts.rate; }
      loadMacVoices();
    }

    function saveVoicePref() {
      localStorage.setItem('tts-mac-voice', tts.voice);
      localStorage.setItem('tts-mac-rate', tts.rate.toString());
      var msg = document.getElementById('voiceSavedMsg');
      if (msg) { msg.style.display = 'block'; setTimeout(function() { msg.style.display = 'none'; }, 2500); }
    }

    function testVoice() {
      stopTTS();
      var sampleEl = document.getElementById('voiceSampleText');
      var text = sampleEl ? sampleEl.textContent : 'This is a test of the text to speech voice.';

      // If no voices loaded yet, show loading indicator
      if (!tts.serverAvailable && tts.voices.length === 0) {
        loadBrowserVoices();
        showVoiceLoadingIndicator();
        var retries = 0;
        var waitV = setInterval(function() {
          retries++;
          if (tts.voices.length > 0) {
            clearInterval(waitV);
            hideVoiceLoadingIndicator();
            doSpeak(text, -1);
          } else if (retries > 25) {
            clearInterval(waitV);
            hideVoiceLoadingIndicator();
            showVoiceErrorIndicator();
          }
        }, 200);
        return;
      }
      doSpeak(text, -1);
    }

    function doSpeak(text, cardIdx) {
      // Clean text
      text = text.replace(/Figure:.*?(\.|$)/gi, '').replace(/\s+/g, ' ').trim();
      if (!text) return;

      // Limit text length
      if (text.length > 5000) text = text.substring(0, 5000);

      tts.speakingIdx = cardIdx;
      updateTTSButtons();

      var statusEl = document.getElementById('ttsStatus');
      document.querySelectorAll('.voice-test-btn.stop').forEach(function(b) { b.style.display = 'inline-flex'; });

      if (tts.serverAvailable) {
        // Server-based TTS (local Python server)
        if (statusEl) statusEl.innerHTML = '<div class="tts-loading"><div class="spinner"></div>Generating audio...</div>';

        var url = '/api/speak?voice=' + encodeURIComponent(tts.voice) +
                  '&rate=' + tts.rate +
                  '&text=' + encodeURIComponent(text);

        fetch(url).then(function(resp) {
          if (!resp.ok) throw new Error('Server error: ' + resp.status);
          return resp.blob();
        }).then(function(blob) {
          var audioUrl = URL.createObjectURL(blob);
          tts.currentAudio = new Audio(audioUrl);
          if (statusEl) statusEl.innerHTML = '';

          tts.currentAudio.onended = function() {
            URL.revokeObjectURL(audioUrl);
            tts.speakingIdx = -1;
            tts.currentAudio = null;
            updateTTSButtons();
            document.querySelectorAll('.voice-test-btn.stop').forEach(function(b) { b.style.display = 'none'; });
          };
          tts.currentAudio.onerror = function() {
            tts.speakingIdx = -1;
            updateTTSButtons();
            if (statusEl) statusEl.innerHTML = '<div class="tts-error">Audio playback error</div>';
          };
          tts.currentAudio.play();
        }).catch(function(err) {
          tts.speakingIdx = -1;
          updateTTSButtons();
          if (statusEl) statusEl.innerHTML = '<div class="tts-error">TTS error: ' + escapeHTML(err.message) + '. Make sure the server is running (python3 micro_server.py)</div>';
          document.querySelectorAll('.voice-test-btn.stop').forEach(function(b) { b.style.display = 'none'; });
        });
      } else {
        // Browser speech synthesis fallback with sentence chunking
        if (!window.speechSynthesis) {
          tts.speakingIdx = -1;
          updateTTSButtons();
          if (statusEl) statusEl.innerHTML = '<div class="tts-error">Speech synthesis not supported in this browser.</div>';
          return;
        }
        window.speechSynthesis.cancel();
        if (statusEl) statusEl.innerHTML = '';

        // Split into sentence chunks (Chrome cuts off after ~200 chars)
        var sentences = text.match(/[^.!?]+[.!?]+/g) || [text];
        var chunks = [];
        var current = '';
        for (var ci = 0; ci < sentences.length; ci++) {
          if ((current + sentences[ci]).length > 180 && current) {
            chunks.push(current.trim());
            current = '';
          }
          current += sentences[ci];
        }
        if (current.trim()) chunks.push(current.trim());

        // Ensure voices are loaded - if not, show indicator and wait
        if (tts.voices.length === 0) {
          loadBrowserVoices();
          showVoiceLoadingIndicator();
          var retries = 0;
          var waitV = setInterval(function() {
            retries++;
            if (tts.voices.length > 0) {
              clearInterval(waitV);
              hideVoiceLoadingIndicator();
              doSpeak(text, cardIdx);
            } else if (retries > 25) {
              clearInterval(waitV);
              hideVoiceLoadingIndicator();
              showVoiceErrorIndicator();
            }
          }, 200);
          return;
        }

        var chunkIdx = 0;
        var selectedVoice = tts.voices.find(function(v) { return v.name === tts.voice; });
        if (!selectedVoice && tts.voices.length > 0) selectedVoice = tts.voices[0];
        var speechRate = tts.rate / 175; // convert WPM to rate multiplier
        if (speechRate < 0.1) speechRate = 1;
        if (speechRate > 3) speechRate = 1;
        var pitch = parseFloat(localStorage.getItem('tts-pitch') || '1');

        function speakNextChunk() {
          if (chunkIdx >= chunks.length || tts.speakingIdx === -1) {
            tts.speakingIdx = -1;
            updateTTSButtons();
            document.querySelectorAll('.voice-test-btn.stop').forEach(function(b) { b.style.display = 'none'; });
            return;
          }
          var utter = new SpeechSynthesisUtterance(chunks[chunkIdx]);
          if (selectedVoice && selectedVoice.browserVoice) {
            utter.voice = selectedVoice.browserVoice;
          } else {
            // Last resort: grab any English voice directly
            var fallbackVoices = window.speechSynthesis.getVoices().filter(function(v) { return v.lang.startsWith('en'); });
            if (fallbackVoices.length > 0) utter.voice = fallbackVoices[0];
          }
          utter.rate = speechRate;
          utter.pitch = pitch;
          utter.onend = function() { chunkIdx++; speakNextChunk(); };
          utter.onerror = function() { chunkIdx++; speakNextChunk(); };
          window.speechSynthesis.speak(utter);
        }
        speakNextChunk();
      }
    }

    function stopTTS() {
      if (tts.currentAudio) { tts.currentAudio.pause(); tts.currentAudio.onended = null; tts.currentAudio = null; }
      if (window.speechSynthesis) window.speechSynthesis.cancel();
      // No word timer to clear (sentence-level highlighting is event-driven)

      // Clean up highlighting and playback bar
      finishTTSPlayback();

      tts.speakingIdx = -1;
      tts.paused = false;
      updateTTSButtons();
      document.querySelectorAll('.voice-test-btn.stop').forEach(function(b) { b.style.display = 'none'; });
      var statusEl = document.getElementById('ttsStatus');
      if (statusEl) statusEl.innerHTML = '';
    }

    function toggleTTS(idx) {
      if (tts.speakingIdx === idx) {
        // Stop TTS if already playing this card
        stopTTS();
        return;
      }
      // Stop any current speech
      stopTTS();

      // Server TTS: use simple playback without word highlighting
      if (tts.serverAvailable) {
        var lec = getLecture(state.currentWeek, state.currentLecture);
        if (!lec || !lec.explanations[idx]) return;
        var card = document.getElementById('expCard-' + idx);
        if (card && !card.classList.contains('expanded')) toggleCard(idx);
        var text = lec.explanations[idx].title + '. ' + stripHTML(lec.explanations[idx].content);
        doSpeak(text, idx);
        return;
      }

      var lec = getLecture(state.currentWeek, state.currentLecture);
      if (!lec || !lec.explanations[idx]) return;

      // Expand card if collapsed
      var card = document.getElementById('expCard-' + idx);
      if (card && !card.classList.contains('expanded')) toggleCard(idx);

      // Get plain text and split into sentences
      var rawHTML = lec.explanations[idx].content;
      var plainText = stripHTML(rawHTML).replace(/Figure:.*?(\.|$)/gi, '').replace(/\s+/g, ' ').trim();

      // Split into sentences
      var sentences = plainText.match(/[^.!?]+[.!?]+/g) || [plainText];
      sentences = sentences.map(function(s) { return s.trim(); }).filter(function(s) { return s.length > 0; });
      tts.sentences = sentences;
      tts.totalSentences = sentences.length;
      tts.currentSentenceIdx = 0;

      // Add a sentence tracker ABOVE the original content (don't replace it)
      var bodyEl = card ? card.querySelector('.explanation-card-body') : null;
      if (bodyEl) {
        // Remove any existing tracker
        var oldTracker = bodyEl.querySelector('.tts-tracker');
        if (oldTracker) oldTracker.remove();

        var tracker = document.createElement('div');
        tracker.className = 'tts-tracker';
        tracker.id = 'ttsTracker';
        var trackerHTML = '<div class="tts-tracker-label">Now reading</div>';
        sentences.forEach(function(s, i) {
          trackerHTML += '<span class="tts-tracker-sentence" data-sent-idx="' + i + '" onclick="jumpToSentence(' + idx + ',' + i + ')">' + escapeHTML(s) + ' </span>';
        });
        tracker.innerHTML = trackerHTML;
        bodyEl.insertBefore(tracker, bodyEl.firstChild);
        tts.sentenceElements = tracker.querySelectorAll('.tts-tracker-sentence');
      }

      // Show playback bar
      showPlaybackBar(lec.explanations[idx].title, idx);

      // Start speaking
      tts.currentCardIdx = idx;
      tts.paused = false;
      speakSentences(idx, 0);
    }

    function updateTTSButtons() {
      document.querySelectorAll('.tts-btn').forEach(function(btn) {
        var idx = parseInt(btn.id.replace('ttsBtn-', ''));
        if (idx === tts.speakingIdx) {
          btn.classList.add('speaking');
          btn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><rect x="5" y="5" width="14" height="14" rx="2"/></svg>';
          btn.title = 'Stop reading';
        } else {
          btn.classList.remove('speaking');
          btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>';
          btn.title = 'Read aloud';
        }
      });
    }

    // Speak sentences one at a time with highlighting
    var ttsSpeakId = 0; // Guard against duplicate speech from stale callbacks

    function speakSentences(cardIdx, startIdx) {
      if (!window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      ttsSpeakId++; // Invalidate any in-flight callbacks from previous speech
      var mySpeakId = ttsSpeakId;

      tts.speakingIdx = cardIdx;
      tts.paused = false;
      updateTTSButtons();

      // Ensure voices loaded
      if (tts.voices.length === 0) {
        loadBrowserVoices();
        showVoiceLoadingIndicator();
        var retryCount = 0;
        var waitForVoices = setInterval(function() {
          retryCount++;
          if (tts.voices.length > 0) {
            clearInterval(waitForVoices);
            hideVoiceLoadingIndicator();
            speakSentences(cardIdx, startIdx);
          } else if (retryCount > 25) {
            clearInterval(waitForVoices);
            hideVoiceLoadingIndicator();
            showVoiceErrorIndicator();
            tts.speakingIdx = -1;
            updateTTSButtons();
          }
        }, 200);
        return;
      }

      var selectedVoice = tts.voices.find(function(v) { return v.name === tts.voice; });
      if (!selectedVoice && tts.voices.length > 0) selectedVoice = tts.voices[0];
      var speechRate = tts.rate / 175;
      if (speechRate < 0.1 || speechRate > 3) speechRate = 1;
      var pitch = parseFloat(localStorage.getItem('tts-pitch') || '1');

      var sentIdx = startIdx;

      function speakNext() {
        // Guard: if a new speakSentences call was made, stop this chain
        if (mySpeakId !== ttsSpeakId) return;
        if (sentIdx >= tts.sentences.length || tts.speakingIdx !== cardIdx) {
          finishTTSPlayback();
          return;
        }

        highlightSentence(sentIdx);
        tts.currentSentenceIdx = sentIdx;
        updatePlaybackProgress();

        var utter = new SpeechSynthesisUtterance(tts.sentences[sentIdx]);
        if (selectedVoice && selectedVoice.browserVoice) utter.voice = selectedVoice.browserVoice;
        else {
          var fb = window.speechSynthesis.getVoices().filter(function(v) { return v.lang.startsWith('en'); });
          if (fb.length > 0) utter.voice = fb[0];
        }
        utter.rate = speechRate;
        utter.pitch = pitch;

        utter.onend = function() {
          if (mySpeakId !== ttsSpeakId) return;
          sentIdx++; speakNext();
        };
        utter.onerror = function() {
          if (mySpeakId !== ttsSpeakId) return;
          sentIdx++; speakNext();
        };

        window.speechSynthesis.speak(utter);
      }

      speakNext();
    }

    function highlightSentence(idx) {
      if (tts.sentenceElements) {
        tts.sentenceElements.forEach(function(el) { el.classList.remove('speaking'); });
        if (tts.sentenceElements[idx]) {
          tts.sentenceElements[idx].classList.add('speaking');
          tts.sentenceElements[idx].scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      }
    }

    function jumpToSentence(cardIdx, sentIdx) {
      if (tts.speakingIdx !== cardIdx || !tts.sentences || tts.sentences.length === 0) return;
      if (window.speechSynthesis) window.speechSynthesis.cancel();
      speakSentences(cardIdx, sentIdx);
    }

    function pauseTTS() {
      if (window.speechSynthesis) window.speechSynthesis.pause();
      tts.paused = true;
      updatePlaybackBar();
      updateTTSButtons();
    }

    function resumeTTS() {
      if (window.speechSynthesis) window.speechSynthesis.resume();
      tts.paused = false;
      updatePlaybackBar();
      updateTTSButtons();
    }

    function showPlaybackBar(title, cardIdx) {
      var existing = document.getElementById('ttsPlaybackBar');
      if (existing) existing.remove();

      var bar = document.createElement('div');
      bar.id = 'ttsPlaybackBar';
      bar.className = 'tts-playback';
      var currentRate = tts.rate / 175;
      if (currentRate < 0.1 || currentRate > 3) currentRate = 1;

      bar.innerHTML =
        '<button class="tts-playback-btn" id="ttsPlayPauseBtn" onclick="tts.paused ? resumeTTS() : pauseTTS()">' +
          '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>' +
        '</button>' +
        '<button class="tts-playback-btn stop" onclick="stopTTS()" title="Stop">' +
          '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>' +
        '</button>' +
        '<div class="tts-playback-info"><strong>Reading:</strong> ' + escapeHTML(title) + '</div>' +
        '<div class="tts-playback-speed" title="Speed">' +
          '<input type="range" min="0.5" max="2" step="0.1" value="' + currentRate.toFixed(1) + '" oninput="changeTTSSpeed(this.value)">' +
          '<span class="tts-playback-speed-label" id="ttsSpeedLabel">' + currentRate.toFixed(1) + 'x</span>' +
        '</div>' +
        '<div class="tts-playback-progress" id="ttsProgressBar">' +
          '<div class="tts-playback-progress-fill" id="ttsProgressFill" style="width:0%"></div>' +
        '</div>' +
        '<button class="tts-playback-close" onclick="stopTTS()" title="Close">&times;</button>';

      var contentArea = document.getElementById('contentArea');
      if (contentArea) contentArea.appendChild(bar);
    }

    function updatePlaybackBar() {
      var btn = document.getElementById('ttsPlayPauseBtn');
      if (!btn) return;
      if (tts.paused) {
        btn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="6,4 20,12 6,20"/></svg>';
      } else {
        btn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>';
      }
    }

    function updatePlaybackProgress() {
      var fill = document.getElementById('ttsProgressFill');
      if (fill && tts.totalSentences > 0) {
        var pct = Math.round(((tts.currentSentenceIdx + 1) / tts.totalSentences) * 100);
        fill.style.width = pct + '%';
      }
    }

    function changeTTSSpeed(val) {
      var rate = parseFloat(val);
      tts.rate = Math.round(rate * 175);
      var label = document.getElementById('ttsSpeedLabel');
      if (label) label.textContent = rate.toFixed(1) + 'x';
      var rateInput = document.getElementById('ttsRate');
      var rateVal = document.getElementById('rateVal');
      if (rateInput) rateInput.value = tts.rate;
      if (rateVal) rateVal.textContent = tts.rate;
      localStorage.setItem('tts-mac-rate', tts.rate.toString());

      // Restart speech at new speed from current sentence
      if (tts.speakingIdx >= 0 && tts.sentences.length > 0 && !tts.serverAvailable) {
        if (window.speechSynthesis) window.speechSynthesis.cancel();
        speakSentences(tts.currentCardIdx, tts.currentSentenceIdx);
      }
    }

    function showVoiceLoadingIndicator() {
      hideVoiceLoadingIndicator();
      var el = document.createElement('div');
      el.id = 'voiceLoadingIndicator';
      el.className = 'tts-loading-overlay';
      el.innerHTML = '<div class="spinner"></div> Loading voices, please wait...';
      document.body.appendChild(el);
    }

    function hideVoiceLoadingIndicator() {
      var el = document.getElementById('voiceLoadingIndicator');
      if (el) el.remove();
    }

    function showVoiceErrorIndicator() {
      hideVoiceLoadingIndicator();
      var el = document.createElement('div');
      el.id = 'voiceLoadingIndicator';
      el.className = 'tts-loading-overlay';
      el.style.borderColor = 'var(--error)';
      el.innerHTML = 'No voices available. Try refreshing the page.';
      document.body.appendChild(el);
      setTimeout(function() { var e = document.getElementById('voiceLoadingIndicator'); if (e) e.remove(); }, 4000);
    }

    function finishTTSPlayback() {
      tts.speakingIdx = -1;
      tts.paused = false;
      tts.currentSentenceIdx = 0;
      updateTTSButtons();

      // Remove the tracker div (original content was never modified)
      var tracker = document.getElementById('ttsTracker');
      if (tracker) tracker.remove();

      tts.sentenceElements = [];
      tts.sentences = [];

      // Remove playback bar
      var bar = document.getElementById('ttsPlaybackBar');
      if (bar) bar.remove();

      document.querySelectorAll('.voice-test-btn.stop').forEach(function(b) { b.style.display = 'none'; });
    }

    // ==========================================
    // FEATURE: SHORT ANSWER FUNCTIONS
    // ==========================================
    function toggleModelAnswer(idx) {
      var el = document.getElementById('saModel-' + idx);
      if (!el) return;
      if (el.style.display === 'none') {
        el.style.display = 'block';
      } else {
        el.style.display = 'none';
      }
    }

    function rateSA(idx, rating) {
      var saKey = lectureKey(state.currentWeek, state.currentLecture) + '_sa' + idx;
      if (!state.saRatings) state.saRatings = {};
      state.saRatings[saKey] = rating;
      saveState();
      // Update button styles immediately
      var model = document.getElementById('saModel-' + idx);
      if (model) {
        var btns = model.querySelectorAll('.sa-rate-btn');
        btns.forEach(function(btn) {
          btn.classList.remove('active', 'green', 'yellow', 'red');
        });
        btns.forEach(function(btn) {
          if (rating === 'nailed' && btn.textContent === 'Nailed it') { btn.classList.add('active', 'green'); }
          if (rating === 'partial' && btn.textContent === 'Partially correct') { btn.classList.add('active', 'yellow'); }
          if (rating === 'missed' && btn.textContent === 'Missed it') { btn.classList.add('active', 'red'); }
        });
      }
    }

    // ==========================================
    // FEATURE: KEYBOARD SHORTCUTS
    // ==========================================
    function handleKeyboardShortcut(e) {
      if (pomo.overlayActive) return; // Block shortcuts during break overlay
      var tag = e.target.tagName;
      if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
      if (e.ctrlKey || e.metaKey || e.altKey) return;

      var key = e.key;

      if (key === 'ArrowLeft') { e.preventDefault(); navigateLecture(-1); return; }
      if (key === 'ArrowRight') { e.preventDefault(); navigateLecture(1); return; }

      if (key === '1') { if (state.currentView === 'lecture') { setTab('learn'); } return; }
      if (key === '2') { if (state.currentView === 'lecture') { setTab('terms'); } return; }
      if (key === '3') { if (state.currentView === 'lecture') { setTab('facts'); } return; }
      if (key === '4') { if (state.currentView === 'lecture') { setTab('quiz'); } return; }
      if (key === '5') { if (state.currentView === 'lecture') { setTab('flash'); } return; }

      if (key === ' ') {
        e.preventDefault();
        if (state.currentView === 'lecture' && state.currentTab === 'flash') {
          flipFlashcard();
        } else if (state.currentView === 'lecture' && state.currentTab === 'learn') {
          // Toggle first non-expanded card or collapse all
          var lec = getLecture(state.currentWeek, state.currentLecture);
          if (lec && lec.explanations) {
            var lecKey = lectureKey(state.currentWeek, state.currentLecture);
            var expanded = state.expandedCards[lecKey] || {};
            var foundClosed = false;
            for (var i = 0; i < lec.explanations.length; i++) {
              if (!expanded[i]) { toggleCard(i); foundClosed = true; break; }
            }
          }
        }
        return;
      }

      if (key === 's' || key === 'S') {
        e.preventDefault();
        var searchInput = document.getElementById('searchInput');
        if (searchInput) searchInput.focus();
        return;
      }

      if (key === 'd' || key === 'D') { showDashboard(); return; }

      if (key === '?') { toggleShortcutsHelp(); return; }

      if (key === 'Escape') {
        // Close any overlays
        var overlay = document.getElementById('shortcutsOverlay');
        if (overlay) overlay.remove();
        var panel = document.getElementById('ttsPanel');
        if (panel && panel.classList.contains('open')) panel.classList.remove('open');
        return;
      }
    }

    function navigateLecture(dir) {
      var flatList = [];
      COURSE.weeks.forEach(function(w) {
        w.lectures.forEach(function(l) {
          flatList.push({ weekId: w.id, lecId: l.id });
        });
      });
      if (state.currentView !== 'lecture' || flatList.length === 0) return;

      var currentIdx = -1;
      for (var i = 0; i < flatList.length; i++) {
        if (flatList[i].weekId === state.currentWeek && flatList[i].lecId === state.currentLecture) {
          currentIdx = i;
          break;
        }
      }
      if (currentIdx === -1) return;

      var newIdx = currentIdx + dir;
      if (newIdx < 0) newIdx = flatList.length - 1;
      if (newIdx >= flatList.length) newIdx = 0;

      showLecture(flatList[newIdx].weekId, flatList[newIdx].lecId);
    }

    function toggleShortcutsHelp() {
      var existing = document.getElementById('shortcutsOverlay');
      if (existing) { existing.remove(); return; }

      var shortcuts = [
        ['Arrow Left / Right', 'Previous / Next lecture'],
        ['1 / 2 / 3 / 4 / 5', 'Switch tab (Learn/Terms/Facts/Quiz/Flash)'],
        ['Space', 'Toggle card or flip flashcard'],
        ['S', 'Focus search'],
        ['D', 'Go to dashboard'],
        ['?', 'Show this help'],
        ['Escape', 'Close overlays']
      ];

      var rowsHTML = '';
      shortcuts.forEach(function(s) {
        rowsHTML += '<div class="shortcut-row"><span>' + s[1] + '</span><span class="shortcut-key">' + s[0] + '</span></div>';
      });

      var overlay = document.createElement('div');
      overlay.id = 'shortcutsOverlay';
      overlay.className = 'shortcuts-overlay';
      overlay.onclick = function(e) { if (e.target === overlay) overlay.remove(); };
      overlay.innerHTML = '<div class="shortcuts-card"><h3>Keyboard Shortcuts</h3>' + rowsHTML + '</div>';
      document.body.appendChild(overlay);
    }

    // ==========================================
    // FEATURE: WEAK AREAS ANALYSIS
    // ==========================================
    function analyzeWeakAreas() {
      var results = [];
      COURSE.weeks.forEach(function(w) {
        w.lectures.forEach(function(l) {
          if (!l.quiz || l.quiz.length === 0) return;
          var key = lectureKey(w.id, l.id);
          var qs = state.quizState[key];
          var totalCount = l.quiz.length;
          var missedCount = 0;
          var answeredCount = 0;

          if (qs && qs.answers) {
            Object.keys(qs.answers).forEach(function(k) {
              answeredCount++;
              if (qs.answers[k] !== l.quiz[k].ans) {
                missedCount++;
              }
            });
          }

          var accuracy = answeredCount > 0 ? ((answeredCount - missedCount) / answeredCount) * 100 : -1;

          results.push({
            weekId: w.id,
            lecId: l.id,
            title: l.title,
            accuracy: accuracy === -1 ? 0 : accuracy,
            missedCount: missedCount,
            totalCount: answeredCount
          });
        });
      });

      // Sort by accuracy ascending (worst first)
      results.sort(function(a, b) {
        if (a.totalCount === 0 && b.totalCount === 0) return 0;
        if (a.totalCount === 0) return 1;
        if (b.totalCount === 0) return -1;
        return a.accuracy - b.accuracy;
      });

      return results;
    }

    function startReviewQuiz() {
      var missedQuestions = [];
      COURSE.weeks.forEach(function(w) {
        w.lectures.forEach(function(l) {
          if (!l.quiz) return;
          var key = lectureKey(w.id, l.id);
          var qs = state.quizState[key];
          if (!qs || !qs.answers) return;
          l.quiz.forEach(function(q, idx) {
            if (qs.answers[idx] !== undefined && qs.answers[idx] !== q.ans) {
              missedQuestions.push({ q: q.q, opts: q.opts, ans: q.ans, exp: q.exp, source: l.title });
            }
          });
        });
      });

      if (missedQuestions.length === 0) {
        alert('No missed questions found. Great job!');
        return;
      }

      // Shuffle
      for (var i = missedQuestions.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = missedQuestions[i];
        missedQuestions[i] = missedQuestions[j];
        missedQuestions[j] = tmp;
      }

      state.examState = {
        active: true,
        config: { timer: 0, isReview: true },
        questions: missedQuestions,
        answers: {},
        currentQ: 0,
        startTime: Date.now(),
        finished: false
      };
      saveState();
      history.replaceState(null, '', '#exam');
      state.currentView = 'exam';
      renderExam();
    }

    // ==========================================
    // FEATURE: PRACTICE EXAM MODE
    // ==========================================
    var examTimerInterval = null;
    var examTimeLeft = 0;

    function cleanupExam() {
      if (examTimerInterval) {
        clearInterval(examTimerInterval);
        examTimerInterval = null;
      }
      examTimeLeft = 0;
    }

    function toggleExamSelectAll(checked) {
      var cbs = document.querySelectorAll('.exam-lec-cb');
      cbs.forEach(function(cb) { cb.checked = checked; });
    }

    function toggleExamCustomize() {
      var panel = document.getElementById('examCustomizePanel');
      if (panel) { panel.classList.toggle('hidden'); }
    }

    function startExam() {
      var cbs = document.querySelectorAll('.exam-lec-cb:checked');
      if (cbs.length === 0) { alert('Please select at least one lecture.'); return; }

      var selectedPairs = [];
      cbs.forEach(function(cb) {
        var parts = cb.value.split('-');
        selectedPairs.push({ weekId: parseInt(parts[0]), lecId: parseInt(parts[1]) });
      });

      var allQuestions = [];
      selectedPairs.forEach(function(pair) {
        var lec = getLecture(pair.weekId, pair.lecId);
        if (lec && lec.quiz) {
          lec.quiz.forEach(function(q) {
            allQuestions.push({ q: q.q, opts: q.opts, ans: q.ans, exp: q.exp, source: lec.title });
          });
        }
      });

      if (allQuestions.length === 0) { alert('No questions found for selected lectures.'); return; }

      // Shuffle
      for (var i = allQuestions.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = allQuestions[i];
        allQuestions[i] = allQuestions[j];
        allQuestions[j] = tmp;
      }

      var qCountVal = document.getElementById('examQCount').value;
      var count = qCountVal === 'all' ? allQuestions.length : Math.min(parseInt(qCountVal), allQuestions.length);
      allQuestions = allQuestions.slice(0, count);

      var timerVal = parseInt(document.getElementById('examTimer').value);

      state.examState = {
        active: true,
        config: { timer: timerVal, isReview: false },
        questions: allQuestions,
        answers: {},
        currentQ: 0,
        startTime: Date.now(),
        finished: false
      };
      saveState();
      history.replaceState(null, '', '#exam');
      state.currentView = 'exam';
      renderExam();
    }

    function renderExam() {
      var area = document.getElementById('contentArea');
      area.classList.remove('dashboard-active');
      var es = state.examState;

      if (!es || !es.active) {
        showDashboard();
        return;
      }

      if (es.finished) {
        renderExamResults();
        return;
      }

      var total = es.questions.length;
      var currentQ = es.currentQ;
      var q = es.questions[currentQ];
      var progress = total > 0 ? Math.round(((currentQ + 1) / total) * 100) : 0;
      var selectedOpt = es.answers[currentQ];

      var optsHTML = '';
      q.opts.forEach(function(opt, oi) {
        var selClass = selectedOpt === oi ? 'selected' : '';
        optsHTML += '<button class="exam-option-btn ' + selClass + '" onclick="answerExam(' + currentQ + ',' + oi + ')">' + escapeHTML(opt) + '</button>';
      });

      var timerHTML = '';
      if (es.config.timer > 0) {
        timerHTML = '<div class="exam-timer" id="examTimer">--</div>';
      }

      var isLast = currentQ === total - 1;
      var finishBtn = isLast ? '<button class="exam-finish-btn" onclick="finishExam()">Finish Exam</button>' : '';

      area.innerHTML = '<div class="exam-container">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">' +
          '<h2 style="font-size:1.3rem;">' + (es.config.isReview ? 'Review Quiz' : 'Mock Exam') + '</h2>' +
          '<button class="exam-nav-btn" onclick="finishExam()" style="font-size:0.8rem;">End Early</button>' +
        '</div>' +
        '<div class="exam-progress">' +
          '<div class="exam-progress-text">' + (currentQ + 1) + ' / ' + total + '</div>' +
          '<div class="exam-progress-bar"><div class="exam-progress-fill" style="width:' + progress + '%"></div></div>' +
          timerHTML +
        '</div>' +
        '<div class="exam-question-card">' +
          '<div class="exam-q-num">Question ' + (currentQ + 1) + '</div>' +
          '<div class="exam-q-text">' + escapeHTML(q.q) + '</div>' +
          '<div class="exam-options">' + optsHTML + '</div>' +
        '</div>' +
        '<div class="exam-nav">' +
          '<button class="exam-nav-btn" onclick="examNav(-1)"' + (currentQ === 0 ? ' disabled' : '') + '>Previous</button>' +
          finishBtn +
          '<button class="exam-nav-btn primary" onclick="examNav(1)"' + (isLast ? ' disabled' : '') + '>Next</button>' +
        '</div>' +
        '</div>';

      // Start timer if needed
      if (es.config.timer > 0) {
        clearInterval(examTimerInterval);
        examTimeLeft = es.config.timer;
        updateExamTimerDisplay();
        examTimerInterval = setInterval(function() {
          examTimeLeft--;
          updateExamTimerDisplay();
          if (examTimeLeft <= 0) {
            clearInterval(examTimerInterval);
            // Auto-advance
            if (es.currentQ < es.questions.length - 1) {
              examNav(1);
            } else {
              finishExam();
            }
          }
        }, 1000);
      }

      updateSidebarActive();
    }

    function updateExamTimerDisplay() {
      var el = document.getElementById('examTimer');
      if (!el) return;
      var m = Math.floor(examTimeLeft / 60);
      var s = examTimeLeft % 60;
      el.textContent = (m > 0 ? m + ':' : '') + (s < 10 ? '0' : '') + s;
      if (examTimeLeft <= 10) el.style.color = 'var(--error)';
    }

    function answerExam(qIdx, optIdx) {
      state.examState.answers[qIdx] = optIdx;
      saveState();
      // Update button styles
      var btns = document.querySelectorAll('.exam-option-btn');
      btns.forEach(function(btn, i) {
        btn.classList.toggle('selected', i === optIdx);
      });
    }

    function examNav(dir) {
      clearInterval(examTimerInterval);
      var es = state.examState;
      var newQ = es.currentQ + dir;
      if (newQ < 0 || newQ >= es.questions.length) return;
      es.currentQ = newQ;
      saveState();
      renderExam();
    }

    function finishExam() {
      clearInterval(examTimerInterval);
      var es = state.examState;
      es.finished = true;

      // Calculate score
      var correct = 0;
      es.questions.forEach(function(q, idx) {
        if (es.answers[idx] === q.ans) correct++;
      });

      var result = {
        date: Date.now(),
        totalQuestions: es.questions.length,
        correct: correct,
        timeTaken: Date.now() - es.startTime,
        isReview: es.config.isReview || false
      };

      if (!state.examHistory) state.examHistory = [];
      state.examHistory.push(result);
      saveState();
      history.replaceState(null, '', '#exam-results');
      state.currentView = 'exam-results';
      renderExamResults();
    }

    function renderExamResults() {
      var area = document.getElementById('contentArea');
      var es = state.examState;

      if (!es || !es.questions || es.questions.length === 0) {
        showDashboard();
        return;
      }

      var total = es.questions.length;
      var correct = 0;
      es.questions.forEach(function(q, idx) {
        if (es.answers[idx] === q.ans) correct++;
      });
      var pct = total > 0 ? Math.round((correct / total) * 100) : 0;
      var circumference = 2 * Math.PI * 54;
      var offset = circumference - (pct / 100) * circumference;
      var ringColor = pct >= 80 ? 'var(--success)' : pct >= 50 ? 'var(--warning)' : 'var(--error)';

      // Per-source breakdown
      var bySource = {};
      es.questions.forEach(function(q, idx) {
        var src = q.source || 'Unknown';
        if (!bySource[src]) bySource[src] = { total: 0, correct: 0 };
        bySource[src].total++;
        if (es.answers[idx] === q.ans) bySource[src].correct++;
      });

      var tableHTML = '<table class="exam-results-table"><thead><tr><th>Lecture</th><th>Correct</th><th>Accuracy</th></tr></thead><tbody>';
      Object.keys(bySource).forEach(function(src) {
        var s = bySource[src];
        var acc = s.total > 0 ? Math.round((s.correct / s.total) * 100) : 0;
        tableHTML += '<tr><td>' + escapeHTML(src) + '</td><td>' + s.correct + ' / ' + s.total + '</td><td>' + acc + '%</td></tr>';
      });
      tableHTML += '</tbody></table>';

      // Review mistakes
      var reviewHTML = '';
      es.questions.forEach(function(q, idx) {
        var userAns = es.answers[idx];
        var isCorrect = userAns === q.ans;
        if (!isCorrect) {
          reviewHTML += '<div class="exam-review-card review-wrong">' +
            '<div class="exam-q-num" style="color:var(--error);">Missed</div>' +
            '<div class="exam-q-text" style="font-size:0.95rem;">' + escapeHTML(q.q) + '</div>' +
            '<p style="font-size:0.85rem;margin-top:8px;"><strong style="color:var(--error);">Your answer:</strong> ' + (userAns !== undefined ? escapeHTML(q.opts[userAns]) : 'No answer') + '</p>' +
            '<p style="font-size:0.85rem;margin-top:4px;"><strong style="color:var(--success);">Correct:</strong> ' + escapeHTML(q.opts[q.ans]) + '</p>' +
            '<p style="font-size:0.85rem;margin-top:6px;color:var(--text-light);">' + escapeHTML(q.exp) + '</p>' +
            '</div>';
        }
      });

      area.innerHTML = '<div class="exam-results">' +
        '<h2>' + (es.config.isReview ? 'Review Quiz Results' : 'Exam Results') + '</h2>' +
        '<p style="color:var(--text-light);margin-bottom:20px;">You scored ' + correct + ' out of ' + total + '</p>' +
        '<div class="exam-score-ring">' +
          '<svg width="130" height="130" viewBox="0 0 130 130" style="transform:rotate(-90deg);">' +
            '<circle cx="65" cy="65" r="54" fill="none" stroke="var(--border)" stroke-width="8"/>' +
            '<circle cx="65" cy="65" r="54" fill="none" stroke="' + ringColor + '" stroke-width="8" stroke-linecap="round" stroke-dasharray="' + circumference + '" stroke-dashoffset="' + offset + '"/>' +
          '</svg>' +
          '<div style="margin-top:-95px;margin-bottom:30px;"><span style="font-size:1.6rem;font-weight:700;color:' + ringColor + ';">' + pct + '%</span></div>' +
        '</div>' +
        tableHTML +
        (reviewHTML ? '<h3 style="text-align:left;margin:24px 0 16px;font-size:1.1rem;">Review Mistakes</h3>' + reviewHTML : '') +
        '<div style="margin-top:24px;">' +
          '<button class="exam-start-btn" onclick="showDashboard()">Back to Dashboard</button>' +
        '</div>' +
        '</div>';

      updateSidebarActive();
    }

    // ==========================================
    // FEATURE: FLASHCARD MODE
    // ==========================================
    function buildFlashcardDeck(filter, count) {
      var cards = [];
      var mastery = state.flashcardState.mastery || {};

      if (filter === 'weak') {
        // Only cards marked as 'learning' or never seen
        COURSE.weeks.forEach(function(w) {
          w.lectures.forEach(function(l) {
            if (!l.terms) return;
            l.terms.forEach(function(t) {
              var mKey = t.term;
              var m = mastery[mKey] || 0;
              if (m < 2) {
                cards.push({ term: t.term, def: t.def, source: l.title, mastery: m });
              }
            });
          });
        });
      } else if (filter === 'all') {
        COURSE.weeks.forEach(function(w) {
          w.lectures.forEach(function(l) {
            if (!l.terms) return;
            l.terms.forEach(function(t) {
              var mKey = t.term;
              cards.push({ term: t.term, def: t.def, source: l.title, mastery: mastery[mKey] || 0 });
            });
          });
        });
      } else {
        // Filter by week id
        var weekId = parseInt(filter);
        var week = getWeek(weekId);
        if (week) {
          week.lectures.forEach(function(l) {
            if (!l.terms) return;
            l.terms.forEach(function(t) {
              var mKey = t.term;
              cards.push({ term: t.term, def: t.def, source: l.title, mastery: mastery[mKey] || 0 });
            });
          });
        }
      }

      // Sort by mastery priority (lowest first)
      cards.sort(function(a, b) { return a.mastery - b.mastery; });

      // Trim to count
      if (count !== 'all' && count < cards.length) {
        cards = cards.slice(0, count);
      }

      // Shuffle
      for (var i = cards.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = cards[i];
        cards[i] = cards[j];
        cards[j] = tmp;
      }

      return cards;
    }

    function startFlashcardSession() {
      var filterEl = document.getElementById('fcFilter');
      var countEl = document.getElementById('fcCount');
      var filter = filterEl ? filterEl.value : 'all';
      var countVal = countEl ? countEl.value : '25';
      var count = countVal === 'all' ? 'all' : parseInt(countVal);

      var deck = buildFlashcardDeck(filter, count);
      if (deck.length === 0) { alert('No flashcards available for this selection.'); return; }

      state.flashcardState.currentDeck = deck;
      state.flashcardState.currentIndex = 0;
      state.flashcardState.flipped = false;
      state.flashcardState.filter = filter;
      state.flashcardState.sessionStats = { known: 0, learning: 0 };
      saveState();

      state.currentView = 'flashcard-session';
      renderFlashcards();
    }

    function startFlashcardTabSession(lec) {
      var cards = [];
      var mastery = state.flashcardState.mastery || {};
      if (lec.terms) {
        lec.terms.forEach(function(t) {
          cards.push({ term: t.term, def: t.def, source: lec.title, mastery: mastery[t.term] || 0 });
        });
      }
      if (cards.length === 0) return;

      // Shuffle
      for (var i = cards.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = cards[i];
        cards[i] = cards[j];
        cards[j] = tmp;
      }

      state.flashcardState.currentDeck = cards;
      state.flashcardState.currentIndex = 0;
      state.flashcardState.flipped = false;
      state.flashcardState.sessionStats = { known: 0, learning: 0 };
      saveState();
    }

    function renderFlashcardTab(lec) {
      if (!lec.terms || lec.terms.length === 0) {
        return '<p style="color:var(--text-light);">No flashcards available yet.</p>';
      }

      var fc = state.flashcardState;
      // Start a session for this lecture if not already active or if deck is empty
      if (!fc.currentDeck || fc.currentDeck.length === 0 || fc.currentDeck[0].source !== lec.title) {
        startFlashcardTabSession(lec);
        fc = state.flashcardState;
      }

      var deck = fc.currentDeck;
      var idx = fc.currentIndex;

      if (idx >= deck.length) {
        // Session complete
        var stats = fc.sessionStats || { known: 0, learning: 0 };
        return '<div class="flashcard-summary">' +
          '<h3>Session Complete!</h3>' +
          '<div class="fc-stats">' +
            '<div class="fc-stat"><div class="num" style="color:var(--success);">' + stats.known + '</div><div class="desc">Known</div></div>' +
            '<div class="fc-stat"><div class="num" style="color:var(--warning);">' + stats.learning + '</div><div class="desc">Learning</div></div>' +
          '</div>' +
          '<button class="exam-start-btn" style="margin-top:16px;" onclick="resetFlashcardTab()">Start Over</button>' +
          '</div>';
      }

      var card = deck[idx];
      var flippedClass = fc.flipped ? 'flipped' : '';

      return '<div class="flashcard-progress">' + (idx + 1) + ' / ' + deck.length + '</div>' +
        '<div class="flashcard-container">' +
          '<div class="flashcard ' + flippedClass + '" onclick="flipFlashcard()">' +
            '<div class="flashcard-front"><div class="fc-label">Term</div><div class="fc-term">' + escapeHTML(card.term) + '</div></div>' +
            '<div class="flashcard-back"><div class="fc-label">Definition</div><div class="fc-def">' + escapeHTML(card.def) + '</div></div>' +
          '</div>' +
        '</div>' +
        '<div class="flashcard-controls">' +
          '<button class="fc-btn flip" onclick="flipFlashcard()">Flip</button>' +
          '<button class="fc-btn known" onclick="markCardKnown()">Known</button>' +
          '<button class="fc-btn learning" onclick="markCardLearning()">Learning</button>' +
        '</div>';
    }

    function resetFlashcardTab() {
      state.flashcardState.currentDeck = [];
      state.flashcardState.currentIndex = 0;
      state.flashcardState.flipped = false;
      state.flashcardState.sessionStats = { known: 0, learning: 0 };
      saveState();
      renderLecture();
    }

    function renderFlashcards() {
      var area = document.getElementById('contentArea');
      area.classList.remove('dashboard-active');
      var fc = state.flashcardState;
      var deck = fc.currentDeck;
      var idx = fc.currentIndex;

      if (!deck || deck.length === 0) {
        showDashboard();
        return;
      }

      if (idx >= deck.length) {
        renderFlashcardSummary();
        return;
      }

      var card = deck[idx];
      var flippedClass = fc.flipped ? 'flipped' : '';

      area.innerHTML = '<div style="max-width:600px;margin:0 auto;">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">' +
          '<h2 style="font-size:1.3rem;">Flashcards</h2>' +
          '<button class="exam-nav-btn" onclick="showDashboard()">Exit</button>' +
        '</div>' +
        '<div class="flashcard-progress">' + (idx + 1) + ' / ' + deck.length + '</div>' +
        '<div class="flashcard-container">' +
          '<div class="flashcard ' + flippedClass + '" onclick="flipFlashcard()">' +
            '<div class="flashcard-front"><div class="fc-label">Term</div><div class="fc-term">' + escapeHTML(card.term) + '</div></div>' +
            '<div class="flashcard-back"><div class="fc-label">Definition</div><div class="fc-def">' + escapeHTML(card.def) + '</div></div>' +
          '</div>' +
        '</div>' +
        '<div class="flashcard-controls">' +
          '<button class="fc-btn flip" onclick="flipFlashcard()">Flip</button>' +
          '<button class="fc-btn known" onclick="markCardKnown()">Known</button>' +
          '<button class="fc-btn learning" onclick="markCardLearning()">Learning</button>' +
        '</div>' +
        '</div>';
    }

    function flipFlashcard() {
      state.flashcardState.flipped = !state.flashcardState.flipped;
      // Update DOM directly for smooth animation
      var card = document.querySelector('.flashcard');
      if (card) {
        card.classList.toggle('flipped', state.flashcardState.flipped);
      }
    }

    function markCardKnown() {
      var fc = state.flashcardState;
      var deck = fc.currentDeck;
      if (!deck || fc.currentIndex >= deck.length) return;

      var card = deck[fc.currentIndex];
      if (!fc.mastery) fc.mastery = {};
      fc.mastery[card.term] = (fc.mastery[card.term] || 0) + 1;
      fc.sessionStats.known++;
      fc.currentIndex++;
      fc.flipped = false;
      saveState();

      if (state.currentView === 'flashcard-session') {
        renderFlashcards();
      } else {
        renderLecture();
      }
    }

    function markCardLearning() {
      var fc = state.flashcardState;
      var deck = fc.currentDeck;
      if (!deck || fc.currentIndex >= deck.length) return;

      var card = deck[fc.currentIndex];
      if (!fc.mastery) fc.mastery = {};
      fc.mastery[card.term] = Math.max(0, (fc.mastery[card.term] || 0) - 1);
      fc.sessionStats.learning++;

      // Move card to back of deck
      var removed = deck.splice(fc.currentIndex, 1)[0];
      deck.push(removed);
      fc.flipped = false;
      saveState();

      if (state.currentView === 'flashcard-session') {
        renderFlashcards();
      } else {
        renderLecture();
      }
    }

    function renderFlashcardSummary() {
      var area = document.getElementById('contentArea');
      area.classList.remove('dashboard-active');
      var stats = state.flashcardState.sessionStats || { known: 0, learning: 0 };

      area.innerHTML = '<div class="flashcard-summary">' +
        '<h3>Session Complete!</h3>' +
        '<p style="color:var(--text-light);margin-bottom:12px;">Great work reviewing your flashcards.</p>' +
        '<div class="fc-stats">' +
          '<div class="fc-stat"><div class="num" style="color:var(--success);">' + stats.known + '</div><div class="desc">Known</div></div>' +
          '<div class="fc-stat"><div class="num" style="color:var(--warning);">' + stats.learning + '</div><div class="desc">Learning</div></div>' +
        '</div>' +
        '<button class="exam-start-btn" style="margin-top:24px;" onclick="showDashboard()">Back to Dashboard</button>' +
        '</div>';
    }

    // ==========================================
    // INITIALIZATION
    // ==========================================
    function init() {
      // Clear stale TTS settings from previous versions
      localStorage.removeItem('tts-mode');
      localStorage.removeItem('tts-cloud-key');
      localStorage.removeItem('tts-cloud-voice');
      localStorage.removeItem('tts-cloud-speed');
      localStorage.removeItem('tts-cloud-provider');

      loadState();
      applyTheme();
      buildSidebar();
      initSearch();
      initVoiceTester();

      // Keyboard shortcuts

    function togglePomo() {
      if (pomo.running) {

    function pomoTick() {

    function renderPomoOverlay(overlay, title, msg, phaseLabel, canDismiss) {

    // Alarm sound (repeating gentle chime)

    function pomoAlarmStart() {
      try {
        pomoAlarmCtx = new (window.AudioContext || window.webkitAudioContext)();
        function chime() {
          if (!pomoAlarmCtx) return;
          var osc = pomoAlarmCtx.createOscillator();
          var gain = pomoAlarmCtx.createGain();
          osc.connect(gain); gain.connect(pomoAlarmCtx.destination);
          osc.frequency.value = 880;
          gain.gain.value = 0.2;
          osc.start();
          gain.gain.exponentialRampToValueAtTime(0.01, pomoAlarmCtx.currentTime + 0.5);
          osc.stop(pomoAlarmCtx.currentTime + 0.5);
          setTimeout(function() {
            if (!pomoAlarmCtx) return;
            var osc2 = pomoAlarmCtx.createOscillator();
            var gain2 = pomoAlarmCtx.createGain();
            osc2.connect(gain2); gain2.connect(pomoAlarmCtx.destination);
            osc2.frequency.value = 1100;
            gain2.gain.value = 0.2;
            osc2.start();
            gain2.gain.exponentialRampToValueAtTime(0.01, pomoAlarmCtx.currentTime + 0.5);
            osc2.stop(pomoAlarmCtx.currentTime + 0.5);
          }, 300);
        }
        chime();
        // Single chime only -- no repeating alarm
      } catch(e) {}

        var msg = pomo.phase === 'work' ? 'Focus session done! Time for a break.' : 'Break over! Ready to focus?';

      if (targetEl) {
        rect = targetEl.getBoundingClientRect();
        var pad = 12;
        var spotlight = document.createElement('div');
        spotlight.id = 'tourSpotlight';
        spotlight.className = 'tour-spotlight';
        spotlight.style.top = (rect.top - pad) + 'px';
        spotlight.style.left = (rect.left - pad) + 'px';

            prevBtn +
            '<button class="tour-btn next" onclick="tourNext()">' + nextLabel + '</button>' +
          '</div>' +
        '</div>';

      document.body.appendChild(tooltip);

      // Position tooltip - always clamped within viewport
      var tooltipRect = tooltip.getBoundingClientRect();
      var margin = 12;
      var maxW = window.innerWidth - margin * 2;
      var maxH = window.innerHeight - margin * 2;

      // Clamp tooltip size
      if (tooltipRect.width > maxW) tooltip.style.maxWidth = maxW + 'px';

      if (rect) {
        tooltipRect = tooltip.getBoundingClientRect();
        var top, left;

        // Try below target first
        top = rect.bottom + 12;
        left = rect.left;

        // If below doesn't fit, try above
        if (top + tooltipRect.height > window.innerHeight - margin) {
          top = rect.top - tooltipRect.height - 12;
        }
        // If above doesn't fit either, center vertically
        if (top < margin) {
          top = Math.max(margin, (window.innerHeight - tooltipRect.height) / 2);
          // Place to the right of target if possible
          left = rect.right + 12;
        }

        // Clamp left/right
        if (left + tooltipRect.width > window.innerWidth - margin) {
          left = window.innerWidth - tooltipRect.width - margin;
        }
        if (left < margin) left = margin;
        // Clamp top/bottom
        if (top < margin) top = margin;
        if (top + tooltipRect.height > window.innerHeight - margin) {
          top = window.innerHeight - tooltipRect.height - margin;
        }

        tooltip.style.top = top + 'px';
        tooltip.style.left = left + 'px';
      } else {
        // Center for virtual steps - set position directly, no transform
        var cTop = Math.round((window.innerHeight - tooltipRect.height) / 2);
        var cLeft = Math.round((window.innerWidth - tooltipRect.width) / 2);
        if (cTop < margin) cTop = margin;
        if (cLeft < margin) cLeft = margin;
        tooltip.style.top = cTop + 'px';
        tooltip.style.left = cLeft + 'px';
      }
    }

        document.getElementById('appContainer').style.display = 'none';
      }
    });
  </script>
</body>
