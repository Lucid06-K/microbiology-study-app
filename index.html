    {q:"Draw and label a diagram comparing the cell wall structure of a gram-positive bacterium and a gram-negative bacterium. Explain how the structural difference accounts for the different Gram stain outcomes.",model:"The diagram should show two bacterial cells side by side. The gram-positive cell should be labelled with: a cell membrane (inner), and a very thick peptidoglycan layer on the outside. The gram-negative cell should be labelled with: a cell membrane (inner), a thin peptidoglycan layer, and an outer membrane containing lipopolysaccharide (LPS). During Gram staining, crystal violet dye and iodine form a large complex inside both cell types. During the brief decolourisation step (approximately 2 seconds), the thick peptidoglycan of gram-positive bacteria traps this complex, so the cells remain purple. In gram-negative bacteria, the thin peptidoglycan layer cannot retain the complex, which is washed out, leaving the cells colourless. The subsequent pink counterstain (safranin) then colours only the gram-negative cells pink. This is why gram-positive bacteria appear purple and gram-negative bacteria appear pink under the microscope.",marks:10}
  ],
  4: [
    {q:"Describe the process of DNA replication in bacteria, explaining the difference between the leading strand and the lagging strand. Why are Okazaki fragments formed on only one strand?",model:"Bacterial DNA replication begins at the origin of replication (oriC) and proceeds bidirectionally to the termination site (ter). The two strands of the double helix separate, and DNA polymerase synthesises new complementary strands in the 5' to 3' direction only. On the leading strand, DNA polymerase can synthesise continuously in the same direction as the replication fork movement, producing one uninterrupted strand of new DNA. On the lagging strand, however, synthesis must occur in the opposite direction to fork movement, so DNA polymerase can only synthesise short fragments (Okazaki fragments) as the fork opens up new template. These fragments are subsequently joined together by the enzyme ligase to form a continuous strand. Okazaki fragments form only on the lagging strand because DNA polymerase can only add nucleotides in the 5' to 3' direction, and the lagging strand template runs in the opposite orientation relative to fork movement.",marks:10},
    {q:"Explain the difference between a silent mutation and a loss-of-function mutation in a bacterial gene. Provide an example of how each could affect the phenotype of a bacterium.",model:"A silent mutation is a point mutation (single base change) that alters the DNA codon but does not change the amino acid encoded, due to the redundancy (degeneracy) of the genetic code where multiple codons can specify the same amino acid. For example, a change from GCU to GCC both encode alanine, so the protein produced is identical and the bacterium's phenotype is unaffected. A loss-of-function mutation changes the DNA sequence in a way that the encoded protein can no longer perform its function. This could be a substitution that changes a critical amino acid, or a deletion/insertion that causes a frameshift, potentially introducing a premature stop codon that truncates the protein. For example, if a frameshift mutation occurs in a flagella gene, it could truncate the flagellar protein, rendering the bacterium non-motile and potentially reducing its ability to cause disease by preventing it from reaching target tissues.",marks:10},
    {q:"A deletion of a single nucleotide occurs in the middle of a gene encoding an essential bacterial protein. Explain the consequences of this mutation at the molecular level and for the bacterium's survival.",model:"A single nucleotide deletion causes a frameshift mutation, meaning all codons downstream of the deletion are shifted by one position. This changes the reading frame so that completely different amino acids are encoded from that point onward. Critically, a frameshift often introduces a premature stop codon (TAA, TAG, or TGA), which truncates the protein early, producing a shortened, non-functional protein. Since the gene encodes an essential protein (one required for the bacterium to survive), the loss of this functional protein constitutes a lethal mutation. The bacterium would be unable to carry out the essential function and would fail to replicate, effectively dying. This demonstrates why the DNA repair mechanisms (mismatch repair, excision repair, double-strand break repair) are so important, though they are not always successful or accurate.",marks:10},
    {q:"Bacteria can accumulate mutations much faster than humans. Explain the biological reasons for this rapid accumulation, referring to generation time and population size.",model:"Bacteria accumulate mutations rapidly for two main reasons. First, their generation time is extremely short, approximately 20 minutes for a typical bacterium like E. coli, compared to decades for humans. This means that many rounds of DNA replication occur in a short period, and since mutations arise during replication (at a rate of approximately 1 error per 10 billion nucleotides incorporated, meaning roughly every third cell division for E. coli), mutations accumulate much more frequently on a calendar-time basis (approximately one per hour). Second, bacterial populations are enormous: a single colony on an agar plate contains over a million cells. Large population sizes mean that even rare mutations will occur in some individuals within the population, providing raw material for natural selection. The combination of rapid reproduction and massive population sizes means evolutionary changes that might take thousands of years in humans can occur in days or weeks in bacteria.",marks:10},
    {q:"Explain how the proofreading function of DNA polymerase helps maintain the integrity of the bacterial genome, and discuss what happens when proofreading fails.",model:"During DNA replication, DNA polymerase occasionally incorporates an incorrect base (e.g., placing a T where a G should be). The proofreading function involves an exonuclease enzyme that detects the mismatched base, removes (excises) the incorrect nucleotide, and replaces it with the correct one. This proofreading mechanism greatly reduces the error rate of DNA replication. However, proofreading is not perfect, and some errors slip through at a rate of approximately 1 in every 10 billion nucleotides incorporated. When proofreading fails, the incorrect base becomes permanently incorporated into the DNA. Upon subsequent replication, the mismatched base is treated as the template, so the error is propagated and amplified in all future daughter cells. Additional repair mechanisms (mismatch repair, excision repair) exist as backup systems, but these are also not always successful, meaning some mutations become permanent features of the genome that can affect protein function and bacterial phenotype.",marks:10}
  ],
  5: [
    {q:"Compare and contrast the three mechanisms of horizontal gene transfer in bacteria: conjugation, transduction, and transformation. For each, identify the source of donor DNA and the mechanism of transfer.",model:"Conjugation involves the direct transfer of plasmid DNA from a donor bacterium to a recipient bacterium through a conjugative pilus (sex pilus). The donor DNA source is a conjugative plasmid, which replicates via rolling circle replication during transfer, so the donor retains a copy. The process requires direct cell-to-cell contact. Transduction involves the transfer of DNA via bacteriophages (viruses that infect bacteria). During phage replication inside a host cell, some host bacterial DNA may be accidentally packaged into phage particles. When these phages infect a new bacterial cell, they inject the donor DNA along with or instead of phage DNA. Transformation involves the uptake of free (naked) DNA from the environment by a competent bacterial cell. The DNA source can be plasmid DNA, chromosomal DNA, or phage DNA released from dead bacteria. The recipient must be in a competent state, either naturally induced by environmental signals or artificially induced in the laboratory (chemically or by electroporation). In all three cases, the acquired DNA can potentially integrate into the recipient's chromosome and be inherited by daughter cells.",marks:10},
    {q:"Describe the design and expected results of a mating experiment to determine whether a plasmid is conjugative. Include the controls needed and explain how you would select for transconjugants.",model:"A mating experiment requires a donor strain carrying the plasmid of interest with a selectable marker (e.g., antibiotic resistance gene A on the plasmid) and a recipient strain with a different selectable marker on its chromosome (e.g., antibiotic resistance gene B). The two strains are mixed together on a non-selective agar plate and incubated at optimal temperature (e.g., 37 degrees C for E. coli) for approximately 5-6 hours to allow conjugation. The mixture is then plated onto selective agar containing both antibiotics A and B. On this plate, donor cells cannot grow (they lack resistance to B), recipient cells cannot grow (they lack resistance to A), and only transconjugants (recipients that have acquired the plasmid carrying gene A) can grow, as they possess both resistance genes. If colonies appear, the plasmid is conjugative. Controls include plating donor and recipient separately on the double-antibiotic plate to confirm neither can grow alone.",marks:10},
    {q:"The 2011 German E. coli O104:H4 outbreak strain was described as a 'hybrid' of two E. coli pathotypes. Explain what is meant by this, identifying the two pathotypes and the virulence factors each contributed.",model:"The outbreak strain was a hybrid of enterohaemorrhagic E. coli (EHEC) and enteroaggregative E. coli (EAEC). From the EHEC lineage, it acquired the Shiga toxin 2a gene (stx2a), which was encoded by a bacteriophage that had integrated into the chromosome as a prophage. Shiga toxin causes bloody diarrhoea and can lead to haemolytic uraemic syndrome (HUS) and kidney failure. From the EAEC lineage, it carried the pAA plasmid encoding aggregative adherence fimbriae, which enable tight adhesion of bacteria to intestinal epithelial cells, facilitating colonisation. This unprecedented combination meant the strain could both colonise the gut aggressively (EAEC trait) and produce a potent toxin (EHEC trait), explaining why it caused the highest recorded incidence of HUS-associated EHEC disease. The hybrid nature arose through horizontal gene transfer events, specifically phage-mediated transduction of the Shiga toxin gene into an ancestral EAEC strain.",marks:10},
    {q:"Explain how conjugative plasmids use toxin-antitoxin systems and active partitioning to ensure their stable inheritance during bacterial cell division.",model:"Active partitioning systems encoded on conjugative plasmids ensure that during cell elongation prior to division, plasmid copies are physically pushed or pulled to opposite ends of the cell. This guarantees that when the cell divides, each daughter cell receives at least one copy of the plasmid. If this system fails or is absent, plasmids may segregate unevenly, with one daughter cell receiving all copies and the other receiving none. Toxin-antitoxin (TA) systems provide a backup mechanism known as post-segregational killing. The plasmid encodes both a stable toxin and an unstable antitoxin. As long as the plasmid is present, the antitoxin is continuously produced to neutralise the toxin. If a daughter cell fails to inherit the plasmid, it can no longer produce the antitoxin, but the residual toxin remains active and kills that plasmid-free cell. Together, these mechanisms ensure that only plasmid-bearing cells survive, maintaining the plasmid within the bacterial population even though carrying it is metabolically costly.",marks:10},
    {q:"Explain how a bacteriophage can convert a non-pathogenic bacterium into a pathogenic one, using a specific example from the lecture material.",model:"Bacteriophages (viruses that infect bacteria) can carry virulence genes and integrate them into the bacterial chromosome through the lysogenic cycle. When a phage infects a bacterium, it can inject its DNA, which integrates into the host chromosome at specific sequences, becoming a prophage. This prophage is then replicated along with the chromosome and inherited by daughter cells. If the prophage carries virulence genes, such as toxin-encoding genes, the bacterium gains the ability to produce those toxins and cause disease. A specific example is the Shiga toxin-producing phage in E. coli. In the 2011 German outbreak, the E. coli O104:H4 strain acquired its stx2a (Shiga toxin 2a) gene from a bacteriophage that integrated into the chromosome. This phage was most closely related to phages found in EHEC O157:H7 strains, indicating that the toxin gene was transferred between different E. coli pathotypes via transduction, converting an enteroaggregative strain into a deadly Shiga toxin producer.",marks:10}
  ],
  6: [
    {q:"Compare and contrast parasitism, mutualism, and commensalism as forms of symbiosis. Provide a specific example of each from the lecture material.",model:"All three are forms of symbiosis (organisms living together) but differ in the costs and benefits to each party. Mutualism benefits both organisms with no harm to either; an example is the cleaner fish relationship where the cleaner fish receives a meal while the larger fish is cleaned of parasites. Commensalism benefits one organism while the other is neither helped nor harmed; an example is clownfish living in sea anemones, where the clownfish gains protection but the sea anemone is unaffected. Parasitism benefits one organism (the parasite) at the expense of the other (the host); an example is the sandfly transmitting Leishmania, which causes leishmaniasis in the host. The key distinction is the balance of benefit and harm: mutualism is mutually positive, commensalism is positive-neutral, and parasitism is positive-negative.",marks:10},
    {q:"Explain the three-pronged approach to parasite control (management, epidemiology, treatment) and argue why treatment should be considered the last resort. Use examples relevant to livestock production.",model:"The three-pronged approach consists of management, epidemiology, and treatment. Management is the most important component and involves preventing parasite-host contact through practices such as shearing/crutching sheep to reduce ectoparasite habitat, rotating pastures to reduce faecal parasite burden, maintaining good nutrition and body condition to support host immunity, and quarantining new animals (biosecurity). Epidemiology involves understanding when and where parasites are active (seasonality, geography, time of day) and applying that knowledge; for example, stabling horses at night to avoid biting insects that are active after dark. Treatment (drug administration) should be the last resort because widespread and premature use of antiparasitic drugs has led to significant anthelmintic resistance globally, rendering many drugs ineffective. If management and epidemiological strategies can prevent or reduce parasite burdens to tolerable levels, treatment can be avoided entirely, preserving drug efficacy for when it is truly needed.",marks:10},
    {q:"Describe the life cycle of Giardia duodenalis, including the two main stages, the route of transmission, and explain why this parasite is particularly difficult to eliminate from kennel or daycare environments.",model:"Giardia duodenalis has a direct life cycle involving two stages: the trophozoite and the cyst. Trophozoites are the active, flagellated feeding stage found inside the host's gut, where they attach to the intestinal lining via a ventral disc (sucker) and cause chronic diarrhoea by disrupting nutrient absorption. Trophozoites reproduce asexually within the host, allowing rapid population growth. As they pass through the gut, some encyst to form the cyst stage, which is shed in faeces. Transmission is faecal-oral: new hosts become infected by ingesting cysts from contaminated water, food, or surfaces. Giardia is particularly difficult to eliminate from kennels and daycare centres because the cysts are extremely environmentally resistant and hard to destroy, hosts can be asymptomatic carriers (shedding infective cysts without showing diarrhoea), the infective dose is very low, and the faecal-oral transmission route is easily facilitated in crowded environments. Rigorous hygiene, sanitation, and bleach disinfection are essential for control.",marks:10},
    {q:"Explain the difference between a definitive host and an intermediate host in a parasite's life cycle. Why might having multiple intermediate hosts be advantageous for a parasite species?",model:"A definitive host is where the parasite undergoes sexual reproduction (if it occurs) and completes the most critical stage of its life cycle. All parasites require a definitive host. An intermediate (in-between) host is one where sexual reproduction does not occur, but the parasite may undergo asexual reproduction or development; it serves as a bridge or stepping stone to reach the definitive host. Having multiple intermediate hosts can be advantageous because it provides the parasite with more pathways to complete its life cycle. If one host species becomes rare or is eliminated from an area, the parasite can still persist by utilising alternative intermediate hosts as reservoirs. This acts as a buffer against environmental changes or host population fluctuations, increasing the parasite's long-term survival and transmission success, even though more complex life cycles take longer to complete.",marks:10},
    {q:"A farmer notices production losses in their sheep flock: wool quality is declining, and animals appear irritated and are rubbing against fences. Explain what ectoparasite could be responsible, describe its classification as a type of parasite, and recommend a control strategy using the three-pronged approach.",model:"The most likely ectoparasite is Bovicola ovis (sheep body louse), a biting louse that feeds on the surface of the skin. It is classified as an obligate parasite (must have a host to complete its life cycle) and a permanent parasite (remains on the host at all times, as it cannot survive long in the environment, similar to the 'Goldilocks' concept of requiring the host's microhabitat). For control using the three-pronged approach: Management should include maintaining sheep in good body condition with adequate nutrition to support immunity, shearing or crutching to physically reduce louse habitat, and implementing biosecurity by quarantining new animals before introducing them to the flock. Epidemiology involves understanding that lice are permanent parasites active year-round but populations increase in winter when fleece is long and conditions favour their reproduction. Treatment with an appropriate ectoparasiticide should be applied only when infestation reaches levels causing production loss, ideally timed after shearing when louse numbers are lowest and chemical contact is maximised.",marks:10}
  ],
  7: [
    {q:"Explain the difference between a repressible operon and an inducible operon, using the trp operon and the lac operon in E. coli as examples. In your answer, describe the role of the repressor in each system and what triggers the change in gene expression.",model:"The trp operon is a repressible operon: its repressor is normally inactive, so the genes for tryptophan synthesis are transcribed by default. When tryptophan accumulates in the environment, it acts as a co-repressor by binding to the inactive repressor protein, activating it so that it binds the operator and blocks RNA polymerase, thereby shutting off transcription. In contrast, the lac operon is an inducible operon: its repressor is normally active and bound to the operator, preventing transcription. When lactose is present, it binds to the active repressor and changes its conformation so it can no longer bind the operator, allowing RNA polymerase to transcribe the three structural genes (lacZ, lacY, lacA) needed to acquire and break down lactose. Thus, the trp operon is switched off by the presence of its end product, while the lac operon is switched on by the presence of its substrate.",marks:10},
    {q:"Describe the two-part control mechanism of the lac operon. Why does E. coli require both low glucose levels and the presence of lactose for full expression of the lac operon genes?",model:"E. coli preferentially uses glucose as its primary energy source, so the lac operon is only fully activated when glucose is depleted and an alternative sugar (lactose) is available. The first part of the control involves glucose levels: when glucose is scarce, cyclic AMP (cAMP) accumulates in the cell and binds to the catabolite activator protein (CAP/CRP). This CAP-cAMP complex binds upstream of the promoter and enhances the ability of RNA polymerase to bind and initiate transcription. The second part involves lactose: the lac repressor is constitutively produced and normally sits on the operator, blocking transcription. When lactose is present, it binds the repressor and causes a conformational change that releases it from the operator. Both conditions must be met simultaneously for RNA polymerase to move through and transcribe the lacZ, lacY, and lacA genes efficiently.",marks:10},
    {q:"Explain how the Shiga toxin genes of enterohemorrhagic E. coli (EHEC) are regulated. What triggers their expression, and why is this relevant to the clinical use of antibiotics in EHEC infections?",model:"The Shiga toxin genes in EHEC are encoded on lysogenic bacteriophages integrated into the bacterial genome as prophages. In the lysogenic state, a CI repressor protein binds to the operator region and prevents transcription of the phage genes, including the Shiga toxin genes. When the bacterium experiences a stress response — such as oxidative stress from hydrogen peroxide in the gut, or exposure to UV light or certain antibiotics that interfere with DNA replication — the CI repressor is degraded. This allows the prophage to excise from the genome and re-enter the lytic cycle, during which the Shiga toxin genes are transcribed at high levels and toxin is produced. This is clinically important because treating EHEC infections with antibiotics can trigger the SOS/stress response, paradoxically increasing Shiga toxin production and worsening the patient's condition, potentially leading to hemolytic uremic syndrome.",marks:10},
    {q:"A researcher wants to produce large quantities of a specific antigen for a diagnostic test. Describe how an E. coli expression system using a T7 promoter and IPTG induction could be used to achieve this goal.",model:"The researcher would clone the gene encoding the antigen of interest into an expression vector containing a T7 promoter and a selectable antibiotic resistance marker. This plasmid is transformed into a special E. coli strain that carries the T7 RNA polymerase gene under the control of a lac promoter. Under normal growth conditions, the lac repressor blocks expression of the T7 RNA polymerase, so the gene of interest is not transcribed. When the researcher adds IPTG (a lactose analogue) to the culture medium, IPTG binds the lac repressor and releases it from the operator, allowing transcription of the T7 RNA polymerase gene. The T7 RNA polymerase then recognises the T7 promoter on the expression vector and drives high-level transcription of the antigen gene. Using a high-copy-number plasmid amplifies protein production further, and the antibiotic resistance marker ensures only bacteria carrying the plasmid survive in selective media.",marks:10},
    {q:"Describe how the virulence factors of Vibrio cholerae (cholera toxin and toxin co-regulated pilus) are regulated. Include the role of the ToxT activator and explain why these factors are not produced in laboratory conditions without special modifications.",model:"Vibrio cholerae possesses two major virulence factors: the cholera toxin (encoded by the ctxAB operon on a lysogenic bacteriophage) and the toxin co-regulated pilus (TCP, encoded on a 40 kb pathogenicity island). Both are regulated by the ToxT transcriptional activator, which binds to the promoters of both operons and activates their transcription. ToxT itself is activated only when environmental signals characteristic of the human gut are detected, including appropriate temperature, pH, and the presence of bicarbonate. In the absence of these signals — such as in standard laboratory conditions — ToxT remains inactive and neither virulence factor is expressed. Additionally, ToxT exhibits autoregulation, as its own gene is located within the TCP operon, so it activates its own expression in a positive feedback loop. To study these virulence factors in vitro, researchers must simulate gut conditions to trigger the signalling cascade.",marks:10}
  ],
  8: [
    {q:"Compare and contrast the life cycles of Fasciola hepatica (liver fluke) and the gastrointestinal nematodes of sheep. In your answer, identify the type of life cycle each has, the infective stage, and the key intermediate hosts involved.",model:"Fasciola hepatica has an indirect life cycle requiring an intermediate host (an aquatic snail), whereas gastrointestinal nematodes such as Haemonchus contortus have a direct life cycle with no intermediate host required. For F. hepatica, eggs are passed in faeces and hatch in water into miracidia (ciliated, actively swimming larvae) that torpedo into a snail. Inside the snail, they develop through redia and sporocyst stages before emerging as cercariae (flagellated swimmers). Cercariae attach to vegetation and become metacercariae, which are the infective stage ingested by grazing herbivores. For nematodes, eggs are passed in dung, hatch into L1 larvae, moult through L2, and the L3 (third-stage larva) is the infective stage that migrates onto grass and is ingested by the grazing animal. The key difference is the complexity: F. hepatica requires aquatic conditions and a snail host, while nematode transmission occurs directly through pasture contamination.",marks:10},
    {q:"Explain why Ixodes holocyclus (the Australian paralysis tick) is becoming an increasing concern in southern Australian states such as Victoria. Include the mechanism by which it causes host death and the concept of acquired immunity.",model:"Ixodes holocyclus produces a neurotoxin called holocyclotoxin that causes ascending flaccid motor paralysis in its hosts, beginning in the hind limbs and progressing upward until it paralyses the respiratory muscles, leading to death by respiratory failure. Historically, this tick was confined to Queensland and northern coastal regions, but climate change — warmer temperatures and increased humidity extending southward along the coast — has expanded its range into Victoria and other southern areas. Native Australian wildlife, particularly bandicoots, have co-evolved with this tick and develop acquired immunity through repeated exposure to small doses of the toxin. However, domestic animals in newly affected areas (dogs, cats, livestock) are immunologically naive and highly susceptible. Critically, this acquired immunity is not permanent and requires ongoing re-exposure; animals removed from tick-endemic areas lose their immunity. A single adult female tick can kill a small dog, making it a significant veterinary concern in regions where hosts have no prior exposure.",marks:10},
    {q:"Describe the life cycle and parasitic behaviour of Lucilia cuprina (the Australian sheep blowfly). Why is it considered one of the most economically important parasites in the Australian sheep industry?",model:"Lucilia cuprina is a facultative ectoparasite responsible for over 90% of fly strike (cutaneous myiasis) in Australian sheep. Adult females lay batches of eggs on the wool of sheep, particularly in areas soiled with faeces or urine that attract them via olfactory cues. Eggs hatch within approximately half a day into first-instar larvae that feed on skin secretions. Within a day, they moult to second-instar larvae whose mouth hooks are large enough to penetrate the skin, and third-instar larvae cause the most severe tissue damage. The entire life cycle takes only about 17 days, allowing explosive population growth with up to three generations in spring and two in autumn. It is economically devastating because massive larval feeding causes severe tissue destruction, secondary infections, pain, weight loss, reduced wool quality, and death if untreated. Control is increasingly difficult because L. cuprina has developed rampant resistance to the two remaining chemical growth regulators (cyromazine and dicyclanil), and mulesing — the most effective prevention method — faces significant animal welfare opposition.",marks:10},
    {q:"A cattle farmer notices several animals are losing condition, appearing anemic, and some are showing signs of hind-limb weakness progressing toward the front of the body. Explain what parasites could be responsible and what management strategies you would recommend.",model:"The anaemia could be caused by heavy tick infestation, as female ticks (particularly one-host cattle ticks like Rhipicephalus australis) can each engorge with up to 5 mL of blood; with hundreds or thousands of ticks per animal, significant blood loss and anaemia result. The ascending hind-limb weakness progressing cranially is characteristic of tick paralysis caused by Ixodes holocyclus, whose holocyclotoxin causes ascending flaccid paralysis. Management recommendations would include: (1) immediately checking animals for ticks and removing any adult females found, particularly around the head and neck; (2) administering tick anti-serum if Ixodes holocyclus paralysis is suspected; (3) implementing acaricide treatment programs suited to the tick species present; (4) considering pasture management to reduce tick habitat by maintaining short grass and reducing humidity; and (5) if in a region newly encountering I. holocyclus due to climate range expansion, educating staff about the signs of tick paralysis and establishing a relationship with a veterinarian for rapid intervention.",marks:10},
    {q:"Explain the concept of 'refugia' in the context of anthelmintic treatment of gastrointestinal nematodes in sheep. Why is it considered poor practice to treat all animals in a flock simultaneously?",model:"Refugia refers to the population of worms in the environment or in untreated animals that have not been exposed to anthelmintic drugs and therefore remain drug-susceptible. Maintaining refugia is critical because if all animals are treated simultaneously, only drug-resistant worms survive, and these resistant individuals breed exclusively with each other, rapidly producing a fully resistant population. By leaving some animals untreated — typically those that appear healthy and have low worm burdens — the susceptible worms in refugia dilute the resistant gene pool when mating occurs, slowing the development of widespread anthelmintic resistance. Modern best practice involves targeted selective treatment: identifying the animals most in need of treatment (e.g., those with poor body condition or high faecal egg counts) and treating only those individuals, rather than performing blanket mass drug administration across the entire flock.",marks:10}
  ],
  9: [
    {q:"Explain why the physical structure of a virus (enveloped versus non-enveloped) is critical for determining appropriate biosecurity and disinfection procedures. Provide examples of each type and their environmental resilience.",model:"Enveloped viruses such as herpes viruses and influenza possess a lipid bilayer membrane studded with glycoproteins essential for host cell attachment and infection. This envelope is fragile and easily disrupted by detergents, changes in pH, temperature fluctuations, and drying, meaning these viruses are relatively easy to inactivate through standard disinfection measures like hand washing with soap and water. However, they require close contact for transmission because they do not persist long in the environment. Non-enveloped viruses such as parvovirus and rotavirus consist of a protein capsid surrounding nucleic acid, making them extremely resilient to detergents, drying, heat, pH changes, and most standard disinfectants. Parvovirus, for example, can persist in the environment for months to years and requires harsh chemicals like formalin for effective disinfection. Understanding this structural distinction directly informs whether standard hygiene measures will be sufficient or whether more aggressive decontamination protocols are needed.",marks:10},
    {q:"Describe the general replication cycle of a virus, from attachment to release of new virions. Why do viruses require host cells to replicate, unlike bacteria?",model:"The viral replication cycle involves several sequential steps. First, the virus attaches to specific receptors on the host cell surface (such as sialic acid or heparan sulphate). It then penetrates through the cytoplasmic membrane and uncoats to release its nucleic acid into the host cell. Once inside, early mRNA is produced that encodes viral proteins including polymerases and structural proteins; the virus simultaneously shuts down host protein synthesis to commandeer cellular resources. The viral nucleic acid is then replicated, new structural components are synthesised, and progeny virions are assembled. Finally, new viruses are released either by budding through the cell membrane or by lysing (bursting) the cell open. Viruses cannot replicate independently because they lack their own ribosomes, energy-generating systems, and most of the enzymatic machinery required for nucleic acid replication and protein synthesis — they are obligate intracellular organisms that must hijack the host cell's existing machinery to reproduce.",marks:10},
    {q:"A horse breeder is planning to transport several pregnant mares long-distance to attend a competition where horses from many different properties will be temporarily housed together. Using your knowledge of equine herpesvirus biology, explain the risks involved and recommend management strategies.",model:"Equine herpesvirus (EHV) establishes lifelong latent infections in neural tissue and can reactivate during periods of stress. Long-distance transportation is a major stressor for horses, and mixing animals from different properties forces re-establishment of social hierarchies, compounding stress levels. Reactivation in even one latently infected horse can lead to viral shedding and respiratory transmission to naive in-contact animals in the close confines of temporary stabling. EHV can then disseminate systemically via the bloodstream and infect endothelial cells in the endometrium (causing abortion in pregnant mares) or in vessels supplying the central nervous system (causing potentially fatal neurological disease). Recommended strategies include: vaccinating all horses prior to transport, minimising transport duration and stress, keeping pregnant mares in small stable groups rather than mixing with unfamiliar horses, avoiding co-housing with horses of unknown health status, practising strict biosecurity with separate equipment for each group, and ideally not transporting late-pregnant mares to large multi-property gatherings at all.",marks:10},
    {q:"Compare and contrast PCR-based diagnostics with rapid antigen tests (lateral flow assays) for viral disease detection. Under what circumstances would each be preferred?",model:"PCR-based diagnostics detect viral nucleic acid and offer high sensitivity and specificity; they can be quantitative (reporting cycle threshold values where lower CT indicates more viral material), do not require infectious virus (just intact nucleic acid), and can provide results within hours. However, PCR requires specialised and expensive equipment, trained laboratory personnel, and a dedicated laboratory setting. Rapid antigen tests (lateral flow assays) detect viral proteins and are extremely fast (minutes), inexpensive, and can be performed by untrained individuals in the field or at home. Their limitations include lower sensitivity (requiring higher viral loads to register positive, leading to potential false negatives) and potential loss of specificity as viral antigens mutate over time. PCR is preferred when accurate individual diagnosis is critical, when viral loads may be low, or when quantification is needed. Rapid antigen tests are preferred for large-scale population screening during epidemics of highly contagious diseases where the key goal is rapid identification of positive individuals across many tests rather than perfect accuracy on each individual result.",marks:10},
    {q:"Explain why lumpy skin disease (a capripoxvirus) is considered one of the most significant biosecurity threats to the Australian cattle industry. Include in your answer the mechanisms of transmission and the features that make this virus difficult to control.",model:"Lumpy skin disease (LSD) is caused by a capripoxvirus that produces characteristic skin nodules and scab lesions containing extremely high concentrations of virus. As a poxvirus, it has a complex structure that makes it highly resilient in the environment — infectious scab material can persist for extended periods, enabling indirect transmission through environmental contamination. The virus is also transmitted mechanically by biting insects (not true biological transmission, but physical transfer of virus on mouthparts), meaning control of insect vectors across Australia's vast pastoral lands is essentially impossible. Additionally, contaminated equipment or needles used between animals can spread the virus. Australia's cattle herd of approximately 38 million animals is entirely naive and immunologically susceptible. An incursion would halt all cattle exports and severely impact dairy production, causing billions of dollars in economic losses. The proximity of LSD in Indonesia makes the threat geographically imminent, and the virus's environmental stability, multiple transmission routes, and the vast scale of Australian cattle operations make containment extremely challenging.",marks:10}
  ],
  10: [
    {q:"Explain what the ITS region is, why it is considered the universal barcode for fungi, and how it is used in fungal taxonomy. What are its advantages and limitations?",model:"The ITS (Internal Transcribed Spacer) region is part of the nuclear ribosomal DNA (nrDNA), located between the small subunit (SSU), the 5.8S gene, and the large subunit (LSU). There are two ITS regions — ITS1 (between SSU and 5.8S) and ITS2 (between 5.8S and LSU). It is considered the universal fungal barcode because: (1) all fungi possess it, enabling universal primer design; (2) it exists in multiple copies per genome, making it easy to amplify even from small samples; and (3) the flanking regions (SSU, 5.8S, LSU) are highly conserved across fungi, allowing design of universal primers, while the ITS1 and ITS2 regions themselves are highly variable, providing species-level discrimination. Its main limitation is that for closely related species within many genera, ITS alone cannot resolve species boundaries because the variation is insufficient. Therefore, ITS is typically used as a first-pass identification to determine genus, after which additional loci are sequenced (multi-locus sequence analysis, MLSA) to achieve reliable species-level identification.",marks:10},
    {q:"Describe the role of arbuscular mycorrhizal fungi (AMF) in plant nutrition. Include in your answer the key structures involved and the nature of the symbiotic relationship.",model:"Arbuscular mycorrhizal fungi (AMF) are obligate biotrophs within the Mucoromycota that form symbiotic associations with plant roots. The AMF spore germinates in the soil and its hyphae explore the surrounding area; plant root exudates stimulate the hyphae to branch extensively, increasing the chance of root contact. Upon reaching the root, the hyphal tip swells and forms a hyphopodium that adheres to the root surface. The plant epidermal cell forms a pre-penetration apparatus (PPA) that guides intracellular hyphal growth. In the inner root cortex, the hyphae branch repeatedly to form arbuscules — highly branched, tree-like structures (from Latin 'arbusculum' meaning small tree) — which are the primary sites of nutrient exchange between the fungus and plant. The AMF extends its hyphal network far beyond the root zone, accessing water and mineral nutrients (especially phosphorus) that the roots alone cannot reach, and transfers these to the plant. In return, the plant provides the fungus with sugars and carbon compounds. AMF can also enhance plant tolerance to drought and biotic stresses, and may reduce weed germination if weeds are non-hosts.",marks:10},
    {q:"Explain the concept of fungicide resistance in fungal plant pathogens. How does resistance develop in a population, and what strategies can growers use to delay its development?",model:"Fungicide resistance develops through a process of selection within genetically diverse fungal populations. In any natural pathogen population, a small number of individuals carry random mutations that confer reduced sensitivity or resistance to a particular fungicide mode of action. When the same fungicide is applied repeatedly, it kills susceptible individuals while the naturally resistant ones survive and reproduce. Over successive seasons, the resistant proportion increases until the population is predominantly resistant and the fungicide fails to control disease. Importantly, the fungicide does not cause the mutations — it selects for pre-existing resistant variants. Strategies to delay resistance development include: (1) avoiding susceptible crop cultivars to reduce overall disease pressure; (2) crop rotation to lower pathogen inoculum levels; (3) using non-chemical management methods (hygiene, biological control) to reduce reliance on fungicides; (4) spraying only when economically justified rather than as routine prophylaxis; and (5) rotating and mixing fungicides with different modes of action so that individuals resistant to one mode are killed by another. Critically, when fungicide is applied, it must always be used at the full recommended rate — diluted applications do not kill moderately resistant individuals and accelerate resistance evolution.",marks:10},
    {q:"A fruit grower notices brown rot symptoms appearing on nectarines after harvest, despite the fruit appearing healthy when picked. Explain the concept of quiescent (latent) infection and its implications for disease management timing.",model:"Quiescent or latent infection occurs when a pathogen infects the host during the growing season but remains dormant without causing visible symptoms until conditions change — typically after harvest when the fruit begins to ripen. In the case of brown rot (caused by Monilinia spp., an Ascomycota), infection often begins during flowering in the orchard: fungal spores land on flowers and the pathogen enters the developing fruit. However, it remains quiescent in the immature fruit because conditions are not yet favourable for symptom expression. After harvest, as the fruit ripens and its defences weaken, the fungus becomes active and produces visible rot and masses of spores (conidia in chains). The critical implication for management is that disease control must begin in the orchard during flowering and fruit development, not after harvest. By the time post-harvest symptoms appear, it is too late for intervention. Orchard-stage fungicide applications during flowering can prevent the initial infection and thus prevent post-harvest losses.",marks:10},
    {q:"Draw and label a generalised disease cycle for an ascomycete plant pathogen such as powdery mildew on barley. Describe what would be included in your diagram, distinguishing between the sexual and asexual cycles and their respective roles.",model:"The diagram should show two interconnected cycles. The large outer (sexual) cycle occurs once per season: at the end of the growing season, the fungus produces ascocarps (sexual fruiting bodies) containing asci, each holding 8 ascospores. These are survival structures that overwinter (or over-summer in Australia). At the beginning of the next growing season, ascospores are released and, together with conidia (asexual spores), initiate primary infection on new barley plants. The inner (asexual/epidemic) cycle repeats multiple times during the growing season: infected plants produce conidiophores bearing masses of conidia (asexual spores) on the plant surface, creating the characteristic powdery appearance. These conidia are dispersed by wind to infect neighbouring plants, producing new infections within days. This rapid asexual cycling is responsible for epidemic build-up in the field. The diagram should label: ascospores and conidia as primary inoculum, conidiophores and conidia in the repeating epidemic cycle, the ascocarp as the survival/overwintering structure, and arrows showing the direction of each cycle.",marks:10}
  ],
  11: [
    {q:"Compare and contrast ectoparasitic, migratory endoparasitic, and sedentary endoparasitic nematodes in terms of their feeding behaviour, movement within the host, and potential to act as virus vectors.",model:"Ectoparasitic nematodes feed from outside the root using a characteristically very long stylet to pierce cells and extract nutrients. They remain mobile in the soil and can move between plants, which critically enables them to act as vectors of plant viruses — acquiring a virus from one plant and transmitting it to another within hours, retaining the virus for up to a month. Migratory endoparasitic nematodes (e.g., root lesion nematodes like Pratylenchus) enter the root and continuously move through root tissue, producing cell wall-degrading enzymes and causing extensive necrotic lesions as they destroy cells along their path. All motile juvenile and adult stages can infect plants. They do not vector viruses because they remain inside the root. Sedentary endoparasitic nematodes (e.g., root-knot nematodes Meloidogyne, cyst nematodes Heterodera) enter the root as J2 juveniles, migrate to the vascular tissue, then become permanently immobile. They establish feeding sites, moult in place, and the females swell dramatically — either forming egg-filled cysts (cyst nematodes) or inducing root galls containing eggs (root-knot nematodes). They cannot vector viruses due to their immobility.",marks:10},
    {q:"Explain the difference between a resistant crop and a tolerant crop in the context of nematode management. Why might planting a tolerant cultivar be problematic for the following season's crop?",model:"A resistant crop prevents nematode infection entirely — nematodes cannot successfully parasitise the plant, so the crop suffers no yield loss and, crucially, the nematode population in the soil does not increase during the growing season. A tolerant crop, by contrast, does become infected by nematodes and allows them to reproduce, but the plant can still produce acceptable yields because it tolerates the parasitism without showing severe symptoms. The danger of planting a tolerant cultivar is that although the current season's yield may be satisfactory, the nematode population multiplies throughout the season because the crop serves as a functional host. By the end of the season, soil nematode populations can be significantly elevated. If the following crop is a susceptible (non-tolerant, non-resistant) variety, it will face a much higher nematode burden than originally present, potentially resulting in severe yield loss. Therefore, growers using tolerant cultivars must plan carefully for the next rotation, following with either a resistant cultivar or a non-host crop to bring nematode numbers back down.",marks:10},
    {q:"Describe the general life cycle of plant-parasitic nematodes, identifying the key stages. Using root-knot nematodes (Meloidogyne spp.) as an example, explain which stage is infective and how the nematode causes the characteristic galling symptoms.",model:"All plant-parasitic nematodes share a general life cycle of six stages: egg, four juvenile stages (J1–J4), and adult. J1 develops and moults within the egg, so J2 is the stage that hatches and emerges into the soil. In root-knot nematodes, J2 is the infective stage: it actively seeks out roots, attracted by root exudates, and penetrates the root tissue using its prominent stylet with characteristic basal knobs. Once inside, the J2 migrates intercellularly to the vascular tissue where it becomes sedentary. It then injects secretions through its hollow stylet into surrounding plant cells, manipulating plant hormones and causing the cells to enlarge and multiply abnormally. This produces the characteristic galls or knots on the roots. The nematode moults through J3 and J4 to become an adult while remaining in place. Females lay eggs in or on the root surface beneath the epidermis, contributing to further galling. The entire cycle can be completed in 2–4 weeks under favourable conditions, allowing multiple generations and escalating damage during a single growing season.",marks:10},
    {q:"Explain how nematodes can form disease complexes with other plant pathogens. Use a specific example to illustrate why understanding these complexes is important for both research and field management.",model:"Plant-parasitic nematodes often interact synergistically with other soil-borne pathogens such as fungi and bacteria to cause more severe disease than either pathogen alone. Nematodes physically pierce root tissue with their stylets, creating wounds that serve as entry points for bacteria and fungi that cannot actively penetrate intact plant tissue. Additionally, nematode secretions and feeding damage can alter root exudates and the surrounding soil microbiome, further facilitating secondary infections. A well-documented example is potato early dying syndrome in Australia, caused by the interaction of root lesion nematodes (Pratylenchus spp.) and the fungus Verticillium. Neither pathogen alone reproduces the full severity of symptoms seen in the field — researchers working on either pathogen individually in glasshouse experiments could not replicate the disease until both organisms were inoculated together. This demonstrates why understanding disease complexes is critical: incorrect diagnosis of a single causal agent leads to ineffective management, and research must account for multi-pathogen interactions to develop practical control strategies.",marks:10},
    {q:"A wheat grower in southern Australia finds patches of stunted, chlorotic plants in their field. Upon digging up affected plants, the roots appear stubby and brush-like. Soil testing reveals high populations of cereal cyst nematode (Heterodera). Describe the biology of this pathogen and recommend an integrated management plan.",model:"Cereal cyst nematode (Heterodera) is a sedentary endoparasitic nematode. The J2 stage hatches from eggs within cysts (the hardened remains of dead females) and is the infective stage that penetrates roots, migrates to the vascular tissue, and becomes sedentary. Females swell and their bodies transform into protective cysts containing hundreds of eggs that can survive in soil for many years, even without a host, making eradication extremely difficult. The brush-like, stunted root system results from the nematode disrupting root development and nutrient/water uptake. An integrated management plan should include: (1) soil testing before planting to assess nematode population levels against economic damage thresholds; (2) crop rotation with legume non-host crops (e.g., chickpea, lentil) that do not support cyst nematode reproduction, allowing populations to decline; (3) planting resistant wheat cultivars where available; (4) adjusting sowing time to cooler soil temperatures when J2 hatching is reduced; (5) maintaining a fallow period if populations are extremely high; and (6) avoiding moving contaminated soil on machinery between paddocks.",marks:10}
  ],
  12: [
    {q:"Explain how bacteria differ from fungi and nematodes in their mode of plant infection. Why does this difference in penetration strategy have important implications for disease management?",model:"Unlike fungi, which can actively penetrate plant tissue using specialised infection structures such as appressoria that generate turgor pressure to physically breach the cuticle, bacteria cannot actively penetrate intact plant surfaces. Bacteria rely entirely on passive entry through natural openings (stomata, lenticels, hydathodes) or wounds caused by insects, hail, wind damage, pruning, or other mechanical injury. This passive mode of infection has critical management implications: (1) wound prevention becomes paramount — careful handling during harvest, minimising mechanical damage, and avoiding unnecessary pruning during wet weather can significantly reduce bacterial infection; (2) controlling insect vectors that create wounds is important; (3) sanitation practices (clean tools, equipment, footwear) are essential because bacteria are commonly spread by water splash, wind, and human activity to wound sites; and (4) unlike fungal diseases where systemic fungicides can be applied, bactericides are generally expensive and impractical, making prevention through cultural practices and resistant cultivars the primary management strategies.",marks:10},
    {q:"Describe the three modes of virus transmission by insect vectors (non-persistent, semi-persistent, and persistent). Explain why applying insecticides is only recommended for viruses transmitted in a persistent manner.",model:"In non-persistent transmission, the virus attaches only to the insect's mouthparts (stylet) and persists for just a few hours before being lost. The insect acquires and transmits the virus very rapidly during brief feeding probes. In semi-persistent transmission, the virus penetrates deeper into the foregut and persists for a few days before being cleared. In persistent transmission, the virus enters the insect's haemolymph, replicates within the vector, and remains for the insect's lifetime; however, there is an incubation period of hours to days before the insect becomes infectious. Insecticides are only recommended for persistently transmitted viruses because: (1) with non-persistent viruses, transmission occurs so rapidly (seconds to minutes of probing) that by the time insecticide is applied, the damage is already done; (2) insecticide application can actually worsen non-persistent virus spread by agitating aphids, causing them to make more frequent short feeding probes on more plants rather than settling to feed on one; and (3) the incubation period of persistent viruses provides a time window during which vector control can prevent the insect from becoming infectious and transmitting to new plants.",marks:10},
    {q:"Explain why Xylella fastidiosa is considered the number one biosecurity threat to Australian agriculture. Describe the challenges associated with its detection and the potential economic impact of its introduction.",model:"Xylella fastidiosa is a xylem-inhabiting bacterium that can infect an extremely wide range of economically important crops including grapevines (causing Pierce's disease), almonds, avocados, citrus, and stone fruits. It is transmitted by xylem-feeding insect vectors such as sharpshooters and spittlebugs. The bacterium colonises the xylem vessels, blocking water transport and causing wilting, leaf scorch, and progressive plant death over several years. Detection is extremely challenging because early symptoms closely mimic abiotic stresses such as water stress, salinity, or nutrient deficiency, making visual identification unreliable. Entire vineyards and orchards in affected countries (e.g., Spain, Italy, USA) have been destroyed with no effective cure available — infected areas must be abandoned. If introduced to Australia along with a competent insect vector, the potential losses to the grape, almond, avocado, and other horticultural industries could reach billions of dollars. Australia's entire horticultural sector is currently naive to this pathogen, and the combination of a wide host range, difficulty of early detection, lack of cure, and vector-dependent spread makes it the highest-priority plant biosecurity threat.",marks:10},
    {q:"A farmer growing mung beans in Queensland notices water-soaked leaf spots with yellow halos. Explain the likely diagnosis, the mechanism behind the symptom presentation, and recommend appropriate management strategies.",model:"The symptoms are characteristic of halo blight, caused by a bacterial pathogen, one of the most important diseases of mung beans in Queensland and New South Wales. The water-soaked appearance of the spots occurs because the bacterium, upon entering through stomata or wounds, multiplies in the intercellular spaces and releases toxins and enzymes that damage cell membranes, causing water to leak from cells and accumulate between them. The yellow (chlorotic) halo surrounding each lesion is caused by bacterial toxins that diffuse outward from the infection site and destroy chlorophyll in surrounding tissue. Since this pathogen is seed-borne, management should include: (1) using certified pathogen-free seed as the primary control measure; (2) crop rotation to non-host crops to reduce inoculum in the field; (3) avoiding working in fields when foliage is wet, as water splash is a primary mechanism of bacterial spread; (4) planting resistant cultivars if available; (5) sanitation of machinery and equipment; and (6) copper-based products may provide some protective benefit if applied preventatively, though they are not curative.",marks:10},
    {q:"Compare vertical and horizontal transmission of plant viruses. Explain which type is more important for causing epidemics in the field and why both types must be considered in an integrated virus management program.",model:"Vertical transmission is the passage of virus from parent to offspring, occurring when the virus infects either the male gamete (pollen) or the female gamete (ovule), becoming incorporated into the seed. This results in seed-borne virus that infects the next generation of plants from germination. Horizontal transmission occurs between plants of the same generation and is assisted by vectors (aphids, thrips, nematodes, whiteflies), mechanical contact (rubbing of infected and healthy leaves), or vegetative propagation of infected material. Horizontal transmission is the primary driver of epidemics because it allows rapid spread through a crop during the growing season — a single infected plant can serve as a source for vector-mediated transmission to hundreds of neighbours. However, vertical transmission must also be addressed in management because seed-borne virus introduces primary inoculum into a new field or season, establishing initial infection foci from which horizontal spread then occurs. An integrated management program should therefore include: virus-free certified seed/planting material (addressing vertical transmission), vector management appropriate to the transmission mode (addressing horizontal transmission), resistant cultivars, removal of infected plants as inoculum sources, and biosecurity measures to prevent introduction of infected material.",marks:10}
  ],
  13: [
    {q:"Explain the two-layered plant immune system (PTI and ETI). In your answer, describe what triggers each response, the relationship between them, and why some pathogens can still cause disease despite these defences.",model:"The first layer of plant immunity is PAMP-triggered immunity (PTI), activated when pattern recognition receptors on the plant cell surface detect conserved pathogen-associated molecular patterns (PAMPs/MAMPs) — these are molecules common to many microbes, such as flagellin or chitin, or damage-associated signals from the plant's own degraded cell wall. PTI provides a broad, non-specific defence response effective against many different pathogens. However, specialised pathogens have evolved effector proteins — small secreted molecules injected into plant cells that suppress or interfere with PTI signalling, allowing the pathogen to colonise the plant and cause disease. The second layer is effector-triggered immunity (ETI), which occurs when resistant plant cultivars possess intracellular recognition proteins (R proteins) that can detect specific pathogen effectors. If the effector is recognised, the plant mounts a stronger, more specific defence response, often including a hypersensitive response. PTI and ETI are not strictly separated — they can occur simultaneously, overlap in their mechanisms, and ETI is often described as an amplified version of PTI. Pathogens cause disease when they produce effectors that successfully suppress PTI and the plant lacks the corresponding R proteins to trigger ETI.",marks:10},
    {q:"Compare the nutrient acquisition strategies of biotrophic, necrotrophic, and hemibiotrophic plant pathogens. Explain why the distinction between these lifestyles is important for selecting appropriate disease management strategies.",model:"Biotrophic pathogens (e.g., powdery mildews, rusts, viruses) feed exclusively on living tissue; they form specialised structures called haustoria that penetrate the cell wall but not the plasma membrane, absorbing nutrients from living cells without killing them. They produce minimal toxins and degradative enzymes to keep the host alive. Necrotrophic pathogens (e.g., Botrytis, soft rot bacteria) kill host cells first using toxins and cell wall-degrading enzymes (CAZymes), then feed on the dead tissue, causing extensive necrosis. Hemibiotrophic pathogens (e.g., Colletotrichum causing anthracnose) initially infect as biotrophs — sneaking in with minimal damage — before switching to a necrotrophic phase where they rapidly kill and consume tissue. This distinction is critical for management because: (1) plant resistance mechanisms differ — the hypersensitive response (killing plant cells) is effective against biotrophs but actually benefits necrotrophs; (2) biotrophic pathogens cause subtle early symptoms, making early detection difficult for hemibiotrophs that later switch to devastating necrotrophy; and (3) control timing differs — biotrophs must be prevented from establishing, while necrotrophs require protection of tissue integrity.",marks:10},
    {q:"Describe the process of arbuscular mycorrhizal fungi (AMF) colonisation of a plant root, from initial signal exchange to arbuscule formation. Include the key structures and signalling events at each stage.",model:"AMF colonisation proceeds through several coordinated stages. Stage 1 (Signal exchange): A germinating AMF spore produces exploratory hyphae in the soil. The plant root releases exudates (strigolactones) that diffuse a short distance and stimulate AMF metabolism, causing the hyphae to branch extensively, increasing the probability of root contact. Upon contact, the AMF releases Myc factors that are perceived by the plant and activate the common symbiosis (SYM) pathway — a signal transduction cascade that prepares the plant for fungal colonisation. Stage 2 (Hyphopodium formation): The hyphal tip contacts the root epidermal cell surface, swells, flattens, and branches to form a hyphopodium that adheres tightly to the root surface via protrusions. The plant epidermal cell responds by forming a pre-penetration apparatus (PPA) — an aggregation of cytoplasm beneath the hyphopodium that defines a path for intracellular fungal growth. Stage 3 (Intracellular colonisation and arbuscule formation): The fungal hypha grows intracellularly, strictly following the PPA-defined pathway through the cell. Upon reaching the inner root cortex, the hypha branches repeatedly to form arbuscules — highly branched, tree-like structures that maximise surface area for nutrient exchange between the fungus and plant. The plasma membrane of the plant cell is not breached but invaginates around the arbuscule.",marks:10},
    {q:"Explain the non-visual physiological changes that occur in plants during pathogen infection, including changes to photosynthesis, respiration, and canopy temperature. Why do these changes occur?",model:"When a plant is infected by a pathogen, several interconnected non-visual physiological changes occur even before visible symptoms appear. Photosynthesis decreases for multiple reasons: the pathogen may directly destroy chlorophyll; the plant may actively downregulate photosynthesis to redirect energy toward defence responses; or vascular pathogens may cause water stress by blocking xylem, leading to stomatal closure that reduces CO2 uptake. Respiration increases because the plant requires substantially more energy to mount its defence response — producing antimicrobial compounds, reactive oxygen species (for the oxidative burst/hypersensitive response), pathogenesis-related proteins, and reinforcing structural barriers. The oxidative burst itself consumes large amounts of oxygen. As a consequence of increased respiration and decreased transpiration (due to stomatal closure), canopy temperature rises — this is measurable with thermal imaging and is being explored as an early disease detection tool. These changes in primary metabolism represent a fundamental shift in the plant's resource allocation from growth and reproduction toward defence, explaining the yield losses associated with disease even before extensive visible tissue damage occurs.",marks:10},
    {q:"Explain what is meant by a 'hypersensitive response' in plants. Under what circumstances is this response effective, and when might it actually worsen disease outcomes?",model:"The hypersensitive response (HR) is an induced plant defence mechanism in which the plant deliberately kills its own cells at and around the site of pathogen infection, creating a zone of dead tissue that deprives the pathogen of living cells and nutrients. This is often accompanied by a localised oxidative burst — production of reactive oxygen species (ROS) that are directly toxic to pathogen cells. The HR is highly effective against biotrophic pathogens such as viruses, powdery mildews, and rusts, because these obligate parasites can only survive on living tissue. By killing its own cells, the plant essentially starves the biotroph and confines it to a small necrotic lesion — visible as tiny pinprick spots on leaves in the case of virus-resistant plants. However, the HR can be counterproductive against necrotrophic pathogens, which thrive on dead tissue. By killing its own cells, the plant inadvertently provides exactly the substrate that necrotrophs need, potentially facilitating rather than restricting pathogen colonisation. This is why plants have evolved different defence signalling pathways for biotrophs versus necrotrophs, and why understanding pathogen lifestyle is essential for predicting whether a host resistance response will be protective or detrimental.",marks:10}

<p>Think of agriculture as a giant web of interconnected life. At the very foundation of that web sit microorganisms. They perform roles that no other living thing can do. In the soil, bacteria and fungi break down dead plant material and recycle nutrients like nitrogen and phosphorus, making them available for the next generation of crops. Inside the stomachs of cows and sheep, trillions of microbes digest the tough cellulose in grass -- without these gut microbes, ruminant animals would literally starve even with a belly full of food.</p>

<p>The key distinction: a <strong>bacterium is a living cell</strong> that can reproduce on its own, generate its own energy, and carry out its own metabolism. A <strong>virus is not really alive</strong> in the traditional sense -- outside of a host cell, a virion is completely inert, like a biological parcel sitting in a post office. Nothing happens until that parcel gets delivered to a cell.</p>

      {

        explanations: [
          {
            title: "Learning Intentions",
            content: `<p>By the end of this lecture, you should be able to:</p><ol><li>Describe the methods used to detect and identify microorganisms, including direct microscopy and culture techniques</li><li>Explain the Gram stain procedure and interpret Gram-positive vs Gram-negative results</li><li>Compare different detection methods (microscopy, culture, molecular/PCR) and their relative advantages</li><li>Describe biosafety risk groups and the precautions required when handling microorganisms in the laboratory</li><li>Explain the principles of sterilisation and disinfection and the factors that influence choice of disinfectant</li><li>Identify appropriate culture media for specific bacterial species and explain selective/differential media</li></ol>`
          },
          {
            title: "Detecting Microorganisms: Direct Microscopy",
            content: `<p>When an animal is sick or a crop is diseased, the first question is always: <strong>what is causing this?</strong> Detection and identification of the culprit microorganism is the critical first step. The simplest and fastest method is to look directly at the organism under a microscope.</p>
<p>For <strong>fungi and large organisms</strong>, we can use <strong>unstained wet preparations</strong>. A sample is placed on a glass slide, sometimes mixed with a dye like India ink that stains the background but not the organism. For example, the yeast <strong>Cryptococcus neoformans</strong> produces a large gelatinous capsule -- with India ink staining, you see a bright organism surrounded by a clear halo against a dark background. You can also see budding (a mother yeast cell producing a smaller daughter cell), which instantly tells you it is a yeast rather than a bacterium.</p>
<p>For <strong>bacteria</strong>, we need higher magnification. Bacteria are typically viewed using an <strong>oil immersion lens</strong> (1000x magnification). Before viewing, bacteria must be <strong>fixed</strong> (stuck to the slide by heat-drying) and <strong>stained</strong> with dyes so they become visible. The most important bacterial stain is the <strong>Gram stain</strong>, which divides all bacteria into two fundamental groups: <strong>Gram-positive</strong> (purple) and <strong>Gram-negative</strong> (pink).</p>
<p>For very thin organisms like <strong>Leptospira</strong> (a spiral bacterium too thin for normal light microscopy), special techniques are needed: <strong>silver staining</strong> (deposits silver on the surface to make the bacterium thicker), <strong>dark field microscopy</strong> (uses refracted light to make organisms appear brighter against a dark background), or <strong>electron microscopy</strong> for the smallest organisms.</p>
<div class="key-point"><strong>Key Takeaway:</strong> Direct microscopy is the fastest detection method. Fungi use unstained wet preps, bacteria need fixing and staining (especially Gram stain), and very small or thin organisms need silver staining, dark field microscopy, or electron microscopy.</div>`
          },
          {
            title: "The Gram Stain: The Most Important Stain in Bacteriology",
            content: `<p>The <strong>Gram stain</strong> is the single most important laboratory technique in bacteriology. It divides bacteria into two major groups based on their cell wall structure, and it is almost always the first test performed when identifying an unknown bacterium.</p>
<div class="diagram"><img src="https://upload.wikimedia.org/wikipedia/commons/e/ef/Gram_Stain.png" alt="Gram staining procedure and its effects on gram-positive and gram-negative bacterial cell walls" style="max-width:100%;height:auto;border-radius:8px;"><p class="diagram-caption">Figure: The four-step Gram stain process. The decolourisation step (Step 3) is the most critical -- only 2 seconds! Gram-positive bacteria retain the purple crystal violet-iodine complex; Gram-negative bacteria lose it and pick up the pink counterstain.</p></div>
<p>The memory trick taught by the lecturer: <strong>The three big P words go together</strong> -- <strong>Purple</strong>, <strong>Positive</strong>, and thick <strong>Peptidoglycan</strong>. Gram-positive bacteria have a thick peptidoglycan layer that traps the crystal violet-iodine complex, so they stay purple. Gram-negative bacteria have a thin peptidoglycan layer, so the dye washes out during decolourisation, and they pick up the pink safranin counterstain instead.</p>
<div class="key-point"><strong>Key Takeaway:</strong> The Gram stain is a 4-step process (crystal violet \u2192 iodine \u2192 decolouriser \u2192 safranin) that divides bacteria into Gram-positive (purple, thick peptidoglycan) and Gram-negative (pink, thin peptidoglycan). Remember: Purple = Positive = thick Peptidoglycan.</div>`
          },
          {
            title: "Culture Methods: Growing Microorganisms",
            content: `<p>While microscopy is fast, it is not very <strong>sensitive</strong> -- you need a lot of organisms present to see them. <strong>Culture</strong> (growing microorganisms in the lab) is much more sensitive because you can start with just a few cells and amplify them into millions.</p>
<p><strong>Bacteria</strong> can be grown in liquid <strong>broth</strong> (nutrient-rich liquid in a bottle) or on solid <strong>agar plates</strong> (jelly-like medium in a Petri dish). Different media contain different additives to favour specific bacteria or inhibit others. For example, <strong>MacConkey agar</strong> contains bile salts that kill most bacteria but allow gut-adapted species like <em>E. coli</em> to grow. <em>E. coli</em> ferments the lactose in the medium, turning the colonies pink.</p>
<p>Bacteria also have specific temperature and atmosphere requirements. Some grow at 37\u00b0C (body temperature), others prefer 20\u00b0C or 42\u00b0C. Some need extra CO\u2082, some need zero oxygen (strict anaerobes), and some grow in normal air.</p>
<p><strong>Viruses</strong> cannot be cultured on agar because they only grow inside living cells. To grow viruses, we must infect <strong>cell cultures</strong> (animal or plant cells grown in flasks), <strong>organ cultures</strong> (small pieces of tissue), or <strong>chick embryos</strong> (fertilised eggs incubated to a specific stage). All influenza vaccines worldwide are still produced in chick embryos at facilities like CSL in Melbourne.</p>
<p>Colony appearance on agar can be very informative. Colour, size, shape, edge pattern, and whether the colonies break down blood cells (haemolysis) all provide clues. On <strong>XLD agar</strong>, Salmonella colonies turn black because they produce hydrogen sulphide that reacts with iron in the medium. On <strong>MacConkey agar</strong>, lactose-fermenting bacteria turn pink while non-fermenters stay pale.</p>
<div class="key-point"><strong>Key Takeaway:</strong> Culture is more sensitive than microscopy. Bacteria grow on agar plates or in broth with specific nutrients, temperatures, and atmospheres. Viruses require living cells (cell cultures or chick embryos). Colony appearance provides valuable identification clues.</div>`
          },
          {
            title: "Molecular Detection: PCR and Sequencing",
            content: `<p>Modern microbiology increasingly relies on detecting the <strong>nucleic acids</strong> (DNA or RNA) of microorganisms rather than growing them. The most important technique is the <strong>polymerase chain reaction (PCR)</strong>, which most people became familiar with during COVID-19.</p>
<p>PCR works by amplifying a specific target sequence of DNA. Imagine you have a single page from a book in a library of millions of books -- PCR makes millions of copies of just that one page so you can read it easily. The technique uses specific <strong>primers</strong> (short DNA sequences that match the start and end of your target) and a <strong>DNA polymerase</strong> enzyme to copy the target region over and over.</p>
<p><strong>Real-time PCR</strong> (quantitative PCR) goes further -- it measures how much target DNA was in the original sample. If the amplification curve crosses the detection threshold early, there was a lot of DNA (heavy infection). If it crosses late, there was very little. This helps distinguish between a genuine infection and incidental contamination.</p>
<p>One important caveat: <strong>PCR detects dead organisms as well as live ones</strong>. A positive PCR does not necessarily mean there are still living pathogens present -- the DNA may be from organisms that are already dead.</p>
<p><strong>High-throughput sequencing</strong> takes a different approach: instead of targeting one specific organism, it sequences everything in the sample and then searches databases to identify what is present. This is incredibly powerful for discovering unexpected pathogens.</p>
<p>Other detection methods include <strong>immunofluorescence</strong> (using fluorescent antibodies to light up specific organisms), <strong>latex agglutination</strong> (antibody-coated beads that clump when the target antigen is present), and <strong>serology</strong> (detecting the animal's own antibodies against a pathogen).</p>

<text x="345" y="133" text-anchor="middle" font-size="8" fill="#e76f51">Finds dead too</text>

<text x="490" y="103" text-anchor="middle" font-size="8" fill="#264653">Sensitivity: Moderate</text>
